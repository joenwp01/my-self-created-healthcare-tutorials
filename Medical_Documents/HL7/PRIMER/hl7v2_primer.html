<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HL7 v2 Primer — Before You Begin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#7d8b9d;--header-bg:#1e4670;
  --surface:#d3dde8;--surface-raised:#c8d3e0;--surface-inset:#a8b4c2;
  --border:#8693a3;--border-accent:#5d6e85;--border-focus:#1e4670;
  --text:#2a2a2a;--text-muted:#4a5260;--text-dim:#6b7280;
  --accent:#7a5418;--accent-glow:rgba(184,134,42,.12);--accent-dim:#5d3f10;--accent-badge:#b8862a;
  --green:#1f6843;--green-bg:rgba(31,104,67,.12);
  --red:#9c382d;--red-bg:rgba(156,56,45,.10);
  --orange:#8e4d10;--orange-bg:rgba(142,77,16,.10);
  --blue:#2c5680;--blue-bg:rgba(44,86,128,.10);
  --purple:#553a80;--purple-bg:rgba(85,58,128,.10);
  --cyan:#155f6e;--cyan-bg:rgba(21,95,110,.10);
  --radius:8px;--radius-lg:12px;
  --mono:'JetBrains Mono',monospace;--serif:'Crimson Pro',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#1e4670;color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.7;min-height:100vh}

/* ── Header ── */
.header{background:var(--header-bg);border-bottom:2px solid var(--accent);padding:20px 28px 16px;color:#f0f4fa}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.header-brand h1{font-family:var(--serif);font-size:26px;font-weight:700;color:#f4c97c;letter-spacing:.3px}
.header-brand .pipe-motif{font-family:var(--mono);color:#a8b8c8;font-size:20px;letter-spacing:2px}
.header-brand .subtitle{font-family:var(--sans);font-size:13px;color:#cfd8e3;font-weight:400;margin-left:4px}
.header-credit{font-size:11px;color:#a8b8c8;font-family:var(--mono)}

/* ── Welcome-back banner ── */
.welcome-back{background:rgba(184,134,42,.18);border:1px solid var(--accent-badge);
  padding:10px 18px;margin-top:14px;border-radius:var(--radius);display:flex;align-items:center;
  justify-content:space-between;gap:12px;flex-wrap:wrap}
.welcome-back-text{color:#f0f4fa;font-size:13px}
.welcome-back-text strong{color:#f4c97c}

/* ── Segment Progress Bar ── */
.progress-bar{position:sticky;top:0;z-index:90;background:rgba(125,139,157,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;white-space:nowrap;
  display:flex;gap:6px;align-items:center}
.progress-bar::-webkit-scrollbar{height:4px}
.progress-bar::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}
.seg-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:18px;
  font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;
  background:#73798a;color:#000;border:1px solid #525861;transition:all .15s;flex-shrink:0}
.seg-pill .seg-num{font-family:var(--mono);font-size:10px;color:#000;font-weight:700}
.seg-pill .seg-icon{font-size:14px}
.seg-pill:hover{background:#8a92a0;color:#000;border-color:#5d6470}
.seg-pill.done{background:#5cae6a;color:#000;border-color:#3d9555}
.seg-pill.done:hover{background:#7cc188;color:#000;border-color:#5cae6a}
.seg-pill.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.seg-pill.active:hover{background:#5fa0d0;color:#000;border-color:#4a90c2}
.seg-pill.done.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.seg-pill.locked{background:#5d6470;color:#3a3a3a;border-color:#4a5058;cursor:not-allowed;opacity:.5}
.seg-pill.locked:hover{background:#5d6470;color:#3a3a3a;border-color:#4a5058}
.time-remaining{margin-left:auto;font-family:var(--mono);font-size:10px;color:#0d2640;
  padding:4px 10px;background:rgba(255,255,255,.15);border-radius:10px;flex-shrink:0}

/* ── Main layout ── */
main{max-width:1200px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:1fr 280px;gap:28px}
@media (max-width:920px){main{grid-template-columns:1fr;padding:16px}}

.content-col{min-width:0}
.sidebar-col{position:relative}

/* ── Hero ── */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:32px 28px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--text);margin-bottom:10px}
.hero .hero-sub{font-family:var(--mono);font-size:12px;color:var(--accent-dim);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.hero p{color:var(--text-muted);margin-bottom:14px;font-size:15px;line-height:1.75}
.hero-cta{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* ── Action Bar ── */
.action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
  margin-bottom:20px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius)}
.action-bar .left-actions,.action-bar .right-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── Buttons ── */
.btn{font-family:var(--mono);font-size:12px;font-weight:600;padding:8px 18px;border-radius:var(--radius);
  border:1px solid var(--border);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;
  background:#b8862a;color:#000;border-color:#b8862a}
.btn:hover{background:#cc9633;color:#000;border-color:#cc9633}
.btn.primary{background:var(--accent-badge);color:#000;border-color:var(--accent-badge);font-weight:700}
.btn.primary:hover{box-shadow:0 2px 16px var(--accent-glow);background:#cc9633;color:#000}
.btn.primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn.secondary{background:#b8862a;color:#000;border-color:#b8862a}
.btn.ghost{background:transparent;color:var(--text);border-color:var(--border)}
.btn.ghost:hover{background:var(--surface-inset);color:var(--text);border-color:var(--border-accent)}

/* ── Segment Container ── */
.segment{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:28px 32px;margin-bottom:24px}
@media (max-width:920px){.segment{padding:20px 18px}}

.segment-header{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.segment-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap}
.segment-meta .seg-step{color:var(--accent-dim);font-weight:700}
.segment-title{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--text);
  margin-bottom:6px;display:flex;align-items:center;gap:12px}
.segment-title .seg-icon-large{font-size:30px}
.segment-subtitle{color:var(--text-muted);font-size:14px;margin-bottom:14px}

/* End-goal callout */
.end-goal{background:var(--accent-glow);border-left:3px solid var(--accent-badge);
  padding:12px 16px;margin-top:14px;border-radius:0 var(--radius) var(--radius) 0}
.end-goal-label{font-family:var(--mono);font-size:10px;color:var(--accent-dim);
  letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.end-goal-text{color:var(--text);font-size:14px;font-style:italic}

/* Lecture content */
.lecture{font-size:15px;color:var(--text);line-height:1.8}
.lecture h3{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);
  margin:24px 0 10px}
.lecture h4{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--accent-dim);
  margin:18px 0 8px;letter-spacing:.3px}
.lecture p{margin-bottom:14px;color:var(--text-muted)}
.lecture p strong{color:var(--text)}
.lecture ul,.lecture ol{margin:10px 0 14px 24px;color:var(--text-muted)}
.lecture li{margin-bottom:6px}
.lecture code{font-family:var(--mono);font-size:12.5px;background:var(--surface-inset);color:var(--accent);
  padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.lecture .callout{background:#e0e0e0;border:1px solid #b0b0b0;border-radius:var(--radius);
  padding:14px 18px;margin:16px 0;font-size:14px;color:#000}
.lecture .callout strong{color:#000}
.lecture .callout-icon{font-size:18px;margin-right:6px}

/* Code/message blocks */
.code-block{font-family:var(--mono);font-size:12.5px;background:#1e2d3e;color:#e8eef5;
  padding:14px 16px;border-radius:var(--radius);margin:12px 0;overflow-x:auto;line-height:1.7;
  border:1px solid #2a3f56}
.code-block .hl-segname{color:#f4c97c;font-weight:700}
.code-block .hl-pipe{color:#7a8b9c}
.code-block .hl-component-sep{color:#9aa9b8}
.code-block .hl-value{color:#d4dde6}
.code-block .hl-empty{color:#5a6878;font-style:italic}
.code-block .hl-new{background:rgba(244,201,124,.15);padding:0 2px;border-radius:2px}

/* Field annotation table */
.field-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px;
  background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.field-table th{background:var(--surface-inset);color:var(--text);padding:8px 12px;text-align:left;
  font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border)}
.field-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-muted);vertical-align:top}
.field-table td:first-child{font-family:var(--mono);font-weight:700;color:var(--accent-dim);white-space:nowrap}
.field-table td:nth-child(2){font-family:var(--mono);color:var(--text);font-size:12px}
.field-table tr:last-child td{border-bottom:none}

/* Before/After panels */
.ba-block{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;margin:18px 0;align-items:stretch}
@media (max-width:680px){.ba-block{grid-template-columns:1fr;gap:8px}}
.ba-panel{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column}
.ba-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1.5px;
  text-transform:uppercase;font-weight:700;margin-bottom:8px}
.ba-before .ba-label{color:var(--blue)}
.ba-after .ba-label{color:var(--green)}
.ba-content{font-size:13px;color:var(--text);line-height:1.7;flex:1}
.ba-content code,.ba-content pre{font-family:var(--mono);font-size:12px;color:var(--accent);
  background:var(--surface-inset);padding:2px 5px;border-radius:3px;display:inline-block;
  word-break:break-all;white-space:pre-wrap}
.ba-content pre{display:block;padding:8px 10px;margin-top:6px}
.ba-arrow{display:flex;align-items:center;justify-content:center;color:var(--accent-badge);
  font-size:24px;font-weight:700;font-family:var(--mono)}
@media (max-width:680px){.ba-arrow{transform:rotate(90deg);padding:4px 0}}

/* Pulse Check */
.pulse-check{background:#e0e0e0;border:1px solid #b0b0b0;border-radius:var(--radius-lg);
  padding:18px 22px;margin:22px 0;color:#000}
.pulse-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pulse-icon{font-size:18px}
.pulse-label{font-family:var(--mono);font-size:11px;color:#000;letter-spacing:1.5px;
  text-transform:uppercase;font-weight:700}
.pulse-question{font-size:15px;color:#000;margin-bottom:14px;line-height:1.6}
.pulse-question code{font-family:var(--mono);font-size:12.5px;background:#fff;color:var(--accent);
  padding:2px 5px;border-radius:3px;border:1px solid #b0b0b0}
.pulse-options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pulse-option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--surface-raised);
  border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;
  color:#000;font-size:13.5px;line-height:1.5;text-align:left}
.pulse-option:hover{background:var(--surface);border-color:var(--border-accent)}
.pulse-option.correct{background:rgba(31,104,67,.18);border-color:var(--green);color:#000}
.pulse-option.wrong{background:rgba(156,56,45,.15);border-color:var(--red);color:#000}
.pulse-option.disabled{cursor:not-allowed;opacity:.6}
.pulse-option.disabled.correct,.pulse-option.disabled.wrong{opacity:1}
.pulse-key{font-family:var(--mono);font-weight:700;font-size:12px;color:#000;
  min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:4px;flex-shrink:0;background:var(--surface)}
.pulse-feedback{padding:12px 14px;border-radius:var(--radius);font-size:13.5px;line-height:1.6;
  margin-top:10px;color:#000;display:none}
.pulse-feedback.visible{display:block}
.pulse-feedback.correct{background:rgba(31,104,67,.15);border:1px solid var(--green)}
.pulse-feedback.incorrect{background:rgba(156,56,45,.12);border:1px solid var(--red)}
.pulse-feedback.revealed{background:rgba(44,86,128,.12);border:1px solid var(--blue)}
.pulse-feedback strong{color:#000}
.pulse-actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.pulse-link{font-family:var(--mono);font-size:11px;color:var(--accent-dim);font-weight:600;
  background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 0}
.pulse-link:hover{color:var(--accent)}

/* Cards Sidebar */
.cards-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:18px;position:sticky;top:80px}
.cards-panel h3{font-family:var(--mono);font-size:11px;color:var(--accent-dim);
  letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.cards-panel .cards-sub{font-size:11.5px;color:var(--text-dim);margin-bottom:14px;line-height:1.5}
.card-item{padding:8px 12px;background:var(--surface-raised);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:all .15s;font-size:13px;
  color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-item:hover{background:var(--surface-inset);border-color:var(--border-accent)}
.card-item-term{font-weight:600}
.card-item-expand{font-size:10px;color:var(--text-dim);font-family:var(--mono)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;
  align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;
  justify-content:space-between;align-items:center;gap:12px}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:1px solid var(--border);color:var(--text);font-size:18px;
  width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--surface-inset);border-color:var(--border-accent)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-search{margin-bottom:14px}
.modal-search input{width:100%;padding:8px 12px;font-family:var(--sans);font-size:14px;
  background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text)}
.modal-search input:focus{outline:none;border-color:var(--border-focus)}

/* Card library content */
.lib-segment-group{margin-bottom:18px}
.lib-segment-header{font-family:var(--mono);font-size:11px;color:var(--accent-dim);
  letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:8px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.lib-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:8px}
.lib-card-term{font-family:var(--sans);font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px}
.lib-card-expansion{font-family:var(--mono);font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:6px}
.lib-card-def{font-size:13px;color:var(--text-muted);line-height:1.6}

/* Single card modal */
.card-modal-term{font-family:var(--mono);font-size:11px;color:var(--accent-dim);
  letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.card-modal-expansion{font-family:var(--mono);font-size:13px;color:var(--text-dim);
  font-style:italic;margin-bottom:10px}
.card-modal-def{font-size:14.5px;color:var(--text);line-height:1.7;margin-bottom:12px}
.card-modal-long{font-size:13.5px;color:var(--text-muted);line-height:1.7;
  padding-top:12px;border-top:1px solid var(--border)}

/* Footer */
.footer{padding:30px 28px;text-align:center;border-top:1px solid rgba(255,255,255,.1)}
.footer-actions{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.footer-credit{font-family:var(--mono);font-size:11px;color:#a8b8c8}

/* Segment navigation footer (within segment) */
.seg-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:24px;
  padding-top:18px;border-top:1px solid var(--border);flex-wrap:wrap}
.seg-nav-left,.seg-nav-right{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <h1>HL7 v2 Primer</h1>
      <span class="pipe-motif">|^~\&amp;|</span>
      <span class="subtitle">Before You Begin · A beginner's foundation</span>
    </div>
    <div class="header-credit">Developed by: Joe Williams</div>
  </div>
  <div id="welcomeBackBanner" style="display:none"></div>
  <div class="progress-bar" id="progressBar"></div>
</header>

<main>
  <div class="content-col">
    <div id="heroSection"></div>
    <div id="actionBar"></div>
    <div id="segmentContainer"></div>
  </div>
  <aside class="sidebar-col">
    <div id="cardsSidebar"></div>
  </aside>
</main>

<footer class="footer">
  <div class="footer-actions">
    <button class="btn ghost" onclick="resetProgress()">↺ Start over</button>
    <button class="btn primary" id="beginTutorialBtn" onclick="alert('Once published, this would link to hl7v2_message_to_model.html — Station 1 awaits.')">Begin the main tutorial →</button>
  </div>
  <div class="footer-credit">HL7 v2 Primer · Developed by: Joe Williams</div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Modal</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CARDS — Single source of truth for all definitions
// ════════════════════════════════════════════════════════════════
const CARDS = {
  ehr: {
    term: 'EHR',
    expansion: 'Electronic Health Record',
    def: 'The hospital\'s primary clinical software where patient charts, encounters, orders, results, and notes all live.',
    long: 'A digital version of a patient\'s paper chart. Major vendors: Epic, Oracle Health (Cerner), Meditech, Allscripts. The EHR is typically the central system that other hospital systems exchange data with.'
  },
  interop: {
    term: 'Interoperability',
    def: 'The ability of different software systems to exchange data with each other and use it correctly.',
    long: 'In healthcare, this means a lab analyzer\'s result can flow into the EHR, then into a billing system, then into a public-health database — each system understanding what the data means.'
  },
  standardsBased: {
    term: 'Standards-based messaging',
    def: 'Communication between systems using a published, agreed-upon format that any participating system can read and write.',
    long: 'Without standards, every pair of systems would need a custom translator. Standards reduce this from N² interfaces to N — every system implements the standard once.'
  },
  hl7v2Concept: {
    term: 'HL7 v2',
    expansion: 'Health Level 7, version 2',
    def: 'The dominant messaging standard for healthcare data exchange in the US since the late 1980s.',
    long: 'Pipe-delimited text format. "Health Level 7" refers to layer 7 of the OSI networking model — the application layer. Versions in use range from 2.3 (legacy) through 2.5.1 (most common today) to 2.8 (newer).'
  },
  encounter: {

<h4>The scale of the problem</h4>
<p>A typical US hospital runs <strong>50-300 different software applications</strong>. They were built at different times, by different vendors, in different programming languages. They store data in different shapes — one system might call her last name <code>last_name</code>, another <code>patientLastName</code>, a third <code>SURNAME</code>, a fourth <code>family</code>.</p>
<p>The naive solution — "let everyone use the same database" — is impossible. Vendors don't share internal data structures. Hospitals can't replace systems wholesale (a major EHR replacement costs tens of millions and takes years). Regulations require certain systems to be auditable separately. And clinical workflows often depend on systems being specialized for their domain.</p>
<h4>The real-world solution</h4>
<p>What works in practice is <strong>standards-based messaging</strong>. Every system stores data however it wants internally. But when one system needs to send information to another, it converts that information into a <strong>standard format</strong> that the receiving system also speaks. Both systems agree on the format <em>at the boundary</em>, even though their internal storage is completely different.</p>
<p>HL7 v2 is the dominant such standard in US hospitals. It has been since the late 1980s. Newer alternatives exist (FHIR is the most prominent), but HL7 v2 still moves the vast majority of clinical messages today and is unlikely to disappear soon — replacement costs are simply too high.</p>

//  STATE MANAGEMENT
// ════════════════════════════════════════════════════════════════
const STATE_KEY = 'hl7v2_primer_state';
let state;

function defaultState(){
  return {
    version: 1,
    currentSegment: 1,
    completed: [],
    pulseAnswers: {},
    pulseRevealed: [],
    pulseRetries: {},
    startedAt: Date.now(),
    lastVisited: Date.now(),
    welcomeBackShown: false
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STATE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    console.warn('Could not load state:', e);
    return defaultState();
  }
}

function saveState(){
  state.lastVisited = Date.now();
  try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn('Could not save state:', e); }
}

function resetProgress(){
  if(!confirm('Start over? This will clear all your progress through the primer.')) return;
  localStorage.removeItem(STATE_KEY);
  location.reload();
}

//  HELPERS
// ════════════════════════════════════════════════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

function isSegmentUnlocked(id){
  if(id === 1) return true;
  return state.completed.includes(id - 1);
}

function isSegmentComplete(id){
  return state.completed.includes(id);
}

function totalRemainingMinutes(){
  return SEGMENTS
    .filter(s => !state.completed.includes(s.id))
    .reduce((sum, s) => sum + s.minutes, 0);
}

function formatRelativeTime(ts){
  const ms = Date.now() - ts;
  const hours = Math.floor(ms / 3600000);
  const days = Math.floor(hours / 24);
  if(days >= 2) return `${days} days ago`;
  if(days === 1) return 'yesterday';
  if(hours >= 2) return `${hours} hours ago`;
  if(hours === 1) return '1 hour ago';
  return 'recently';
}

function renderProgressBar(){
  const bar = document.getElementById('progressBar');
  let html = '';
  SEGMENTS.forEach(seg => {
    const unlocked = isSegmentUnlocked(seg.id);
    const done = isSegmentComplete(seg.id);
    const active = state.currentSegment === seg.id;
    let cls = 'seg-pill';
    if(active) cls += ' active';
    else if(done) cls += ' done';
    else if(!unlocked) cls += ' locked';
    const onclick = unlocked ? `goToSegment(${seg.id})` : '';
    html += `<button class="${cls}" onclick="${onclick}" ${unlocked?'':'disabled'} title="${esc(seg.title)}">
      <span class="seg-num">${seg.id}</span>
      <span class="seg-icon">${seg.icon}</span>
    </button>`;
  });
  const remaining = totalRemainingMinutes();
  html += `<span class="time-remaining">~${remaining} min remaining</span>`;
  bar.innerHTML = html;
}

  const seg = SEGMENTS.find(s => s.id === id);
  if(!seg) return;
  const container = document.getElementById('segmentContainer');
  const done = isSegmentComplete(seg.id);

  let html = `
    <section class="segment">
      <div class="segment-header">
        <div class="segment-meta">
          <span class="seg-step">Segment ${seg.id} of ${SEGMENTS.length}</span>
          <span>~${seg.minutes} min</span>
          ${done ? '<span style="color:var(--green);font-weight:700">✓ Completed</span>' : ''}
        </div>
        <div class="segment-title">
          <span class="seg-icon-large">${seg.icon}</span>
          ${esc(seg.title)}
        </div>
        <div class="segment-subtitle">${esc(seg.subtitle)}</div>
        <div class="end-goal">
          <div class="end-goal-label">End goal</div>
          <div class="end-goal-text">${esc(seg.endGoal)}</div>
        </div>
      </div>
      <div class="lecture">${seg.lecture}</div>
  `;

  // Before/After block (if defined)
  if(seg.beforeAfter){
    html += `
      <div class="ba-block">
        <div class="ba-panel ba-before">
          <div class="ba-label">${esc(seg.beforeAfter.beforeLabel)}</div>
          <div class="ba-content">${seg.beforeAfter.beforeContent}</div>
        </div>
        <div class="ba-arrow">→</div>
        <div class="ba-panel ba-after">
          <div class="ba-label">${esc(seg.beforeAfter.afterLabel)}</div>
          <div class="ba-content">${seg.beforeAfter.afterContent}</div>
        </div>
      </div>
    `;
  }

  // Pulse checks
  seg.pulseChecks.forEach((pc, idx) => {
    html += renderPulseCheckHTML(seg.id, idx, pc);
  });

  // Segment navigation
  const isLast = seg.id === SEGMENTS.length;
  const nextId = seg.id + 1;
  const nextSegment = SEGMENTS.find(s => s.id === nextId);
  html += `
      <div class="seg-nav">
        <div class="seg-nav-left">
          ${seg.id > 1 ? `<button class="btn ghost" onclick="goToPrevSegment()">← Previous segment</button>` : '<span></span>'}
        </div>
        <div class="seg-nav-right">
          ${!isLast ? `<button class="btn primary" onclick="markCompleteAndContinue(${seg.id})">${done ? 'Continue to' : 'Mark complete & continue to'} segment ${nextId} →</button>` : `<button class="btn primary" onclick="markCompleteAndContinue(${seg.id})">${done ? 'Finish primer →' : 'Mark complete & finish primer →'}</button>`}
        </div>
      </div>
    </section>
  `;

  container.innerHTML = html;
}

function renderPulseCheckHTML(segId, idx, pc){
  const key = `s${segId}_p${idx}`;
  const userAnswer = state.pulseAnswers[key];
  const wasRevealed = state.pulseRevealed.includes(key);
  const answered = userAnswer !== undefined;
  const isCorrect = userAnswer === pc.correctKey;

  let optionsHTML = '';
  pc.options.forEach(opt => {
    let cls = 'pulse-option';
    let onclickAttr = `onclick="handlePulseAnswer(${segId},${idx},'${opt.key}')"`;
    if(answered || wasRevealed){
      cls += ' disabled';
      onclickAttr = '';
      if(opt.key === pc.correctKey) cls += ' correct';
      else if(opt.key === userAnswer && !isCorrect) cls += ' wrong';
    }
    optionsHTML += `<button class="${cls}" ${onclickAttr}>
      <span class="pulse-key">${opt.key}</span>
      <span>${opt.text}</span>
    </button>`;
  });

  let feedbackHTML = '';
  if(answered || wasRevealed){
    let fbCls = 'pulse-feedback visible';
    let fbContent = '';
    if(wasRevealed && !answered){
      fbCls += ' revealed';
      fbContent = `<strong>Answer revealed:</strong> ${pc.feedback.incorrect}`;
    } else if(isCorrect){
      fbCls += ' correct';
      fbContent = `<strong>✓ Correct.</strong> ${pc.feedback.correct}`;
    } else {
      fbCls += ' incorrect';
      fbContent = `<strong>Not quite.</strong> ${pc.feedback.incorrect}`;
    }
    feedbackHTML = `<div class="${fbCls}">${fbContent}</div>`;
  }

  let actionsHTML = '';
  if(!answered && !wasRevealed){
    actionsHTML = `<div class="pulse-actions"><button class="pulse-link" onclick="revealPulseAnswer(${segId},${idx})">Reveal answer</button></div>`;
  } else {
    actionsHTML = `<div class="pulse-actions"><button class="pulse-link" onclick="retryPulseCheck(${segId},${idx})">🔄 Try again</button></div>`;
  }

  return `
    <div class="pulse-check">
      <div class="pulse-header">
        <span class="pulse-icon">💭</span>
        <span class="pulse-label">Pulse check</span>
      </div>
      <div class="pulse-question">${pc.question}</div>
      <div class="pulse-options">${optionsHTML}</div>
      ${feedbackHTML}
      ${actionsHTML}
    </div>
  `;
}

function renderCardsSidebar(){
  const sidebar = document.getElementById('cardsSidebar');
  const seg = SEGMENTS.find(s => s.id === state.currentSegment);
  if(!seg || !seg.cards || seg.cards.length === 0){
    sidebar.innerHTML = '';
    return;
  }
  let html = `<div class="cards-panel">
    <h3>Cards · Segment ${seg.id}</h3>
    <div class="cards-sub">Definitions for this segment</div>`;
  seg.cards.forEach(cardId => {
    const card = CARDS[cardId];
    if(!card) return;
    html += `<div class="card-item" onclick="openCardModal('${cardId}')">
      <span class="card-item-term">${esc(card.term)}</span>
      <span class="card-item-expand">›</span>
    </div>`;
  });
  html += '</div>';
  sidebar.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
//  HANDLERS
// ════════════════════════════════════════════════════════════════
function handlePulseAnswer(segId, idx, key){
  const answerKey = `s${segId}_p${idx}`;
  state.pulseAnswers[answerKey] = key;
  saveState();
  renderSegment(segId);
}

function revealPulseAnswer(segId, idx){
  const answerKey = `s${segId}_p${idx}`;
  if(!state.pulseRevealed.includes(answerKey)) state.pulseRevealed.push(answerKey);
  saveState();
  renderSegment(segId);
}

function retryPulseCheck(segId, idx){
  const answerKey = `s${segId}_p${idx}`;
  delete state.pulseAnswers[answerKey];
  state.pulseRevealed = state.pulseRevealed.filter(k => k !== answerKey);
  state.pulseRetries[answerKey] = (state.pulseRetries[answerKey] || 0) + 1;
  saveState();
  renderSegment(segId);
}

function markCompleteAndContinue(segId){
  if(!state.completed.includes(segId)) state.completed.push(segId);
  saveState();
  if(segId < SEGMENTS.length){
    state.currentSegment = segId + 1;
    saveState();
    fullRender();
    scrollToTop();
  } else {
    // Last segment — keep them on this segment, just refresh
    fullRender();
  }
}

function goToSegment(id){
  if(!isSegmentUnlocked(id)) return;
  state.currentSegment = id;
  saveState();
  fullRender();
  scrollToTop();
}

function goToPrevSegment(){
  if(state.currentSegment > 1) goToSegment(state.currentSegment - 1);
}

function replaySegment(segId){
  if(!confirm('Replay this segment? This resets the pulse check answers for this segment only — your overall progress and other segments stay intact.')) return;
  // Clear pulse-check answers for this segment
  Object.keys(state.pulseAnswers).forEach(k => {
    if(k.startsWith(`s${segId}_p`)) delete state.pulseAnswers[k];
  });
  state.pulseRevealed = state.pulseRevealed.filter(k => !k.startsWith(`s${segId}_p`));
  saveState();
  renderSegment(segId);
  scrollToTop();
}

// ════════════════════════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════════════════════════
function openCardModal(cardId){
  const card = CARDS[cardId];
  if(!card) return;
  document.getElementById('modalTitle').textContent = card.term;
  let html = `<div class="card-modal-term">${esc(card.term)}</div>`;
  if(card.expansion) html += `<div class="card-modal-expansion">${esc(card.expansion)}</div>`;
  html += `<div class="card-modal-def">${esc(card.def)}</div>`;
  if(card.long) html += `<div class="card-modal-long">${esc(card.long)}</div>`;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function openCardLibrary(){
  // Determine visible segments (current + completed)
  const visibleIds = new Set([state.currentSegment, ...state.completed]);
  const visibleSegs = SEGMENTS.filter(s => visibleIds.has(s.id)).sort((a,b) => a.id - b.id);

  document.getElementById('modalTitle').textContent = '📚 Card library';
  let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Cumulative reference — terms you\'ve encountered so far. Cards from later segments will appear as you progress.</div>`;
  html += `<div class="modal-search"><input type="text" id="cardLibrarySearch" placeholder="Search terms..." oninput="filterCardLibrary()"></div>`;
  html += `<div id="cardLibraryContent">`;

  let totalCards = 0;
  visibleSegs.forEach(seg => {
    if(!seg.cards || seg.cards.length === 0) return;
    html += `<div class="lib-segment-group" data-seg-id="${seg.id}">
      <div class="lib-segment-header">${seg.icon} Segment ${seg.id}: ${esc(seg.title)}</div>`;
    seg.cards.forEach(cardId => {
      const card = CARDS[cardId];
      if(!card) return;
      totalCards++;
      html += `<div class="lib-card" data-term="${esc(card.term.toLowerCase())}" data-def="${esc(card.def.toLowerCase())}">
        <div class="lib-card-term">${esc(card.term)}</div>
        ${card.expansion ? `<div class="lib-card-expansion">${esc(card.expansion)}</div>` : ''}
        <div class="lib-card-def">${esc(card.def)}</div>
      </div>`;
    });
    html += `</div>`;
  });

  if(totalCards === 0){
    html += `<div style="text-align:center;color:var(--text-dim);padding:30px 0;font-size:13px">No cards yet — start segment 1 to begin building your library.</div>`;
  }
  html += `</div>`;

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function filterCardLibrary(){
  const q = document.getElementById('cardLibrarySearch').value.toLowerCase().trim();
  document.querySelectorAll('.lib-card').forEach(card => {
    const term = card.dataset.term || '';
    const def = card.dataset.def || '';
    const matches = !q || term.includes(q) || def.includes(q);
    card.style.display = matches ? '' : 'none';
  });
  // Hide segment groups with no visible cards
  document.querySelectorAll('.lib-segment-group').forEach(group => {
    const visible = group.querySelectorAll('.lib-card:not([style*="display: none"])').length;
    group.style.display = visible > 0 ? '' : 'none';
  });
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

// ════════════════════════════════════════════════════════════════
//  WELCOME-BACK BANNER
// ════════════════════════════════════════════════════════════════
function maybeShowWelcomeBack(){
  const hoursAway = (Date.now() - state.lastVisited) / 3600000;
  const hasProgress = state.completed.length > 0;
  if(hoursAway > 4 && hasProgress && !state.welcomeBackShown){
    const banner = document.getElementById('welcomeBackBanner');
    const seg = SEGMENTS.find(s => s.id === state.currentSegment);
    banner.style.display = 'block';
    banner.innerHTML = `<div class="welcome-back">
      <div class="welcome-back-text">
        Welcome back. You were on <strong>Segment ${seg.id}: ${esc(seg.title)}</strong> ${formatRelativeTime(state.lastVisited)}.
      </div>
      <button class="btn primary" onclick="dismissWelcomeBack()">Continue →</button>
    </div>`;
    state.welcomeBackShown = true;
    saveState();
  }
}

function dismissWelcomeBack(){
  document.getElementById('welcomeBackBanner').style.display = 'none';
  scrollToTop();
}

// ════════════════════════════════════════════════════════════════
//  FULL RENDER + INIT
// ════════════════════════════════════════════════════════════════
function fullRender(){
  renderProgressBar();
  renderHero();
  renderActionBar();
  renderSegment(state.currentSegment);
  renderCardsSidebar();

  // Enable "Begin tutorial" button when all 8 complete
  const beginBtn = document.getElementById('beginTutorialBtn');
  if(state.completed.length >= SEGMENTS.length){
    beginBtn.disabled = false;
    beginBtn.style.opacity = '1';
  } else {
    beginBtn.disabled = true;
    beginBtn.style.opacity = '.4';
    beginBtn.style.cursor = 'not-allowed';
  }
}

function init(){
  state = loadState();
  // Reset welcomeBackShown each session start
  if(Date.now() - state.lastVisited > 1800000) state.welcomeBackShown = false; // 30 min away = new session
  fullRender();
  maybeShowWelcomeBack();

  // Keyboard: Esc closes modals
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

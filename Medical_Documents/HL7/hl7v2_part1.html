<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HL7 v2: Message to Model — Part 1: The Interface Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  /* ─── Page chrome (outside the tutorial space) ─── */
  --bg:#7d8b9d;                /* moderate blue-gray page background */
  --header-bg:#1e4670;         /* medium-dark blue header */

  /* ─── Inside the tutorial space (1/2 shade darker than C-CDA Lab) ─── */
  --surface:#d3dde8;           /* slight blue-gray, content panels (was #e4ebf2 → 1/2 darker) */
  --surface-raised:#c8d3e0;    /* slightly raised cards within panels */
  --surface-inset:#a8b4c2;     /* moderate blue-gray inset/code-block (was #c2ccd6 → 1/2 darker) */

  /* ─── Borders ─── */
  --border:#8693a3;            /* default border on light bg */
  --border-accent:#5d6e85;     /* stronger border for emphasis */
  --border-focus:#1e4670;      /* focused/active border = header blue */

  /* ─── Text (dark charcoals on light bg, easier on the eyes) ─── */
  --text:#2a2a2a;              /* primary text */
  --text-muted:#4a5260;        /* secondary text — darker than typical "muted" for readability */
  --text-dim:#6b7280;          /* tertiary/captions — still readable */

  /* ─── Accent: yellow-brown tint (warm bronze) ─── */
  --accent:#7a5418;                       /* darkened bronze for body text/links (WCAG AA on surface) */
  --accent-glow:rgba(184,134,42,.12);     /* tint background (lighter, for fills) */
  --accent-dim:#5d3f10;                   /* darker still for strong borders */
  --accent-badge:#b8862a;                 /* warm bronze for badge backgrounds (with dark text) */

  /* ─── Status colors (deeper, WCAG AA on light bg) ─── */
  --green:#1f6843;             /* deeper readable green */
  --green-bg:rgba(31,104,67,.12);
  --red:#9c382d;               /* deeper readable red */
  --red-bg:rgba(156,56,45,.10);
  --orange:#8e4d10;            /* deeper readable orange */
  --orange-bg:rgba(142,77,16,.10);
  --blue:#2c5680;              /* deeper readable blue */
  --blue-bg:rgba(44,86,128,.10);
  --purple:#553a80;
  --purple-bg:rgba(85,58,128,.10);
  --cyan:#155f6e;
  --cyan-bg:rgba(21,95,110,.10);

  --pipe:#7a5418;

  /* ─── Per-station accent color tokens (deeper variants for contrast on light bg) ─── */
  --c-mllp:#2c5680;--c-seg:#553a80;--c-route:#8e4d10;--c-vocab:#1f6843;
  --c-valid:#9c382d;--c-trans:#7a5418;--c-mpi:#155f6e;
  --c-phi:#85335c;--c-minnc:#5b3580;--c-sens:#7a3088;
  --c-fhir:#155f5b;--c-uscore:#266a9e;--c-bundle:#3e4a8a;

  --radius:8px;--radius-lg:12px;
  --mono:'JetBrains Mono',monospace;--serif:'Crimson Pro',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.7;min-height:100vh}

/* ── Header ── */
.header{background:var(--header-bg);border-bottom:2px solid var(--accent);padding:20px 28px 16px;color:#f0f4fa}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-brand{display:flex;align-items:baseline;gap:12px}
.header-brand h1{font-family:var(--serif);font-size:26px;font-weight:700;color:#f4c97c;letter-spacing:.3px}
.header-brand .pipe-motif{font-family:var(--mono);color:#a8b8c8;font-size:20px;letter-spacing:2px}
.header-brand .subtitle{font-family:var(--sans);font-size:13px;color:#cfd8e3;font-weight:400;margin-left:4px}
.header-credit{font-size:11px;color:#a8b8c8;font-family:var(--mono)}

/* ── Journey Tabs ── */
.journey-bar{display:flex;gap:0;margin-top:14px}
.journey-tab{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  padding:8px 20px;cursor:pointer;border:1px solid var(--border);border-bottom:none;
  background:var(--surface-inset);color:#3a4252;border-radius:var(--radius) var(--radius) 0 0;
  transition:all .2s}
.journey-tab:hover{color:#1a1a1a;background:var(--surface)}
.journey-tab.active{background:var(--surface);color:var(--accent-dim);border-color:var(--border-accent);font-weight:700}
.journey-tab .j-label{margin-left:6px;font-weight:400;font-size:10px;color:#5d6470}
.journey-tab.active .j-label{color:var(--accent-dim)}

/* ── Station Pipeline Bar ── */
.pipeline-bar{position:sticky;top:0;z-index:90;background:rgba(125,139,157,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;white-space:nowrap;
  display:flex;gap:4px;align-items:center}
.pipeline-bar::-webkit-scrollbar{height:4px}
.pipeline-bar::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}
.stn-pill{font-family:var(--mono);font-size:10px;font-weight:500;padding:5px 12px;border-radius:20px;
  cursor:pointer;border:1px solid var(--border);background:var(--surface-inset);color:var(--text-dim);
  transition:all .2s;flex-shrink:0;display:inline-flex;align-items:center;gap:5px}
.stn-pill:hover{border-color:var(--border-accent);color:var(--text-muted)}
.stn-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.stn-pill.done{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.stn-pill.done::before{content:'✓';font-size:9px}
.stn-pill .stn-num{font-weight:700}
.pipeline-arrow{color:var(--text-dim);font-size:12px;flex-shrink:0;margin:0 2px}

/* ── Main Layout ── */
.main{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

/* ── Lecture ── */
.lecture{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;margin-bottom:24px}
.lecture h2{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.lecture h2 .stn-badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;
  background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-dim)}
.lecture h2 .stn-info-icon{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border-radius:50%;background:var(--surface-inset);border:1px solid var(--border-accent);color:var(--text-muted);
  font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
  font-style:italic;line-height:1;padding:0;margin-left:-4px}
.lecture h2 .stn-info-icon:hover{background:var(--accent-glow);color:var(--accent);border-color:var(--accent);
  transform:scale(1.1)}
.lecture h2 .stn-info-icon:focus{outline:2px solid var(--accent);outline-offset:2px}
.card-tile:hover{border-color:var(--accent) !important;background:var(--surface) !important;transform:translateX(2px)}
.lecture .concept{font-size:14px;color:var(--text-muted);line-height:1.8;margin-top:10px}
.lecture .concept strong{color:var(--text)}
.lecture .concept code{font-family:var(--mono);font-size:12px;background:var(--surface-inset);color:var(--accent);
  padding:2px 6px;border-radius:4px;border:1px solid var(--border)}

/* ── Before/After Panels ── */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.ba-grid{grid-template-columns:1fr}}
.ba-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.ba-panel h3{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ba-panel.before h3{color:var(--orange)}
.ba-panel.after h3{color:var(--green)}
.ba-panel .ba-content{padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.8;
  max-height:360px;overflow:auto;color:var(--text-muted)}
.ba-panel .ba-content::-webkit-scrollbar{width:4px}
.ba-panel .ba-content::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}

/* ── HL7 Message Display ── */
.hl7-msg{white-space:pre;font-family:var(--mono);font-size:11.5px;line-height:1.9}
.hl7-msg .seg-name{color:var(--cyan);font-weight:700}
.hl7-msg .pipe{color:var(--pipe);font-weight:700}
.hl7-msg .field-val{color:var(--text-muted)}
.hl7-msg .hl-field{background:var(--accent-glow);color:var(--accent);padding:1px 3px;border-radius:3px;cursor:pointer}
.hl7-msg .mllp-frame{color:var(--red);font-weight:700;font-size:10px}
.hex-display{color:var(--text-dim);font-size:10px;font-family:var(--mono);letter-spacing:1px}
.field-table{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--mono)}
.field-table th{text-align:left;color:var(--text-dim);font-weight:500;padding:5px 8px;border-bottom:1px solid var(--border);
  font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.field-table td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text-muted)}
.field-table td:first-child{color:var(--cyan);font-weight:600}
.field-table tr:hover td{background:var(--surface-inset)}

/* ── Task Panel ── */
.task-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 28px;margin-bottom:20px}
.task-panel h3{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.task-prompt{font-size:14px;color:var(--text);margin-bottom:16px;line-height:1.7}
.task-prompt code{font-family:var(--mono);font-size:12px;background:var(--surface-inset);color:var(--accent);
  padding:2px 6px;border-radius:4px}

/* ── Choice Buttons ── */
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--surface-inset);cursor:pointer;text-align:left;
  font-family:var(--sans);font-size:13px;color:var(--text-muted);transition:all .2s;line-height:1.5}
.choice-btn:hover{border-color:var(--border-accent);color:var(--text);background:var(--surface)}
.choice-btn .choice-key{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--text-dim);
  min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:4px;flex-shrink:0}
.choice-btn.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.choice-btn.correct .choice-key{border-color:var(--green);color:var(--green)}
.choice-btn.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.choice-btn.wrong .choice-key{border-color:var(--red);color:var(--red)}
.choice-btn.disabled{pointer-events:none;opacity:.6}

/* ── Fill-in-Blank ── */
.fill-group{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
.fill-label{font-size:13px;color:var(--text-muted);font-family:var(--mono)}
.fill-input{font-family:var(--mono);font-size:13px;background:var(--surface-inset);color:var(--text);
  border:1px solid var(--border);border-radius:4px;padding:6px 10px;width:180px;outline:none;transition:border .2s}
.fill-input:focus{border-color:var(--accent)}
.fill-input.correct{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.fill-input.wrong{border-color:var(--red);color:var(--red);background:var(--red-bg)}

/* ── Action Bar ── */
.action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.action-bar .left-actions,.action-bar .right-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:12px;font-weight:600;padding:8px 18px;border-radius:var(--radius);
  border:1px solid var(--border);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn.primary{background:var(--accent-badge);color:#1a1a1a;border-color:var(--accent-badge);font-weight:700}
.btn.primary:hover{box-shadow:0 2px 16px var(--accent-glow);background:#cc9633}
.btn.primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn.secondary{background:transparent;color:var(--text-muted);border-color:var(--border)}
.btn.secondary:hover{color:var(--text);border-color:var(--border-accent);background:var(--surface)}
.btn.warning{background:transparent;color:var(--orange);border-color:rgba(142,77,16,.45)}
.btn.warning:hover{background:var(--orange-bg)}
.btn.danger{background:transparent;color:var(--red);border-color:rgba(156,56,45,.45)}
.btn.danger:hover{background:var(--red-bg)}

/* ── ACK Feedback ── */
.ack-panel{margin-top:16px;border-radius:var(--radius);padding:14px 18px;font-family:var(--mono);font-size:12px;
  line-height:1.8;display:none}
.ack-panel.visible{display:block}
.ack-panel.aa{background:var(--green-bg);border:1px solid rgba(31,104,67,.35);color:var(--green)}
.ack-panel.ae{background:var(--orange-bg);border:1px solid rgba(142,77,16,.35);color:var(--orange)}
.ack-panel.ar{background:var(--red-bg);border:1px solid rgba(156,56,45,.35);color:var(--red)}
.ack-panel .ack-header{font-weight:700;margin-bottom:4px}
.ack-panel .ack-msg{white-space:pre;font-size:11px}

/* ── Explanation ── */
.explanation{margin-top:14px;padding:14px 18px;background:var(--blue-bg);border:1px solid rgba(44,86,128,.30);
  border-radius:var(--radius);font-size:13px;color:var(--blue);line-height:1.7;display:none}
.explanation.visible{display:block}

/* ── Lanes SVG ── */
.lanes-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;margin-bottom:24px;overflow:hidden}
.lanes-section h3{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:12px}
.lanes-svg-wrap{overflow-x:auto}
.lanes-svg-wrap svg text{font-family:var(--mono)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-accent);border-radius:var(--radius-lg);
  width:90%;max-width:720px;max-height:80vh;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-family:var(--serif);font-size:18px;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px;overflow-y:auto;font-size:14px;line-height:1.8;color:var(--text-muted)}
.modal-body h4{font-family:var(--mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin:16px 0 8px}
.modal-body code{font-family:var(--mono);font-size:12px;background:var(--surface-inset);color:var(--accent);padding:2px 6px;border-radius:4px}
.modal-body .gloss-term{margin-bottom:12px}
.modal-body .gloss-term dt{font-family:var(--mono);font-weight:600;color:var(--text);font-size:13px}
.modal-body .gloss-term dd{color:var(--text-muted);font-size:13px;margin-left:16px}

/* ── Patient Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none}
.drawer-overlay.show{display:block}
.patient-drawer{position:fixed;top:0;right:-420px;width:400px;height:100%;background:var(--surface);
  border-left:1px solid var(--border-accent);z-index:160;transition:right .3s ease;overflow-y:auto;padding:24px}
.patient-drawer.open{right:0}
.drawer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.drawer-header h3{font-family:var(--serif);font-size:18px;color:var(--text)}
.drawer-patient-info{font-size:13px;color:var(--text-muted);margin-bottom:16px}
.drawer-patient-info .label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.drawer-msg-list{list-style:none}
.drawer-msg-list li{font-family:var(--mono);font-size:11px;padding:6px 10px;border-left:2px solid var(--border);
  margin-bottom:4px;color:var(--text-muted);transition:all .15s}
.drawer-msg-list li:hover{border-color:var(--accent);color:var(--text);background:var(--surface-inset)}
.drawer-msg-list li .msg-type{color:var(--cyan);font-weight:600}

/* ── Parser Panel ── */
.parser-toggle{position:fixed;bottom:20px;right:20px;z-index:80;background:var(--accent-badge);color:#1a1a1a;
  border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;
  box-shadow:0 4px 20px var(--accent-glow);transition:transform .2s}
.parser-toggle:hover{transform:scale(1.1)}
.parser-panel{position:fixed;bottom:80px;right:20px;z-index:80;width:420px;max-height:50vh;
  background:var(--surface);border:1px solid var(--border-accent);border-radius:var(--radius-lg);
  box-shadow:0 8px 32px rgba(0,0,0,.4);display:none;flex-direction:column}
.parser-panel.open{display:flex}
.parser-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.parser-header h4{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.5px}
.parser-input{width:100%;border:none;background:var(--surface-inset);color:var(--text);font-family:var(--mono);
  font-size:11px;padding:12px;resize:vertical;min-height:80px;max-height:120px;outline:none}
.parser-output{padding:12px;overflow-y:auto;max-height:280px;font-family:var(--mono);font-size:11px}
.parser-field{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.parser-field:hover{background:var(--surface-inset)}
.parser-field .pf-addr{color:var(--cyan);font-weight:600;min-width:60px}
.parser-field .pf-name{color:var(--text-dim);min-width:120px;font-size:10px}
.parser-field .pf-val{color:var(--text-muted)}

/* ── Utilities ── */
.empty-state{color:var(--text-dim);font-style:italic;font-size:13px;padding:20px;text-align:center}
.tag{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-12{margin-bottom:12px}
.code-block{background:var(--surface-inset);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;font-family:var(--mono);font-size:11.5px;line-height:1.8;overflow-x:auto;color:var(--text-muted)}
.scorecard{position:fixed;top:60px;right:20px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--text-dim);
  z-index:50;min-width:120px}
.scorecard .sc-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px}
.scorecard .sc-val{color:var(--accent);font-weight:600}
/* ════════════════════════════════════════════════════════════════
   USER-REQUESTED COLOR OVERRIDES
   ════════════════════════════════════════════════════════════════ */

/* Item 9: outer page bg → match header blue */
body{background:#1e4670}

/* Items 1-3: pipeline ribbon stations */
.stn-pill{background:#73798a;color:#000;border-color:#525861}
.stn-pill .stn-num{color:#000}
.stn-pill:hover{background:#8a92a0;color:#000;border-color:#5d6470}
.stn-pill.done{background:#5cae6a;color:#000;border-color:#3d9555}
.stn-pill.done:hover{background:#7cc188;color:#000;border-color:#5cae6a}
.stn-pill.done .stn-num{color:#000}
.stn-pill.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.stn-pill.active:hover{background:#5fa0d0;color:#000;border-color:#4a90c2}
.stn-pill.active .stn-num{color:#000}
.stn-pill.done.active{background:#4a90c2;color:#000;border-color:#3a7aa6}

/* Item 4: action button labels → black text */
.btn.secondary{color:#000}
.btn.secondary:hover{color:#000}
.btn.warning{color:#000}
.btn.warning:hover{color:#000}
.btn.danger{color:#000}
.btn.danger:hover{color:#000}

<p>The framing uses three bytes: a <strong>start block</strong> (<code>0x0B</code>, the vertical tab character) signals "a message begins here," then the message content follows, then an <strong>end block</strong> (<code>0x1C</code>, file separator) plus a <strong>carriage return</strong> (<code>0x0D</code>) signals "this message is complete." The <code>0x0B</code> byte was chosen specifically because it almost never appears in clinical text, making it a reliable sentinel.</p>
<p><strong>Inside the frame:</strong> The <strong>MSH segment</strong> is always the first segment. It acts as the message's envelope — identifying who sent it, who should receive it, what type of event it describes, and when it was created. Key fields: the field separator (<code>MSH-1</code> = <code>|</code>), encoding characters (<code>MSH-2</code> = <code>^~\\&</code>), sending/receiving apps and facilities (<code>MSH-3</code> through <code>MSH-6</code>), timestamp (<code>MSH-7</code>), message type and trigger event (<code>MSH-9</code>), unique control ID (<code>MSH-10</code>), and version (<code>MSH-12</code>).</p>

<p><strong>Worked example — parsing <code>PID.5.1</code> step by step:</strong></p>

<p>When messages arrive from <strong>multiple source systems</strong>, patient identity must be resolved. The same patient may have different MRNs at different hospitals. Different patients may share similar names. The <strong>Master Patient Index (MPI)</strong> resolves these ambiguities.</p>
<p><strong>Deterministic matching</strong> uses exact field matches: same MRN + same facility = same patient (auto-link, high confidence). <strong>Probabilistic matching</strong> uses weighted similarity scores across multiple fields: fuzzy name match + DOB match + partial address match = confidence score. If the score exceeds a threshold, the records are linked. Below a lower threshold, a new record is created. Between thresholds, the match is flagged for <strong>manual review</strong>.</p>
<p>Getting MPI wrong has serious consequences: a <strong>false merge</strong> (combining two different patients) mixes clinical data — potentially fatal. A <strong>false split</strong> (failing to link the same patient) fragments the medical record — clinically dangerous and operationally expensive to fix.</p>

<div class="concept">
<p>HIPAA's <strong>Safe Harbor</strong> de-identification method requires removing or generalizing <strong>18 categories of identifiers</strong>. In HL7 v2, PHI is scattered across multiple segment types — not concentrated in one place like a document header. Each segment requires its own de-identification logic.</p>
<p>The critical skill: knowing which fields ARE PHI and which are NOT. <code>PID.5</code> (patient name) is obviously PHI. But <code>PID.8</code> (administrative sex) is <strong>not</strong> PHI under Safe Harbor — it's demographic data that doesn't individually identify a patient. <code>PID.7</code> (date of birth) IS PHI — but only the month and day; the year can be retained (unless the patient is over 89, in which case the year is aggregated to 90+).</p>
<p><strong>The Safe Harbor field map for HL7 v2:</strong> Names → PID.5, NK1.2, IN1.16, GT1.3. Addresses → PID.11, NK1.4. Dates → PID.7, PV1.44, PV1.45 (keep year only). Phone/fax → PID.13, PID.14, NK1.5, NK1.6. SSN → PID.19. MRN → PID.3. Account numbers → PID.18, PV1.19.</p>

<p>Converting HL7 v2 segments to FHIR resources is <strong>not a one-to-one mapping</strong>. The two standards have fundamentally different information architectures. HL7 v2 is <em>segment-oriented</em> — PID holds demographics, OBX holds observations, and their relationship is positional (OBX follows OBR follows PID). FHIR is <em>resource-oriented</em> — a Patient resource, an Observation resource, and an explicit <code>Observation.subject</code> reference connecting them.</p>
<p>The official <strong>HL7 v2-to-FHIR Implementation Guide</strong> governs these mappings. Key patterns: <code>PID → Patient</code>, <code>PV1 → Encounter</code>, <code>OBX → Observation</code>, <code>DG1 → Condition</code>, <code>IN1 → Coverage</code>. But context matters — an OBX can also become an AllergyIntolerance or Condition depending on OBX-3.</p>
<p><strong>Each FHIR resource must carry references</strong> to related resources. An Observation needs <code>subject</code> (→ Patient) and <code>encounter</code> (→ Encounter). These references are what give FHIR its interconnected graph structure — a fundamentally different model from v2's flat segment list.</p>

// ──────────── HL7 HIGHLIGHTING ────────────
function highlightHL7(msg){
  if(!msg) return '';
  const segs = msg.split('\r');
  return segs.map(seg => {
    const name = seg.substring(0,3);
    const rest = seg.substring(3);
    const highlighted = rest.replace(/\|/g,'<span class="pipe">|</span>')
                           .replace(/\^/g,'<span style="color:var(--purple)">^</span>')
                           .replace(/~/g,'<span style="color:var(--cyan)">~</span>');
    return `<span class="seg-name">${esc(name)}</span>${highlighted}`;
  }).join('\n');
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderStation(reset = true){
  const s = STATIONS[currentStation];
  const j = s.journeys[currentJourney];
  if(!j) return;

  // Lecture
  document.getElementById('lectureSection').innerHTML = j.lecture;

  // Inject info icon ("i") next to the station badge for opening this station's reference card
  const lectureBadge = document.querySelector('#lectureSection h2 .stn-badge');
  if(lectureBadge && !document.querySelector('#lectureSection .stn-info-icon')){
    const infoBtn = document.createElement('button');
    infoBtn.className = 'stn-info-icon';
    infoBtn.setAttribute('type', 'button');
    infoBtn.setAttribute('title', `Open Station ${s.id} reference card`);
    infoBtn.setAttribute('aria-label', `Open Station ${s.id} reference card`);
    infoBtn.textContent = 'i';
    infoBtn.onclick = function(){ openStationCard(s.id); };
    lectureBadge.parentNode.insertBefore(infoBtn, lectureBadge.nextSibling);
  }

  // Before/After
  const bp = document.getElementById('beforePanel');
  const ap = document.getElementById('afterPanel');
  bp.innerHTML = typeof j.before.content === 'function' ? j.before.content() : j.before.content;
  ap.innerHTML = typeof j.after.content === 'function' ? j.after.content() : j.after.content;

  // Tasks
  renderTasks(s, j);

  // Hide ACK and explanation (only on full reset / navigation)
  if(reset){
    const ackP = document.getElementById('ackPanel');
    ackP.className = 'ack-panel';
    ackP.innerHTML = '';
    document.getElementById('explanationPanel').className = 'explanation';
    document.getElementById('explanationPanel').innerHTML = '';
  }

  // Button states
  const js = state[currentJourney];
  const done = js.completed.includes(s.id);
  document.getElementById('nextBtn').disabled = !done;
  document.getElementById('hintBtn').style.display = j.tasks.length ? '' : 'none';
  document.getElementById('revealBtn').style.display = j.tasks.length ? '' : 'none';

  // Scroll to top (only on full reset / navigation)
  if(reset) window.scrollTo({top:0,behavior:'smooth'});
}

function renderTasks(station, jData){
  const panel = document.getElementById('taskPanel');
  if(!jData.tasks || jData.tasks.length === 0){
    panel.innerHTML = '<div class="empty-state">No exercises for this station yet — content building in progress.</div>';
    return;
  }

  const js = state[currentJourney];
  const stationDone = js.completed.includes(station.id);

  let html = '<h3>🎯 Exercise</h3>';
  jData.tasks.forEach((task, ti) => {
    const taskKey = `s${station.id}_t${ti}`;
    const answered = js.decisions[taskKey] !== undefined;

    if(task.type === 'choice'){
      html += `<div class="task-prompt">${task.prompt}</div>`;
      html += '<div class="choices">';
      task.options.forEach(opt => {
        let cls = 'choice-btn';
        if(answered || stationDone){
          cls += ' disabled';
          if(opt.correct) cls += ' correct';
          else if(js.decisions[taskKey] === opt.key && !opt.correct) cls += ' wrong';
        }
        html += `<div class="${cls}" onclick="handleChoice(${station.id},${ti},'${opt.key}',${opt.correct})">
          <span class="choice-key">${opt.key}</span><span>${opt.text}</span>
        </div>`;
      });
      html += '</div>';
    }
    else if(task.type === 'fill'){
      html += `<div class="task-prompt">${task.prompt}</div>`;
      if(task.display) html += `<div class="code-block mb-12">${task.display}</div>`;
      task.blanks.forEach((b, bi) => {
        const blankKey = `${taskKey}_b${bi}`;
        const val = js.decisions[blankKey] || '';
        const correct = answered && b.accept.some(a => a.toLowerCase() === val.toLowerCase());
        html += `<div class="fill-group">
          <span class="fill-label">${b.label}</span>
          <input class="fill-input ${answered?(correct?'correct':'wrong'):''}" 
                 id="${blankKey}" value="${esc(val)}" 
                 ${answered||stationDone?'disabled':''}
                 onkeydown="if(event.key==='Enter')handleFill(${station.id},${ti})" />
        </div>`;
      });
      if(!answered && !stationDone){
        html += `<button class="btn primary mt-12" onclick="handleFill(${station.id},${ti})">Check Answer</button>`;
      }
    }
  });
  panel.innerHTML = html;
}

// ──────────── INTERACTION HANDLERS ────────────
function handleChoice(stationId, taskIdx, key, isCorrect){
  const js = state[currentJourney];
  const taskKey = `s${stationId}_t${taskIdx}`;
  if(js.decisions[taskKey] !== undefined) return;

  js.decisions[taskKey] = key;
  const task = STATIONS.find(s=>s.id===stationId).journeys[currentJourney].tasks[taskIdx];

  showACK(isCorrect ? 'AA' : 'AE', task.ackId, isCorrect ? 'Message accepted — correct answer.' : 'Application error — review and try again.');

  if(isCorrect){
    if(!js.completed.includes(stationId)) js.completed.push(stationId);
    document.getElementById('nextBtn').disabled = false;
    showExplanation(task.explanation);
  }
  saveState();
  renderStation(false);
}

function handleFill(stationId, taskIdx){
  const js = state[currentJourney];
  const task = STATIONS.find(s=>s.id===stationId).journeys[currentJourney].tasks[taskIdx];
  const taskKey = `s${stationId}_t${taskIdx}`;

  let allCorrect = true;
  task.blanks.forEach((b, bi) => {
    const blankKey = `${taskKey}_b${bi}`;
    const input = document.getElementById(blankKey);
    if(!input) return;
    const val = input.value.trim();
    js.decisions[blankKey] = val;
    const correct = b.accept.some(a => a.toLowerCase() === val.toLowerCase());
    if(!correct) allCorrect = false;
  });

  js.decisions[taskKey] = allCorrect ? 'correct' : 'wrong';

  showACK(allCorrect ? 'AA' : 'AE', task.ackId, allCorrect ? 'All fields correct.' : 'One or more fields incorrect — check your answers.');

  if(allCorrect){
    if(!js.completed.includes(stationId)) js.completed.push(stationId);
    document.getElementById('nextBtn').disabled = false;
    showExplanation(task.explanation);
  }
  saveState();
  renderStation(false);
}

function showHint(){
  const s = STATIONS[currentStation];
  const j = s.journeys[currentJourney];
  if(!j.tasks.length) return;
  const task = j.tasks[0];
  const js = state[currentJourney];
  const hintKey = `s${s.id}`;
  js.hints[hintKey] = (js.hints[hintKey]||0) + 1;
  saveState();
  updateScorecard();

  showACK('AE', task.ackId || 'HINT', task.hint);
}

function revealAnswer(){
  const s = STATIONS[currentStation];
  const j = s.journeys[currentJourney];
  if(!j.tasks.length) return;
  const js = state[currentJourney];
  const revKey = `s${s.id}`;
  js.reveals[revKey] = (js.reveals[revKey]||0) + 1;

  // Mark all tasks as answered
  j.tasks.forEach((task, ti) => {
    const taskKey = `s${s.id}_t${ti}`;
    if(js.decisions[taskKey] !== undefined) return;
    if(task.type === 'choice'){
      const correct = task.options.find(o=>o.correct);
      js.decisions[taskKey] = correct ? correct.key : 'A';
    } else if(task.type === 'fill'){
      task.blanks.forEach((b, bi) => {
        js.decisions[`${taskKey}_b${bi}`] = b.answer;
      });
      js.decisions[taskKey] = 'revealed';
    }
  });

  if(!js.completed.includes(s.id)) js.completed.push(s.id);
  saveState();

  showACK('AA', j.tasks[0].ackId||'REVEAL', 'Answer revealed — review the explanation below.');
  showExplanation(j.tasks[j.tasks.length-1].explanation || 'Answer revealed.');
  renderStation(false);
  // After re-render, scroll the explanation panel into view so the user
  // sees the revealed answer / explanation rather than being yanked to top.
  setTimeout(() => {
    const exp = document.getElementById('explanationPanel');
    if(exp) exp.scrollIntoView({behavior:'smooth', block:'center'});
  }, 50);
}

// ──────────── ACK FEEDBACK ────────────
function showACK(code, controlId, text){
  const panel = document.getElementById('ackPanel');
  const cls = code === 'AA' ? 'aa' : code === 'AE' ? 'ae' : 'ar';
  const label = code === 'AA' ? 'Application Accept' : code === 'AE' ? 'Application Error' : 'Application Reject';
  panel.className = `ack-panel visible ${cls}`;
  panel.innerHTML = `<div class="ack-header">MSA|${code}|${controlId}</div>
<div class="ack-msg">${label}: ${text}</div>`;
}

function showExplanation(text){
  const panel = document.getElementById('explanationPanel');
  panel.className = 'explanation visible';
  panel.innerHTML = `<strong>Explanation:</strong> ${text}`;
}

// ──────────── NAVIGATION ────────────
function switchJourney(j){
  currentJourney = j;
  document.querySelectorAll('.journey-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.j === j);
  });
  render();
}

function goToStation(idx){
  currentStation = idx;
  render();
}

function nextStation(){
  if(currentStation < STATIONS.length - 1){
    currentStation++;
    render();
  }
}

// ──────────── PATIENT LANES SVG ────────────
function renderLanes(){
  const svg = document.getElementById('lanesSvg');
  const js = state[currentJourney];
  const W = 900, rowH = 38, headerH = 30, padL = 120;
  const stationW = (W - padL) / STATIONS.length;

  let html = '';
  // Station headers
  STATIONS.forEach((s, i) => {
    const x = padL + i * stationW + stationW/2;
    html += `<text x="${x}" y="14" fill="${i===currentStation?'#e5a832':'#475569'}" font-size="8" text-anchor="middle" font-weight="${i===currentStation?'700':'400'}">${s.shortName}</text>`;
  });

  // Patient rows
  PATIENTS.forEach((p, pi) => {
    const y = headerH + pi * rowH;
    html += `<text x="4" y="${y+22}" fill="${p.color}" font-size="10" font-weight="600" style="cursor:pointer" onclick="openDrawer('${p.id}')">${p.name}</text>`;

    STATIONS.forEach((s, si) => {
      const x = padL + si * stationW + stationW/2;
      const done = js.completed.includes(s.id);
      const active = si === currentStation;
      const fill = done ? '#34d399' : active ? '#e5a832' : '#1e2d45';
      const stroke = done ? '#34d399' : active ? '#e5a832' : '#2d4a6e';
      html += `<rect x="${x-8}" y="${y+8}" width="16" height="16" rx="3" fill="${fill}" fill-opacity="${done?'0.2':'0.1'}" stroke="${stroke}" stroke-width="1"/>`;
      if(done) html += `<text x="${x}" y="${y+20}" fill="#34d399" font-size="9" text-anchor="middle">✓</text>`;
      else if(active) html += `<text x="${x}" y="${y+20}" fill="#e5a832" font-size="9" text-anchor="middle">●</text>`;
    });
  });

  svg.innerHTML = html;
}

// ──────────── PATIENT DRAWER ────────────
function openDrawer(pid){
  const p = PATIENTS.find(pt => pt.id === pid);
  if(!p) return;
  document.getElementById('drawerTitle').textContent = p.name;
  let html = `<div class="drawer-patient-info">
    <div><span class="label">ID:</span> ${p.id} · <span class="label">MRN:</span> ${p.mrn}</div>
    <div><span class="label">Age:</span> ${p.age}${p.sex} · <span class="label">Role:</span> ${p.role}</div>
  </div>
  <h4 style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Message Stream</h4>
  <ul class="drawer-msg-list">`;
  Object.entries(p.messages).forEach(([key, msg]) => {
    const msh9 = msg.match(/\|\|([A-Z]+\^[A-Z0-9]+)/);
    html += `<li><span class="msg-type">${msh9?msh9[1]:key}</span> — ${key.replace(/_/g,' ')}</li>`;
  });
  html += '</ul>';
  html += `<h4 style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px">Sample Message (ADT)</h4>`;
  html += `<div class="code-block" style="font-size:10px;max-height:300px;overflow:auto">${highlightHL7(p.messages.ADT_A01)}</div>`;

  document.getElementById('drawerBody').innerHTML = html;
  document.getElementById('patientDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('show');
}

function closeDrawer(){
  document.getElementById('patientDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('show');
}

// ──────────── GLOSSARY MODAL ────────────
function openGlossary(){
  document.getElementById('modalTitle').textContent = 'Glossary';
  let html = '<dl>';
  Object.entries(GLOSSARY).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([term, def]) => {
    html += `<div class="gloss-term"><dt>${term}</dt><dd>${def}</dd></div>`;
  });
  html += '</dl>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

// ──────────── REFERENCE CARDS ────────────
function extractCardSummary(lectureHTML){
  if(!lectureHTML) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = lectureHTML;
  const para = tmp.querySelector('.concept p');
  if(!para) return '';
  let text = para.textContent.trim().replace(/\s+/g,' ');
  if(text.length > 280) text = text.substring(0, 280).replace(/\s\S*$/, '') + '…';
  return text;
}

function getActiveLecture(stn){
  const j = stn.journeys[currentJourney] || stn.journeys.J1;
  return j ? j.lecture : '';
}

function openCardLibrary(){
  document.getElementById('modalTitle').textContent = '📚 Reference Card Library';
  let html = '<p style="color:var(--text-dim);margin-bottom:16px;font-size:13px">Quick-reference cards for each pipeline station. Click a card to jump to that station.</p>';
  STATIONS.forEach((s, idx) => {
    const summary = extractCardSummary(getActiveLecture(s));
    const done = state[currentJourney].completed.includes(s.id);
    html += `<div class="card-tile" onclick="goToStationFromModal(${idx})" style="margin-bottom:10px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-inset);cursor:pointer;transition:all .15s">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:18px">${s.icon||'•'}</span>
        <strong style="color:var(--text);font-size:14px">Station ${s.id}: ${s.name}</strong>
        ${done ? '<span style="color:var(--green);font-size:11px;font-family:var(--mono)">✓ done</span>' : ''}
        <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--accent);border:1px solid var(--accent);padding:2px 6px;border-radius:10px">Part 1</span>
      </div>
      <div style="font-size:12.5px;color:var(--text-muted);line-height:1.6">${summary || '<em>(no preview)</em>'}</div>
    </div>`;
  });
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function openStationCard(stationId){
  const stn = STATIONS.find(s=>String(s.id)===String(stationId));
  if(!stn) return;
  const lecture = getActiveLecture(stn);
  const summary = extractCardSummary(lecture);
  const j = stn.journeys[currentJourney] || stn.journeys.J1;
  const tasksList = j ? j.tasks || [] : [];
  const labels = {J1:'Foundations', J2:'Production Reality', J3:'Governance & Ops'};

  document.getElementById('modalTitle').textContent = `${stn.icon||''} Station ${stn.id} Reference Card`.trim();

  const tmp = document.createElement('div');
  tmp.innerHTML = lecture;
  const lectureText = tmp.textContent || '';
  const segMatches = [...lectureText.matchAll(/\b(MSH|PID|PV1|OBX|OBR|DG1|IN1|NK1|NTE|EVN|RXA|ZPM|GT1|MSA|ERR|ORC)(?:[-.]\d+(?:\.\d+)?)?\b/g)];
  const uniqueSegs = [...new Set(segMatches.map(m => m[0]))].slice(0, 12);

  const taskCount = tasksList.length;
  const choiceCount = tasksList.filter(t => t.type === 'choice').length;
  const fillCount = tasksList.filter(t => t.type === 'fill').length;

  let html = `<div style="font-size:13px;color:var(--text-muted);line-height:1.7">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
      <strong style="color:var(--text);font-size:15px">${stn.name}</strong>
      <span style="font-family:var(--mono);font-size:10px;color:var(--accent);border:1px solid var(--accent);padding:2px 8px;border-radius:10px">Part 1 · ${currentJourney} ${labels[currentJourney]||''}</span>
    </div>

    <div style="margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px">Concept Summary</div>
      <div>${summary || '<em>(no summary)</em>'}</div>
    </div>`;

  if(uniqueSegs.length){
    html += `<div style="margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px">Key Fields & Segments</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${uniqueSegs.map(s => `<code style="font-family:var(--mono);font-size:11px;background:var(--surface-inset);color:var(--accent);padding:3px 8px;border-radius:4px;border:1px solid var(--border)">${s}</code>`).join('')}
      </div>
    </div>`;
  }

  html += `<div style="margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px">Exercises (current journey)</div>
      <div>${taskCount} total · ${choiceCount} multiple-choice · ${fillCount} fill-in-blank</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
      <button class="btn primary" style="flex:1" onclick="closeModal()">Continue Station</button>
      <button class="btn secondary" onclick="closeModal();openCardLibrary()">📚 Full Library</button>
    </div>
  </div>`;

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function goToStationFromModal(idx){
  closeModal();
  goToStation(idx);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

// ──────────── LIVE MESSAGE PARSER ────────────
function toggleParser(){
  document.getElementById('parserPanel').classList.toggle('open');
}

function parseMessage(){
  const input = document.getElementById('parserInput').value.trim();
  const output = document.getElementById('parserOutput');
  if(!input){ output.innerHTML = ''; return; }

  const segments = input.split(/[\r\n]+/).filter(s => s.trim());
  let html = '';
  segments.forEach(seg => {
    const fields = seg.split('|');
    const segName = fields[0];
    // MSH is special — MSH-1 IS the separator
    const offset = segName === 'MSH' ? 1 : 0;
    fields.forEach((f, fi) => {
      if(fi === 0 && segName !== 'MSH') return; // segment name, not a field
      const fieldNum = segName === 'MSH' ? fi : fi;
      const addr = `${segName}.${fieldNum}`;
      const fname = getFieldName(segName, fieldNum);
      if(f && fi > 0){
        // Parse components
        const comps = f.split('^');
        if(comps.length > 1){
          comps.forEach((c, ci) => {
            if(!c) return;
            html += `<div class="parser-field">
              <span class="pf-addr">${addr}.${ci+1}</span>
              <span class="pf-name">${fname}[${ci+1}]</span>
              <span class="pf-val">${esc(c)}</span>
            </div>`;
          });
        } else {
          html += `<div class="parser-field">
            <span class="pf-addr">${addr}</span>
            <span class="pf-name">${fname}</span>
            <span class="pf-val">${esc(f)}</span>
          </div>`;
        }
      }
    });
    html += '<div style="border-bottom:1px solid var(--border-accent);margin:4px 0"></div>';
  });
  output.innerHTML = html || '<div class="empty-state">No parseable fields found</div>';
}

function getFieldName(seg, field){
  const names = {
    MSH:{1:'Field Separator',2:'Encoding Characters',3:'Sending Application',4:'Sending Facility',5:'Receiving Application',6:'Receiving Facility',7:'Date/Time',8:'Security',9:'Message Type',10:'Message Control ID',11:'Processing ID',12:'Version ID'},
    PID:{1:'Set ID',2:'Patient ID (ext)',3:'Patient Identifier List',4:'Alt Patient ID',5:'Patient Name',6:'Mother Maiden Name',7:'Date of Birth',8:'Admin Sex',9:'Patient Alias',10:'Race',11:'Patient Address',12:'County Code',13:'Phone (Home)',14:'Phone (Business)',18:'Patient Account',19:'SSN'},
    PV1:{1:'Set ID',2:'Patient Class',3:'Assigned Location',4:'Admission Type',7:'Attending Doctor',10:'Hospital Service',14:'Admit Source',19:'Visit Number',44:'Admit Date',45:'Discharge Date'},
    OBR:{1:'Set ID',2:'Placer Order',3:'Filler Order',4:'Universal Service ID',7:'Observation Date'},
    OBX:{1:'Set ID',2:'Value Type',3:'Observation Identifier',4:'Observation Sub-ID',5:'Observation Value',6:'Units',7:'Reference Range',8:'Abnormal Flags',11:'Observation Status',14:'Date of Observation'},
    DG1:{1:'Set ID',2:'Diagnosis Coding Method',3:'Diagnosis Code',4:'Diagnosis Description',6:'Diagnosis Type'},
    IN1:{1:'Set ID',2:'Insurance Plan ID',3:'Insurance Company ID',16:'Name of Insured'},
    NK1:{1:'Set ID',2:'Name',4:'Address',5:'Phone'},
    NTE:{1:'Set ID',2:'Source of Comment',3:'Comment'},
    EVN:{1:'Event Type',2:'Recorded Date/Time'}
  };
  return (names[seg] && names[seg][field]) || '';
}

// ──────────── SCORECARD ────────────
function updateScorecard(){
  const js = state[currentJourney];
  document.getElementById('scDone').textContent = `${js.completed.length}/13`;
  const totalHints = Object.values(js.hints).reduce((a,b)=>a+b,0);
  const totalReveals = Object.values(js.reveals).reduce((a,b)=>a+b,0);
  document.getElementById('scHints').textContent = totalHints;
  document.getElementById('scReveals').textContent = totalReveals;
}

// ──────────── KEYBOARD ────────────
window.addEventListener('keydown', e => {
  if(e.key === 'Escape'){ closeModal(); closeDrawer(); }
});

// ──────────── BOOT ────────────
window.addEventListener('DOMContentLoaded', render);

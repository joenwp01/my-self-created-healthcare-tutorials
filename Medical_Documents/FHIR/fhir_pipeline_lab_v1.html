<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHIR Pipeline Lab — Cascade Cohort</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/station.css">
<style>
  /* Start-screen specific styles */
  .selector-intro { max-width: 820px; margin: 16px auto 28px; text-align: center; }
  .selector-intro h2 { font-size: 24px; color: #ececec; margin-bottom: 8px; font-weight: 600; }
  .selector-intro p { color: #cfd7e0; font-size: 14px; line-height: 1.6; }

  .journey-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1080px;
    margin: 0 auto;
  }
  @media (max-width: 820px) { .journey-cards { grid-template-columns: 1fr; } }

  .journey-card {
    background: #ececec;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
    transition: all 0.25s;
  }
  .journey-card:hover:not(.locked) { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.22); }
  .journey-card.active-journey {
    box-shadow: 0 0 0 3px rgba(255,255,255,0.4), 0 4px 14px rgba(0,0,0,0.2);
  }
  .journey-card.locked {
    filter: grayscale(0.75) opacity(0.7);
    pointer-events: none;
  }
  .journey-card.locked .btn,
  .journey-card.locked button {
    pointer-events: auto; /* reset button still clickable */
  }

  .jc-strip {
    height: 6px;
    background: var(--jc-accent);
  }
  .jc-body { padding: 22px; position: relative; }
  .jc-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .jc-head h3 {
    font-size: 20px;
    color: #1e4670;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .jc-subtitle {
    font-size: 13px;
    color: #5a6878;
    margin-top: 2px;
    font-weight: 500;
  }
  .jc-tagline {
    font-size: 13.5px;
    color: #3a4450;
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .jc-meta {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 14px;
    margin-bottom: 18px;
    font-size: 12.5px;
  }
  .jc-meta dt { color: #5a6878; font-weight: 600; }
  .jc-meta dd { color: #2a3947; }
  .jc-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .jc-actions .small { margin: 0; width: 100%; }
  .jc-lock-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(236,236,236,0.4);
    pointer-events: none;
  }
  .jc-lock-overlay span {
    background: #2a3947;
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .both-complete {
    max-width: 820px;
    margin: 28px auto 0;
    background: linear-gradient(135deg, #1e4670 0%, #4a90c2 50%, #52B2BF 100%);
    color: #fff;
    padding: 18px 24px;
    border-radius: 6px;
    text-align: center;
    font-size: 14px;
  }
</style>
</head>
<body>
<header class="app-header">
  <div>
    <h1>FHIR Pipeline Lab</h1>
    <div class="subtitle">Cascade Cohort · 5 patients · FHIR R4 · US Core 6.1.0</div>
    <div class="developer-line"><em>Developed by: Joe Williams</em></div>
  </div>
  <div class="header-right">
    <button class="nav-link" onclick="openGlossary()">📖 Glossary</button>
  </div>
</header>

<aside class="decorative-sidebar-left"></aside>
<aside class="decorative-sidebar-right"></aside>

<main class="app-main">
  <div id="selector-root"></div>
</main>

<!-- Glossary modal -->
<div class="modal-overlay" id="glossary-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Glossary</h3>
      <button class="close-btn" onclick="closeGlossary()">×</button>
    </div>
    <dl class="glossary-list" id="glossary-body"></dl>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/cohort.js"></script>
<script src="js/glossary.js"></script>
<script src="js/ui.js"></script>
<script src="js/selector.js"></script>
</body>
</html>

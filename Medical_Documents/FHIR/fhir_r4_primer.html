    pulseChecks:[
      {
        question:`Sofia's Patient resource arrives without a <code>birthDate</code>, even though US Core marks it as must-support. What does this indicate?`,
        options:[
          {key:'A',text:'The record is automatically invalid — birthDate has min cardinality 1 in US Core Patient'},
          {key:'B',text:'The record is valid — must-support only means "send if known," and maybe the birth date was never recorded'},

        correctKey:'C',
        feedback:{
          correct:'Right. Must-support creates a producer obligation: if the data exists, send it. A patient in a medical system almost always has a recorded birth date. Absent birthDate is a likely conformance gap, not automatic invalidity — min cardinality allows its absence. But a conforming producer must not omit it when the data is present. A production pipeline routes this record to a quality review queue.',
          incorrect:'It\'s C. Must-support means: if the data exists, the producer must include it. A patient in an active medical record almost certainly has a birth date on file — its absence is a probable conformance violation. The record is not automatically schema-invalid (min cardinality allows absence) but it\'s a quality flag that warrants investigation.'

  {
    id:5, icon:'🔄',
    title:'SMART on FHIR and bulk data',
    subtitle:'Backend Services, $export, NDJSON, _include/_revinclude, and conditional create',
    endGoal:'You\'ll understand the Backend Services auth flow end-to-end, the $export polling sequence, and when to use each access pattern.',
    minutes:9,
    cards:['smartFhir','backendServices','bulkExport','ndjson','includeRevinclude','conditionalCreate'],
    lecture:`
<p>Segment 2 covered OAuth 2.0 mechanics — tokens, scopes, the client credentials flow. <button class="card-link" onclick="openCardModal('smartFhir')">SMART on FHIR</button> is the healthcare-specific profile that wraps OAuth 2.0 with FHIR-aware conventions: a standardized scope syntax, defined launch contexts (EHR launch, standalone launch, Backend Services), and a discovery mechanism for token endpoint URLs via the CapabilityStatement's security extension. When someone says "this FHIR server uses SMART," they mean OAuth 2.0 structured according to the SMART specification — which is what the FHIR Pipeline Lab uses throughout.</p>

<h4>SMART Backend Services — the pipeline auth flow, in full</h4>
<p>For server-to-server pipelines with no user interaction, <button class="card-link" onclick="openCardModal('backendServices')">SMART Backend Services</button> is the correct flow. Here's the complete runtime sequence:</p>
<pre class="code-block"><span class="hl-comment"># ONE-TIME SETUP (before any pipeline runs)</span>
<span class="hl-comment"># Register your public key (JWKS URL) with the authorization server</span>
<span class="hl-comment"># The server fetches your public key from this URL to verify your assertions</span>

<span class="hl-comment"># RUNTIME — Step 1: build and sign a JWT assertion</span>
{
  "iss": "https://pcp-system.cascade-valley.example",  <span class="hl-comment">// client ID</span>
  "sub": "https://pcp-system.cascade-valley.example",  <span class="hl-comment">// same as iss</span>
  "aud": "https://fhir.valley-uc.example/token",       <span class="hl-comment">// token endpoint URL</span>
  "exp": 1746900000,   <span class="hl-comment">// now + 5 minutes max</span>
  "jti": "a1b2c3d4-..."  <span class="hl-comment">// unique per request — prevents replay</span>
}
<span class="hl-comment"># Sign with RS256 private key (stored in secrets vault)</span>

<span class="hl-comment"># Step 2: POST to token endpoint</span>
<span class="hl-verb">POST</span> <span class="hl-url">/token</span>
grant_type=client_credentials
&scope=system/Patient.rs system/Condition.rs system/Observation.rs
&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer
&client_assertion=&lt;signed JWT&gt;

<span class="hl-ok">200 OK</span>  {"access_token":"eyJhb...","expires_in":900,"token_type":"bearer"}</pre>

<h4>$export — the bulk data sequence</h4>
<p>Issuing individual GET requests for a large cohort generates thousands of round-trips and stresses the server's connection pool. The FHIR Bulk Data IG defines <button class="card-link" onclick="openCardModal('bulkExport')">$export</button> — an asynchronous job that produces <button class="card-link" onclick="openCardModal('ndjson')">NDJSON</button> files, one per resource type. The Consume journey pulls the Cascade Cohort this way. The three-step sequence:</p>
<ol>
  <li><strong>Kick-off:</strong> <code>POST [base]/Group/{id}/$export</code> (or GET with appropriate headers). Response: <code>202 Accepted</code> + <code>Content-Location</code> header pointing to the polling URL.</li>
  <li><strong>Poll:</strong> <code>GET {polling-url}</code> periodically. While the job runs: <code>202 Accepted</code> (possibly with X-Progress header). When complete: <code>200 OK</code> with a JSON manifest body listing NDJSON file URLs by resource type.</li>
  <li><strong>Download:</strong> <code>GET</code> each file URL in the manifest. Each file has one FHIR resource per line. Files may be gzip-compressed (.ndjson.gz) — check Content-Encoding.</li>
</ol>
<p>Use group-scoped export (<code>/Group/{id}/$export</code>) rather than system-level (<code>/$export</code>) whenever possible. Group scope restricts the export to a defined patient cohort, which is more efficient, more aligned to the minimum-necessary principle, and easier to audit.</p>

<h4>_include and _revinclude — targeted graph traversal</h4>
<p>When you need related resources in a single search round-trip rather than a bulk export, <button class="card-link" onclick="openCardModal('includeRevinclude')">_include and _revinclude</button> extend the search Bundle to include referenced resources:</p>
<ul>
  <li><code>GET Observation?patient=p-sofia-001&amp;_include=Observation:subject</code> — returns Sofia's Observations plus the Patient resource they reference.</li>
  <li><code>GET Patient?_id=p-sofia-001&amp;_revinclude=Condition:subject</code> — returns Sofia's Patient record plus all Conditions that reference her as subject.</li>
</ul>
<p>Included resources appear in the Bundle with <code>search.mode = "include"</code>. Check the CapabilityStatement's <code>rest.resource[*].searchInclude</code> list before relying on _include combinations — not all servers support all combinations.</p>

<h4>Conditional create — preventing duplicates on submission</h4>
<p>When submitting resources to a server that may already have them, the <button class="card-link" onclick="openCardModal('conditionalCreate')">conditional create</button> pattern prevents duplicates without requiring the client to search first. In a transaction Bundle entry:</p>
<pre class="code-block">{
  <span class="hl-key">"request"</span>: {
    <span class="hl-key">"method"</span>: <span class="hl-str">"POST"</span>,
    <span class="hl-key">"url"</span>: <span class="hl-str">"Patient"</span>,
    <span class="hl-key">"ifNoneExist"</span>: <span class="hl-str">"identifier=http://hospital.cascade.example/mrn|10005"</span>
  }
}</pre>
<p>Server behavior: if a Patient with that MRN already exists → return 200 + the existing resource, skip creation. If no match → create and return 201. This is the mechanism the Produce journey uses for P005 Maria Gonzales, whose surname differs from P001 Maria Gonzalez by one letter — rather than forcing a duplicate Patient resource into the system, the conditional create lets the server's deduplication logic decide.</p>
    `,

POST /Group/cascade-cohort/$export

    lecture:`
<p>Sofia's hypertension diagnosis is not stored in Valley Urgent Care's system as the string "high blood pressure." It's stored as a structured code — <code>I10</code> from ICD-10-CM — so that any receiving system, regardless of what EHR it runs or what language its clinicians speak, can interpret it unambiguously, count it across thousands of patients, and combine it with data from other organizations. This is what coded clinical data makes possible.</p>

<h4>The four code systems that cover most FHIR pipeline work</h4>
<p><button class="card-link" onclick="openCardModal('icd10cm')">ICD-10-CM</button> is the US standard for coding diagnoses. Every US Core Condition resource needs at least one ICD-10-CM code. Code structure: 1 letter + 2 mandatory digits + optional decimal + up to 4 more characters. Sofia's diagnoses:</p>
<ul>
  <li><code>I10</code> — Essential hypertension (confirmed diagnosis)</li>
  <li><code>R03.0</code> — Elevated blood-pressure reading without confirmed diagnosis (what urgent care used at intake)</li>
</ul>
<p><button class="card-link" onclick="openCardModal('snomedCt')">SNOMED CT</button> is the preferred clinical concept system for US Core Condition.code when clinical detail matters. A Condition should carry <em>both</em> a SNOMED concept (clinical accuracy) and an ICD-10 code (billing requirement) when both are available. Sofia's hypertension: SNOMED <code>38341003</code> (Hypertensive disorder, systemic arterial). SNOMED concept IDs are integers — their values carry no structural meaning.</p>
<p><button class="card-link" onclick="openCardModal('loincCode')">LOINC</button> identifies what was measured in an Observation. Sofia's urgent care visit generated two vital sign Observations — each needs a LOINC code in <code>Observation.code.coding</code>:</p>
<ul>
  <li><code>8480-6</code> — Systolic blood pressure (her reading: 148 mmHg)</li>
  <li><code>8462-4</code> — Diastolic blood pressure</li>
</ul>
<p>US Core vital sign profiles bind these Observation.code elements to specific LOINC codes at <em>required</em> strength — a systolic BP Observation without LOINC <code>8480-6</code> fails US Core validation.</p>
<p><button class="card-link" onclick="openCardModal('rxnorm')">RxNorm</button> codes medications. Sofia's Lisinopril MedicationRequest needs an RxNorm code in <code>medication.coding</code>. A MedicationRequest documented only as the free-text string "Lisinopril 10mg" fails US Core conformance — the RxNorm code is required.</p>

<h4>ConceptMap — the formal crosswalk</h4>
<p>When source data uses one code system and the target expects another, a <button class="card-link" onclick="openCardModal('conceptMap')">ConceptMap</button> provides the machine-readable mapping. The <code>$translate</code> terminology operation executes it:</p>
<pre class="code-block"><span class="hl-comment"># P002 Kowalski's CHF arrived with legacy ICD-9 code 428.0</span>
<span class="hl-comment"># Consume Station 7 must crosswalk it to ICD-10-CM</span>
<span class="hl-verb">POST</span> <span class="hl-url">/ConceptMap/$translate</span>
{ "code": <span class="hl-str">"428.0"</span>, "system": <span class="hl-str">"http://hl7.org/fhir/sid/icd-9-cm"</span>,
  "targetSystem": <span class="hl-str">"http://hl7.org/fhir/sid/icd-10-cm"</span> }

<span class="hl-ok">200 OK</span>
{ "result": true, "match": [{ "code": <span class="hl-str">"I50.9"</span>, "equivalence": <span class="hl-str">"wider"</span> }] }</pre>
<p>The <code>equivalence</code> field matters: <code>"wider"</code> means I50.9 (Heart failure, unspecified) is <em>broader</em> than old 428.0 — some clinical specificity was lost. This is documented in the pipeline's transformation log. A crosswalk with <code>"unmatched"</code> equivalence means no mapping exists — the record routes to the quarantine queue.</p>

<h4>ValueSets and binding strength</h4>
<p>A <button class="card-link" onclick="openCardModal('valueSet')">ValueSet</button> defines which codes are valid in a given context. Profiles bind coded elements to ValueSets at a <button class="card-link" onclick="openCardModal('bindingStrength')">binding strength</button> that determines how strictly the constraint is enforced:</p>
<ul>
  <li><strong>Required:</strong> the code must come from the ValueSet. The server will reject any code not in the set with 422. Observation.status, Condition.clinicalStatus, and Condition.verificationStatus are all required-bound.</li>
  <li><strong>Extensible:</strong> use a code from the ValueSet if one applies; use a local code only if the ValueSet has no applicable concept. Common trap: a local code passes schema validation but the receiving system doesn't recognize it — leading to silent data loss in downstream analytics.</li>
  <li><strong>Preferred / Example:</strong> guidance only, not enforced during validation.</li>
</ul>
<div class="callout"><span class="callout-icon">⚠️</span><strong>The extensible trap:</strong> a Condition arriving with a local diagnosis code not in the US Core Condition.code ValueSet passes schema validation — the JSON structure is correct. But downstream analytics may not map it to any standard concept, and multi-site queries filtering by ICD-10 code will miss it entirely. Extensible binding means the server won't fail you — but interoperability breaks silently.</div>
    `,

  // ─── SEGMENT 7: EHR / HIE / HIPAA ─── [FULLY AUTHORED — Turn 3]
  {
    id:7, icon:'🏥',
    title:'The healthcare landscape',
    subtitle:'EHRs, HIEs, HIPAA, PHI, Safe Harbor de-identification, and 42 CFR Part 2',
    endGoal:'You\'ll understand why data governance shapes every FHIR pipeline design decision — from scope selection to log sanitization to de-identification strategy.',
    minutes:8,
    cards:['ehrSystem','hie','hipaa','phi','safeHarbor','cfr42part2'],
    lecture:`
<p>Every FHIR exchange involves real software systems, run by real organizations, subject to real law. The technical patterns of the previous six segments don't exist in a vacuum — they're shaped by the healthcare landscape they operate in. This segment places that context around Sofia's data journey and the Cascade Cohort's data that the lab uses.</p>

<h4>EHRs — where the data originates</h4>
<p>An <button class="card-link" onclick="openCardModal('ehrSystem')">EHR</button> is the primary clinical software system in a healthcare organization — where Sofia's vital signs were documented, her Lisinopril was ordered, and her ICD-10 codes were assigned. Every FHIR API in the real world is ultimately backed by data that originated in an EHR.</p>
<p>ONC's certification program (HTI-1 final rule) requires certified EHRs to expose FHIR R4 / US Core APIs and to support SMART on FHIR authorization. This is why FHIR is now accessible from major EHRs — not because vendors chose to build it, but because federal certification requires it. Implementation quality varies: the same US Core profile may pass validation against one vendor's API and fail against another's due to implementation differences. Testing against a specific vendor's sandbox before production is non-negotiable.</p>

<h4>HIEs — how data crosses organizational boundaries</h4>
<p>When Sofia's data needs to travel from Valley Urgent Care to Cascade Valley Medical, it doesn't always go directly. Regional <button class="card-link" onclick="openCardModal('hie')">HIEs</button> (Health Information Exchanges) aggregate clinical data from multiple participating organizations and make it available for authorized queries. A query to the Cascade Regional HIE (the fictional network used in the FHIR Pipeline Lab) returns data contributed by many sources — not just one organization's EHR.</p>
<p>Pipeline implication: data arriving from an HIE may have lower conformance quality than data from a single EHR. The HIE aggregates records produced by many different EHR systems with different implementation quality levels. Expect missing must-support elements, legacy code systems, and inconsistent extension patterns — design your pipeline's quarantine logic with this in mind.</p>

<h4>PHI — what's regulated and why it matters to pipelines</h4>
<p>Every FHIR Patient resource is <button class="card-link" onclick="openCardModal('phi')">PHI</button> (Protected Health Information) by definition. HIPAA defines 18 identifier categories whose presence makes data PHI: names, geographic subdivisions smaller than state, all dates except year (birth, admission, discharge, death), phone numbers, fax numbers, email addresses, SSNs, MRNs, health plan beneficiary numbers, account numbers, certificate/license numbers, VINs, device identifiers, URLs, IP addresses, biometric identifiers, full-face photos, and any other unique identifying code.</p>
<p>A Patient resource contains at minimum: a name (identifier 1), an MRN (identifier 8), a birth date (identifier 3), and a gender. It's PHI. So are the Condition, Observation, and MedicationRequest resources that reference it — they inherit PHI status from the patient link. Every component of a FHIR pipeline that touches these resources is operating on regulated data.</p>

<h4>HIPAA — three rules that shape pipeline design</h4>
<p><button class="card-link" onclick="openCardModal('hipaa')">HIPAA</button> has three rules that directly affect FHIR pipeline engineers:</p>
<ul>
  <li><strong>Privacy Rule</strong> — defines PHI and establishes the <em>minimum necessary</em> principle: request only the data the pipeline actually needs. This drives scope design: <code>system/Patient.rs system/Condition.rs</code> is defensible; <code>system/*.rs</code> is not if the pipeline only uses two resource types.</li>
  <li><strong>Security Rule</strong> — requires encryption in transit (HTTPS, enforced by TLS on every FHIR request) and at rest (warehouse storage, staging files, backup media). Also requires access controls (who can query the warehouse?) and audit logging (what did each system access, when?). Log sanitization falls here: log files that contain full resource bodies are PHI and require the same protections as the data itself. Strip PHI from logs before they reach centralized logging infrastructure.</li>
  <li><strong>Breach Notification Rule</strong> — if PHI is compromised, the covered entity must notify affected individuals, HHS, and in some cases the media within 60 days. A pipeline misconfiguration that exposes a staging bucket publicly is a HIPAA breach — not just a security incident.</li>
</ul>

<h4>Safe Harbor de-identification — producing research-ready data</h4>
<p>When the pipeline's output will be used for research without patient authorization, <button class="card-link" onclick="openCardModal('safeHarbor')">Safe Harbor de-identification</button> removes all 18 identifier categories. The key transformations:</p>
<ul>
  <li>Names → removed</li>
  <li>All dates → year only (birth year is retained; month and day are removed)</li>
  <li>ZIP codes → 3-digit prefix only (if the prefix covers &lt;20,000 people, suppress entirely)</li>
  <li>All other identifiers (MRN, SSN, phone, email, IP, device ID...) → removed</li>
</ul>
<p>The result is no longer PHI and may be shared for research without patient authorization. The FHIR Observation values (BP readings, lab results) are retained — only the identifiers are stripped. This produces a research dataset where you can study hypertension treatment patterns across a population without being able to identify any individual.</p>

<h4>42 CFR Part 2 — stricter than HIPAA for SUD records</h4>
<p><button class="card-link" onclick="openCardModal('cfr42part2')">42 CFR Part 2</button> governs substance use disorder (SUD) treatment records. It imposes restrictions that HIPAA's treatment-payment-operations exception does not override: SUD treatment records cannot be disclosed to another provider — even for direct treatment of the same patient — without explicit written patient consent, unless a narrow emergency exception applies.</p>
<p>In the Cascade Cohort, P003 Jamal Washington has opioid use disorder in remission. His buprenorphine/naloxone prescription and his MDD + OUD Condition records are Part 2-protected. The Produce journey models submitting his outpatient note to the regional HIE — but first, the pipeline must redact the OUD Condition and the buprenorphine MedicationRequest from the submission Bundle. Submitting them without consent would violate 42 CFR Part 2 regardless of whether the HIE uses FHIR or any other format.</p>
<div class="callout"><span class="callout-icon">📌</span><strong>Design takeaway:</strong> FHIR APIs don't automatically enforce Part 2 restrictions. A query for all of a patient's Conditions will return OUD records unless the server has been configured to suppress them based on consent status. Never assume the FHIR server is doing this for you — the pipeline must apply Part 2 filtering logic explicitly.</div>
    `,

  {
    id:8, icon:'🧱',
    title:'Data pipelines and the lab ahead',
    subtitle:'ETL/ELT, data quality, OMOP, fact and dimension tables, idempotency — and the Cascade Cohort',

    minutes:8,
    cards:['etlPipeline','dataQuality','omopCdm','factDimension','idempotency','cascadeCohort'],
    lecture:`
<p>We've followed Sofia's data from Valley Urgent Care's EHR through HTTP requests, OAuth tokens, FHIR resources, US Core profiles, coded terminologies, HIE routing, and HIPAA compliance decisions. That's the extraction and transport layer. This segment covers where the data lands: a warehouse designed for analytics, care management dashboards, and model training — and the engineering patterns that keep it reliable under real-world conditions.</p>

<h4>ELT — the modern FHIR pipeline pattern</h4>
<p>Traditional ETL (Extract, Transform, Load) transforms data before it enters the warehouse. Modern FHIR pipelines increasingly use <button class="card-link" onclick="openCardModal('etlPipeline')">ELT</button> (Extract, Load, Transform): raw NDJSON files from Bulk Data exports land in a staging schema first, then SQL transformations — typically written as dbt models — flatten them into structured clinical tables inside the warehouse.</p>
<p>ELT's advantage: the raw NDJSON is preserved. If a FHIR profile changes, or if you discover a parsing bug three months in, you can reprocess from the raw files without re-extracting from the source server. The extraction step (which hits the FHIR API) is expensive and rate-limited; the transformation step (which runs inside the warehouse) is cheap and parallelizable. Preserve the raw; transform it in place.</p>

<h4>Data quality flags and the quarantine queue</h4>
<p>Not every FHIR resource that arrives from an HIE is clean. The Cascade Cohort includes real-world quality challenges: a legacy ICD-9 code that needs a crosswalk, a possible duplicate patient record, a missing must-support element. Rather than letting bad data silently reach warehouse fact tables where it corrupts downstream counts, a well-designed pipeline applies <button class="card-link" onclick="openCardModal('dataQuality')">data quality flags</button> and routes problematic records to a quarantine queue.</p>
<p>The quarantine log is not a disposal bin — it's a holding pattern. Every flagged record has a <code>stage</code> (which pipeline step detected the problem), a <code>reason</code> (the specific failure), and a <code>flagged_at</code> timestamp. A human reviewer processes the queue. Most quarantine records are resolvable: a missing birth date can be filled by querying the source EHR; a legacy code can be crosswalked via ConceptMap. Only records that cannot be resolved without clinical review are escalated.</p>

<h4>The OMOP-inspired warehouse schema</h4>
<p>The Consume journey's terminal warehouse uses an <button class="card-link" onclick="openCardModal('omopCdm')">OMOP-inspired</button> star schema. OMOP CDM (Observational Medical Outcomes Partnership Common Data Model) is the analytical standard that enables multi-site research — data from different hospitals in the same schema, queryable with the same SQL. The FHIR Pipeline Lab uses a simplified version:</p>
<ul>
  <li><strong>dim_patient</strong> — one row per patient; surrogate key (<code>patient_key</code>), MRN, name, birth date, gender, race, ethnicity</li>
  <li><strong>fact_condition</strong> — one row per diagnosis per patient; patient_key FK, ICD-10 code, SNOMED code, onset date, clinical status, verification status</li>
  <li><strong>fact_medication_request</strong> — one row per medication order; patient_key FK, RxNorm code, display name, authored date, status</li>
  <li><strong>fact_observation</strong> — one row per measurement; patient_key FK, LOINC code, value, units, effective date, observation status</li>
  <li><strong>quarantine_log</strong> — one row per flagged record; source resource ID, resource type, stage, reason, flagged_at</li>
</ul>
<p>Population queries are efficient: "all patients with active Type 2 diabetes" is <code>SELECT DISTINCT patient_key FROM fact_condition WHERE icd10_code LIKE 'E11%' AND clinical_status = 'active'</code>. The <button class="card-link" onclick="openCardModal('factDimension')">fact/dimension design</button> means you join once to dim_patient to get demographics, then query the relevant fact table for the clinical event.</p>

<h4>Idempotency — safe retries under failure</h4>
<p>Pipelines fail. A network timeout, a FHIR server 503, a warehouse connection drop. A pipeline that can't be safely restarted after failure isn't production-ready. <button class="card-link" onclick="openCardModal('idempotency')">Idempotency</button> — the property that applying an operation multiple times produces the same result as applying it once — is the engineering solution.</p>
<p>Three implementation strategies the Consume journey uses:</p>
<ul>
  <li><strong>Upsert SQL</strong>: <code>INSERT INTO dim_patient (...) ON CONFLICT (mrn) DO UPDATE SET ...</code> — if the patient row exists, update it; if not, insert. Safe to run 10 times; produces the same result as running once.</li>
  <li><strong>Content-hash deduplication</strong>: hash each NDJSON resource body; skip if the hash is already in the load log. Prevents reprocessing resources that haven't changed since the last export.</li>
  <li><strong>Conditional create</strong> (Produce side): <code>ifNoneExist</code> in the transaction Bundle entry prevents duplicate FHIR resources on the target server.</li>
</ul>
<p>Design for idempotency before the first production run. Retrofitting it after discovering duplicate counts in a live dashboard is painful and time-consuming.</p>

//  STATE MANAGEMENT
// ════════════════════════════════════════════════════════════════
const STATE_KEY = 'fhir_r4_primer_v1_state';
let state;

function defaultState(){
  return {
    version:1,
    currentSegment:1,
    completed:[],
    pulseAnswers:{},
    pulseRevealed:[],
    pulseRetries:{},
    startedAt:Date.now(),
    lastVisited:Date.now(),
    welcomeBackShown:false
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STATE_KEY);
    if(!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){
    console.warn('State load failed:', e);
    return defaultState();
  }
}

function saveState(){
  state.lastVisited = Date.now();
  try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn('State save failed:', e); }
}

function resetProgress(){
  if(!confirm('Start over? All your progress through the primer will be cleared.')) return;
  localStorage.removeItem(STATE_KEY);
  location.reload();
}

function isSegmentUnlocked(id){ return id === 1 || state.completed.includes(id - 1); }
function isSegmentComplete(id){ return state.completed.includes(id); }

function totalRemainingMinutes(){
  return SEGMENTS.filter(s => !state.completed.includes(s.id)).reduce((sum,s) => sum + s.minutes, 0);
}

function formatRelativeTime(ts){
  const ms = Date.now() - ts;
  const hours = Math.floor(ms / 3600000);
  const days = Math.floor(hours / 24);
  if(days >= 2) return `${days} days ago`;
  if(days === 1) return 'yesterday';
  if(hours >= 2) return `${hours} hours ago`;
  if(hours === 1) return '1 hour ago';
  return 'recently';
}

function renderProgressBar(){
  const bar = document.getElementById('progressBar');
  let html = '';
  SEGMENTS.forEach(seg => {
    const unlocked = isSegmentUnlocked(seg.id);
    const done = isSegmentComplete(seg.id);
    const active = state.currentSegment === seg.id;
    let cls = 'seg-pill';
    if(active) cls += ' active';
    else if(done) cls += ' done';
    else if(!unlocked) cls += ' locked';
    const onclick = unlocked ? `goToSegment(${seg.id})` : '';
    html += `<button class="${cls}" onclick="${onclick}" ${unlocked?'':'disabled'} title="${esc(seg.title)}">
      <span class="seg-num">${seg.id}</span>
      <span class="seg-icon">${seg.icon}</span>
    </button>`;
  });
  const remaining = totalRemainingMinutes();
  if(remaining > 0) html += `<span class="time-remaining">~${remaining} min remaining</span>`;
  bar.innerHTML = html;
}

function renderSegment(id){
  const seg = SEGMENTS.find(s => s.id === id);
  if(!seg) return;
  const container = document.getElementById('segmentContainer');
  const done = isSegmentComplete(seg.id);
  const isLast = seg.id === SEGMENTS.length;

  let html = `
    <section class="segment">
      <div class="segment-header">
        <div class="segment-meta">
          <span class="seg-step">Segment ${seg.id} of ${SEGMENTS.length}</span>
          <span>~${seg.minutes} min</span>
          ${done ? '<span style="color:var(--green);font-weight:700">✓ Completed</span>' : ''}
        </div>
        <div class="segment-title">
          <span class="seg-icon-large">${seg.icon}</span>
          ${esc(seg.title)}
        </div>
        <div class="segment-subtitle">${esc(seg.subtitle)}</div>
        <div class="end-goal">
          <div class="end-goal-label">End goal</div>
          <div class="end-goal-text">${esc(seg.endGoal)}</div>
        </div>
      </div>
      <div class="lecture">${seg.lecture}</div>
  `;

  if(seg.beforeAfter){
    html += `
      <div class="ba-block">
        <div class="ba-panel ba-before">
          <div class="ba-label">${esc(seg.beforeAfter.beforeLabel)}</div>
          <div class="ba-content">${seg.beforeAfter.beforeContent}</div>
        </div>
        <div class="ba-arrow">→</div>
        <div class="ba-panel ba-after">
          <div class="ba-label">${esc(seg.beforeAfter.afterLabel)}</div>
          <div class="ba-content">${seg.beforeAfter.afterContent}</div>
        </div>
      </div>
    `;
  }

  seg.pulseChecks.forEach((pc, idx) => {
    html += renderPulseCheckHTML(seg.id, idx, pc);
  });

  html += `
      <div class="seg-nav">
        <div class="seg-nav-left">
          ${seg.id > 1 ? `<button class="btn ghost" onclick="goToPrevSegment()">← Previous segment</button>` : '<span></span>'}
        </div>
        <div class="seg-nav-right">
          ${!isLast
            ? `<button class="btn primary" onclick="markCompleteAndContinue(${seg.id})">${done ? 'Continue to' : 'Mark complete &amp; continue to'} segment ${seg.id + 1} →</button>`
            : `<button class="btn primary" onclick="markCompleteAndContinue(${seg.id})">${done ? 'Finish primer →' : 'Mark complete &amp; finish primer →'}</button>`
          }
        </div>
      </div>
    </section>
  `;

  container.innerHTML = html;
}

function renderPulseCheckHTML(segId, idx, pc){
  const key = `s${segId}_p${idx}`;
  const userAnswer = state.pulseAnswers[key];
  const wasRevealed = state.pulseRevealed.includes(key);
  const answered = userAnswer !== undefined;
  const isCorrect = userAnswer === pc.correctKey;

  let optionsHTML = '';
  pc.options.forEach(opt => {
    let cls = 'pulse-option';
    let clickAttr = `onclick="handlePulseAnswer(${segId},${idx},'${opt.key}')"`;
    if(answered || wasRevealed){
      cls += ' disabled';
      clickAttr = '';
      if(opt.key === pc.correctKey) cls += ' correct';
      else if(opt.key === userAnswer && !isCorrect) cls += ' wrong';
    }
    optionsHTML += `<button class="${cls}" ${clickAttr}>
      <span class="pulse-key">${opt.key}</span>
      <span>${opt.text}</span>
    </button>`;
  });

  let feedbackHTML = '';
  if(answered || wasRevealed){
    let fbCls = 'pulse-feedback visible';
    let fbContent = '';
    if(wasRevealed && !answered){
      fbCls += ' revealed';
      fbContent = `<strong>Answer revealed:</strong> ${pc.feedback.incorrect}`;
    } else if(isCorrect){
      fbCls += ' correct';
      fbContent = `<strong>✓ Correct.</strong> ${pc.feedback.correct}`;
    } else {
      fbCls += ' incorrect';
      fbContent = `<strong>Not quite.</strong> ${pc.feedback.incorrect}`;
    }
    feedbackHTML = `<div class="${fbCls}">${fbContent}</div>`;
  }

  let actionsHTML = (!answered && !wasRevealed)
    ? `<div class="pulse-actions"><button class="pulse-link" onclick="revealPulseAnswer(${segId},${idx})">Reveal answer</button></div>`
    : `<div class="pulse-actions"><button class="pulse-link" onclick="retryPulseCheck(${segId},${idx})">🔄 Try again</button></div>`;

  return `
    <div class="pulse-check">
      <div class="pulse-header">
        <span class="pulse-icon">💭</span>
        <span class="pulse-label">Pulse check</span>
      </div>
      <div class="pulse-question">${pc.question}</div>
      <div class="pulse-options">${optionsHTML}</div>
      ${feedbackHTML}
      ${actionsHTML}
    </div>
  `;
}

function renderCardsSidebar(){
  const sidebar = document.getElementById('cardsSidebar');
  const seg = SEGMENTS.find(s => s.id === state.currentSegment);
  if(!seg || !seg.cards || seg.cards.length === 0){ sidebar.innerHTML = ''; return; }
  let html = `<div class="cards-panel">
    <h3>Cards · Segment ${seg.id}</h3>

      <span class="card-item-term">${esc(card.term)}</span>
      <span class="card-item-expand">›</span>
    </div>`;

  html += '</div>';
  sidebar.innerHTML = html;
}

function openCardModal(cardId){
  const card = CARDS[cardId];
  if(!card) return;
  document.getElementById('modalTitle').textContent = card.term;
  let html = `<div class="card-modal-term">${esc(card.term)}</div>`;
  if(card.expansion) html += `<div class="card-modal-expansion">${esc(card.expansion)}</div>`;
  html += `<div class="card-modal-def">${esc(card.def)}</div>`;
  if(card.long) html += `<div class="card-modal-long">${esc(card.long)}</div>`;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function openCardLibrary(){
  const visibleIds = new Set([state.currentSegment, ...state.completed]);
  const visibleSegs = SEGMENTS.filter(s => visibleIds.has(s.id)).sort((a,b) => a.id - b.id);
  document.getElementById('modalTitle').textContent = '📚 Card library';
  let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Definitions you've encountered so far. Cards from later segments unlock as you progress.</div>`;
  html += `<div class="modal-search"><input type="text" id="cardLibrarySearch" placeholder="Search terms..." oninput="filterCardLibrary()"></div>`;
  html += `<div id="cardLibraryContent">`;
  let total = 0;
  visibleSegs.forEach(seg => {
    if(!seg.cards || seg.cards.length === 0) return;
    html += `<div class="lib-segment-group" data-seg-id="${seg.id}">
      <div class="lib-segment-header">${seg.icon} Segment ${seg.id}: ${esc(seg.title)}</div>`;
    seg.cards.forEach(cid => {
      const card = CARDS[cid];
      if(!card) return;
      total++;
      html += `<div class="lib-card" data-term="${esc(card.term.toLowerCase())}" data-def="${esc(card.def.toLowerCase())}">
        <div class="lib-card-term">${esc(card.term)}</div>
        ${card.expansion ? `<div class="lib-card-expansion">${esc(card.expansion)}</div>` : ''}
        <div class="lib-card-def">${esc(card.def)}</div>
      </div>`;
    });
    html += '</div>';
  });
  if(total === 0) html += `<div style="text-align:center;color:var(--text-dim);padding:30px 0;font-size:13px">No cards yet — complete Segment 1 to begin building your library.</div>`;
  html += '</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function filterCardLibrary(){
  const q = (document.getElementById('cardLibrarySearch').value || '').toLowerCase().trim();
  document.querySelectorAll('.lib-card').forEach(card => {
    const matches = !q || (card.dataset.term||'').includes(q) || (card.dataset.def||'').includes(q);
    card.style.display = matches ? '' : 'none';
  });
  document.querySelectorAll('.lib-segment-group').forEach(group => {
    const visible = group.querySelectorAll('.lib-card:not([style*="display: none"])').length;
    group.style.display = visible > 0 ? '' : 'none';
  });
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

//  HANDLERS
// ════════════════════════════════════════════════════════════════
function handlePulseAnswer(segId, idx, key){
  const k = `s${segId}_p${idx}`;
  state.pulseAnswers[k] = key;
  saveState();
  renderSegment(segId);
}

function revealPulseAnswer(segId, idx){
  const k = `s${segId}_p${idx}`;
  if(!state.pulseRevealed.includes(k)) state.pulseRevealed.push(k);
  saveState();
  renderSegment(segId);
}

function retryPulseCheck(segId, idx){
  const k = `s${segId}_p${idx}`;
  delete state.pulseAnswers[k];
  state.pulseRevealed = state.pulseRevealed.filter(x => x !== k);
  state.pulseRetries[k] = (state.pulseRetries[k] || 0) + 1;
  saveState();
  renderSegment(segId);
}

function markCompleteAndContinue(segId){
  if(!state.completed.includes(segId)) state.completed.push(segId);
  saveState();
  if(segId < SEGMENTS.length){
    state.currentSegment = segId + 1;
    saveState();
    fullRender();
    scrollToTop();
  } else {
    fullRender();
  }
}

function goToSegment(id){
  if(!isSegmentUnlocked(id)) return;
  state.currentSegment = id;
  saveState();
  fullRender();
  scrollToTop();
}

function goToPrevSegment(){
  if(state.currentSegment > 1) goToSegment(state.currentSegment - 1);
}

function replaySegment(segId){
  if(!confirm('Replay this segment? This resets pulse check answers for this segment only — your overall progress and other segments stay intact.')) return;
  Object.keys(state.pulseAnswers).forEach(k => { if(k.startsWith(`s${segId}_p`)) delete state.pulseAnswers[k]; });
  state.pulseRevealed = state.pulseRevealed.filter(k => !k.startsWith(`s${segId}_p`));
  saveState();
  renderSegment(segId);
  scrollToTop();
}

// ════════════════════════════════════════════════════════════════
//  WELCOME-BACK BANNER
// ════════════════════════════════════════════════════════════════
function maybeShowWelcomeBack(){
  const hoursAway = (Date.now() - state.lastVisited) / 3600000;
  if(hoursAway > 4 && state.completed.length > 0 && !state.welcomeBackShown){
    const seg = SEGMENTS.find(s => s.id === state.currentSegment);
    const banner = document.getElementById('welcomeBackBanner');
    banner.style.display = 'block';
    banner.innerHTML = `<div class="welcome-back">
      <div class="welcome-back-text">
        Welcome back. You were on <strong>Segment ${seg.id}: ${esc(seg.title)}</strong> ${formatRelativeTime(state.lastVisited)}.
      </div>
      <button class="btn primary" onclick="dismissWelcomeBack()">Continue →</button>
    </div>`;
    state.welcomeBackShown = true;
    saveState();
  }
}

function dismissWelcomeBack(){
  document.getElementById('welcomeBackBanner').style.display = 'none';
  scrollToTop();
}

// ════════════════════════════════════════════════════════════════
//  FULL RENDER + INIT
// ════════════════════════════════════════════════════════════════
function fullRender(){
  renderProgressBar();
  renderHero();
  renderActionBar();
  renderSegment(state.currentSegment);
  renderCardsSidebar();

  const beginBtn = document.getElementById('beginLabBtn');
  if(state.completed.length >= SEGMENTS.length){
    beginBtn.disabled = false;
    beginBtn.style.opacity = '1';
    beginBtn.style.cursor = 'pointer';
  } else {
    beginBtn.disabled = true;
    beginBtn.style.opacity = '.4';
    beginBtn.style.cursor = 'not-allowed';
  }
}

function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function init(){
  state = loadState();
  if(Date.now() - state.lastVisited > 1800000) state.welcomeBackShown = false;
  fullRender();
  maybeShowWelcomeBack();
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

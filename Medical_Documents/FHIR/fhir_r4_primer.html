<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FHIR R4 Primer — Before You Begin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#7d8b9d;--header-bg:#1e4670;
  --surface:#d3dde8;--surface-raised:#c8d3e0;--surface-inset:#a8b4c2;
  --border:#8693a3;--border-accent:#5d6e85;--border-focus:#1e4670;
  --text:#2a2a2a;--text-muted:#4a5260;--text-dim:#6b7280;
  --accent:#7a5418;--accent-glow:rgba(184,134,42,.12);--accent-dim:#5d3f10;--accent-badge:#b8862a;
  --green:#1f6843;--green-bg:rgba(31,104,67,.12);
  --red:#9c382d;--red-bg:rgba(156,56,45,.10);
  --orange:#8e4d10;--orange-bg:rgba(142,77,16,.10);
  --blue:#2c5680;--blue-bg:rgba(44,86,128,.10);
  --purple:#553a80;--purple-bg:rgba(85,58,128,.10);
  --cyan:#155f6e;--cyan-bg:rgba(21,95,110,.10);
  --radius:8px;--radius-lg:12px;
  --mono:'JetBrains Mono',monospace;--serif:'Crimson Pro',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#1e4670;color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.7;min-height:100vh}

/* ── Header ── */
.header{background:var(--header-bg);border-bottom:2px solid var(--accent);padding:20px 28px 0;color:#f0f4fa}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-bottom:14px}
.header-brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.header-brand h1{font-family:var(--serif);font-size:26px;font-weight:700;color:#f4c97c;letter-spacing:.3px}
.header-brand .pipe-motif{font-family:var(--mono);color:#a8b8c8;font-size:11px;letter-spacing:.5px;opacity:.75}
.header-brand .subtitle{font-family:var(--sans);font-size:13px;color:#cfd8e3;font-weight:400;margin-left:4px}
.header-credit{font-size:11px;color:#a8b8c8;font-family:var(--mono)}

/* ── Welcome-back banner ── */
.welcome-back{background:rgba(184,134,42,.18);border:1px solid var(--accent-badge);
  padding:10px 18px;margin-bottom:14px;border-radius:var(--radius);display:flex;align-items:center;
  justify-content:space-between;gap:12px;flex-wrap:wrap}
.welcome-back-text{color:#f0f4fa;font-size:13px}
.welcome-back-text strong{color:#f4c97c}

/* ── Progress Bar ── */
.progress-bar{position:sticky;top:0;z-index:90;background:rgba(125,139,157,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;white-space:nowrap;
  display:flex;gap:6px;align-items:center}
.progress-bar::-webkit-scrollbar{height:4px}
.progress-bar::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}
.seg-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:18px;
  font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;
  background:#73798a;color:#000;border:1px solid #525861;transition:all .15s;flex-shrink:0}
.seg-pill .seg-num{font-family:var(--mono);font-size:10px;color:#000;font-weight:700}
.seg-pill .seg-icon{font-size:14px}
.seg-pill:hover{background:#8a92a0;color:#000;border-color:#5d6470}
.seg-pill.done{background:#5cae6a;color:#000;border-color:#3d9555}
.seg-pill.done:hover{background:#7cc188;color:#000;border-color:#5cae6a}
.seg-pill.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.seg-pill.active:hover{background:#5fa0d0;color:#000;border-color:#4a90c2}
.seg-pill.done.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.seg-pill.locked{background:#5d6470;color:#3a3a3a;border-color:#4a5058;cursor:not-allowed;opacity:.5}
.seg-pill.locked:hover{background:#5d6470;color:#3a3a3a}
.time-remaining{margin-left:auto;font-family:var(--mono);font-size:10px;color:#0d2640;
  padding:4px 10px;background:rgba(255,255,255,.15);border-radius:10px;flex-shrink:0}

/* ── Main layout ── */
main{max-width:1200px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:1fr 280px;gap:28px}
@media (max-width:920px){main{grid-template-columns:1fr;padding:16px}}
.content-col{min-width:0}
.sidebar-col{position:relative}

/* ── Hero ── */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:32px 28px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--text);margin-bottom:10px}
.hero .hero-sub{font-family:var(--mono);font-size:12px;color:var(--accent-dim);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.hero p{color:var(--text-muted);margin-bottom:14px;font-size:15px;line-height:1.75}
.hero-cta{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* ── Action Bar ── */
.action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
  margin-bottom:20px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.action-bar .left-actions,.action-bar .right-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── Buttons ── */
.btn{font-family:var(--mono);font-size:12px;font-weight:600;padding:8px 18px;border-radius:var(--radius);
  border:1px solid var(--border);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;
  background:#b8862a;color:#000;border-color:#b8862a}
.btn:hover{background:#cc9633;color:#000;border-color:#cc9633}
.btn.primary{background:var(--accent-badge);color:#000;border-color:var(--accent-badge);font-weight:700}
.btn.primary:hover{box-shadow:0 2px 16px var(--accent-glow);background:#cc9633;color:#000}
.btn.primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn.secondary{background:#b8862a;color:#000;border-color:#b8862a}
.btn.ghost{background:transparent;color:var(--text);border-color:var(--border)}
.btn.ghost:hover{background:var(--surface-inset);color:var(--text);border-color:var(--border-accent)}

/* ── Segment ── */
.segment{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:28px 32px;margin-bottom:24px}
@media (max-width:920px){.segment{padding:20px 18px}}
.segment-header{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.segment-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap}
.segment-meta .seg-step{color:var(--accent-dim);font-weight:700}
.segment-title{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--text);
  margin-bottom:6px;display:flex;align-items:center;gap:12px}
.segment-title .seg-icon-large{font-size:30px}
.segment-subtitle{color:var(--text-muted);font-size:14px;margin-bottom:14px}
.end-goal{background:var(--accent-glow);border-left:3px solid var(--accent-badge);
  padding:12px 16px;margin-top:14px;border-radius:0 var(--radius) var(--radius) 0}
.end-goal-label{font-family:var(--mono);font-size:10px;color:var(--accent-dim);
  letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.end-goal-text{color:var(--text);font-size:14px;font-style:italic}

/* ── Lecture ── */
.lecture{font-size:15px;color:var(--text);line-height:1.8}
.lecture h3{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);margin:24px 0 10px}
.lecture h4{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--accent-dim);margin:18px 0 8px;letter-spacing:.3px}
.lecture p{margin-bottom:14px;color:var(--text-muted)}
.lecture p strong{color:var(--text)}
.lecture ul,.lecture ol{margin:10px 0 14px 24px;color:var(--text-muted)}
.lecture li{margin-bottom:6px}
.lecture code{font-family:var(--mono);font-size:12.5px;background:var(--surface-inset);color:var(--accent);
  padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.lecture .callout{background:#e0e0e0;border:1px solid #b0b0b0;border-radius:var(--radius);
  padding:14px 18px;margin:16px 0;font-size:14px;color:#000}
.lecture .callout strong{color:#000}
.lecture .callout-icon{font-size:18px;margin-right:6px}

/* ── Inline card-link earmark ── */
.card-link{color:var(--accent);cursor:pointer;border-bottom:1px dotted var(--accent);font-weight:600;
  background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;
  font-size:inherit;padding:0;display:inline;line-height:inherit;text-align:left}
.card-link:hover{border-bottom-style:solid;color:var(--accent-dim)}

/* ── Code block ── */
.code-block{font-family:var(--mono);font-size:12px;background:#1e2d3e;color:#e8eef5;
  padding:14px 16px;border-radius:var(--radius);margin:12px 0;overflow-x:auto;line-height:1.75;
  border:1px solid #2a3f56;white-space:pre}
.code-block .hl-verb{color:#f4c97c;font-weight:700}
.code-block .hl-url{color:#82d8e8}
.code-block .hl-key{color:#6aaed6}
.code-block .hl-str{color:#b8d97a}
.code-block .hl-num{color:#d49c8f}
.code-block .hl-kw{color:#c89640;font-weight:700}
.code-block .hl-comment{color:#7a8b9c;font-style:italic}
.code-block .hl-ok{color:#5cae6a;font-weight:700}
.code-block .hl-err{color:#e07070;font-weight:700}

/* ── Before / After ── */
.ba-block{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;margin:18px 0;align-items:stretch}
@media (max-width:680px){.ba-block{grid-template-columns:1fr;gap:8px}}
.ba-panel{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column}
.ba-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.ba-before .ba-label{color:var(--blue)}
.ba-after .ba-label{color:var(--green)}
.ba-content{font-size:13px;color:var(--text);line-height:1.7;flex:1}
.ba-content code,.ba-content pre{font-family:var(--mono);font-size:11.5px;color:var(--accent);
  background:var(--surface-inset);padding:2px 5px;border-radius:3px;display:inline-block;word-break:break-all;white-space:pre-wrap}
.ba-content pre{display:block;padding:8px 10px;margin-top:6px}
.ba-arrow{display:flex;align-items:center;justify-content:center;color:var(--accent-badge);font-size:24px;font-weight:700;font-family:var(--mono)}
@media (max-width:680px){.ba-arrow{transform:rotate(90deg);padding:4px 0}}

/* ── Pulse Check ── */
.pulse-check{background:#e0e0e0;border:1px solid #b0b0b0;border-radius:var(--radius-lg);padding:18px 22px;margin:22px 0;color:#000}
.pulse-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pulse-icon{font-size:18px}
.pulse-label{font-family:var(--mono);font-size:11px;color:#000;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.pulse-question{font-size:15px;color:#000;margin-bottom:14px;line-height:1.6}
.pulse-question code{font-family:var(--mono);font-size:12.5px;background:#fff;color:var(--accent);padding:2px 5px;border-radius:3px;border:1px solid #b0b0b0}
.pulse-options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pulse-option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--surface-raised);
  border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;
  color:#000;font-size:13.5px;line-height:1.5;text-align:left;width:100%;font-family:var(--sans)}
.pulse-option:hover{background:var(--surface);border-color:var(--border-accent)}
.pulse-option.correct{background:rgba(31,104,67,.18);border-color:var(--green)}
.pulse-option.wrong{background:rgba(156,56,45,.15);border-color:var(--red)}
.pulse-option.disabled{cursor:not-allowed;opacity:.6}
.pulse-option.disabled.correct,.pulse-option.disabled.wrong{opacity:1}
.pulse-key{font-family:var(--mono);font-weight:700;font-size:12px;color:#000;
  min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:4px;flex-shrink:0;background:var(--surface)}
.pulse-feedback{padding:12px 14px;border-radius:var(--radius);font-size:13.5px;line-height:1.6;margin-top:10px;color:#000;display:none}
.pulse-feedback.visible{display:block}
.pulse-feedback.correct{background:rgba(31,104,67,.15);border:1px solid var(--green)}
.pulse-feedback.incorrect{background:rgba(156,56,45,.12);border:1px solid var(--red)}
.pulse-feedback.revealed{background:rgba(44,86,128,.12);border:1px solid var(--blue)}
.pulse-feedback strong{color:#000}
.pulse-actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.pulse-link{font-family:var(--mono);font-size:11px;color:var(--accent-dim);font-weight:600;background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 0}
.pulse-link:hover{color:var(--accent)}

/* ── Cards Sidebar ── */
.cards-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;position:sticky;top:80px}
.cards-panel h3{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.cards-panel .cards-sub{font-size:11.5px;color:var(--text-dim);margin-bottom:14px;line-height:1.5}
.card-item{padding:8px 12px;background:var(--surface-raised);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:all .15s;font-size:13px;
  color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-item:hover{background:var(--surface-inset);border-color:var(--border-accent)}
.card-item-term{font-weight:600}
.card-item-expand{font-size:10px;color:var(--text-dim);font-family:var(--mono)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:1px solid var(--border);color:var(--text);font-size:18px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--surface-inset);border-color:var(--border-accent)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-search{margin-bottom:14px}
.modal-search input{width:100%;padding:8px 12px;font-family:var(--sans);font-size:14px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)}
.modal-search input:focus{outline:none;border-color:var(--border-focus)}
.card-modal-term{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.card-modal-expansion{font-family:var(--mono);font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:10px}
.card-modal-def{font-size:14.5px;color:var(--text);line-height:1.7;margin-bottom:12px}
.card-modal-long{font-size:13.5px;color:var(--text-muted);line-height:1.7;padding-top:12px;border-top:1px solid var(--border)}
.lib-segment-group{margin-bottom:18px}
.lib-segment-header{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.lib-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.lib-card-term{font-family:var(--sans);font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px}
.lib-card-expansion{font-family:var(--mono);font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:6px}
.lib-card-def{font-size:13px;color:var(--text-muted);line-height:1.6}

/* ── Segment nav footer ── */
.seg-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);flex-wrap:wrap}
.seg-nav-left,.seg-nav-right{display:flex;gap:10px;flex-wrap:wrap}

/* ── Footer ── */
.footer{padding:30px 28px;text-align:center;border-top:1px solid rgba(255,255,255,.1)}
.footer-actions{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.footer-credit{font-family:var(--mono);font-size:11px;color:#a8b8c8}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <h1>FHIR R4 Primer</h1>
      <span class="pipe-motif">{ "resourceType": "Primer", "version": "R4" }</span>
      <span class="subtitle">Before You Begin · Foundation for the FHIR Pipeline Lab</span>
    </div>
    <div class="header-credit">Developed by: Joe Williams</div>
  </div>
  <div id="welcomeBackBanner" style="display:none"></div>
  <div class="progress-bar" id="progressBar"></div>
</header>

<main>
  <div class="content-col">
    <div id="heroSection"></div>
    <div id="actionBar"></div>
    <div id="segmentContainer"></div>
  </div>
  <aside class="sidebar-col">
    <div id="cardsSidebar"></div>
  </aside>
</main>

<footer class="footer">
  <div class="footer-actions">
    <button class="btn ghost" onclick="resetProgress()">↺ Start over</button>
    <button class="btn primary" id="beginLabBtn" disabled onclick="window.location.href='fhir_pipeline_lab_v1.html'">Begin FHIR Pipeline Lab →</button>
  </div>
  <div class="footer-credit">FHIR R4 Primer · Developed by: Joe Williams</div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Definition</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CARDS — 42 definitions across all 8 segments
//  sidebar: listed per-segment · modal: term + expansion + def + long
// ════════════════════════════════════════════════════════════════
const CARDS = {

  // ── Segment 1: REST + HTTP ──
  restApi:{
    term:'REST API',expansion:'Representational State Transfer — Application Programming Interface',
    def:'A web-based interface where software systems exchange data using standard HTTP conventions — the architectural pattern FHIR is built on.',
    long:'REST is an architectural style, not a protocol. A REST API exposes resources at predictable URLs and responds to standard HTTP verbs. FHIR adds healthcare-specific rules on top — such as application/fhir+json as the required Content-Type and OperationOutcome as the required error format. Key constraints: stateless (each request carries all needed context), cacheable, and uniform interface (the same verbs work for all resource types). When someone says "FHIR endpoint," they mean a REST API that speaks FHIR.'
  },
  httpVerb:{
    term:'HTTP verb',
    def:'A keyword that tells the server what action to perform: GET (read), POST (create), PUT (replace), DELETE (remove), PATCH (partial update).',
    long:'FHIR uses GET most heavily for data pipelines (fetching resources by ID or by search). POST creates new resources or submits transaction Bundles — the server assigns the new resource\'s ID. PUT replaces a resource entirely (the full resource body must be supplied). DELETE is disabled on most production FHIR servers; clinical data has regulatory retention requirements and audit trail obligations. PATCH (FHIRPatch) lets you modify specific fields without resending the full resource — useful for correcting a Condition status or updating a MedicationRequest without risk of inadvertently overwriting concurrent changes.'
  },
  statusCode:{
    term:'HTTP status code',
    def:'A 3-digit number the server returns with every response, indicating whether the request succeeded and why.',
    long:'200 OK — success; body is the requested resource. 201 Created — new resource created; Location header holds the new URL. 400 Bad Request — malformed JSON or missing required header. 401 Unauthorized — no valid access token. 403 Forbidden — valid token but insufficient scope. 404 Not Found — no resource with that ID. 422 Unprocessable Entity — FHIR\'s validation error: the JSON parsed but the content failed profile rules; response body is always an OperationOutcome naming the failing element and constraint. 500 Internal Server Error — server-side failure. 422 is the code FHIR engineers encounter most in integration work — learning to read the OperationOutcome it returns is the core debugging skill.'
  },
  httpHeader:{
    term:'HTTP header',
    def:'Key-value metadata attached to every HTTP request or response, describing the payload format, authentication state, and other protocol properties.',
    long:'Critical FHIR headers: Content-Type: application/fhir+json — required when sending a resource body; tells the server this is FHIR JSON, not plain JSON. Accept: application/fhir+json — tells the server what format to return. Authorization: Bearer {token} — carries the OAuth 2.0 access token; required on virtually every FHIR request beyond /metadata. Prefer: return=representation — asks the server to return the full updated resource after a POST, not just 201 + Location. Servers that receive an unknown or wrong Content-Type often reject the request with 400 even if the JSON is otherwise valid.'
  },
  jsonFormat:{
    term:'JSON',expansion:'JavaScript Object Notation',
    def:'The text-based data format FHIR uses for all resource payloads — human-readable, machine-parseable, and universally supported.',
    long:'JSON has six value types: strings ("female"), numbers (62), booleans (true/false), null, objects ({"key":"value"} — unordered key-value pairs), and arrays (["item1","item2"] — ordered lists). FHIR resources are deeply nested JSON objects. Understanding three operations covers most FHIR JSON navigation: access an object field (resource.resourceType), access an array element (resource.name[0].family), and check whether a key exists before accessing it. FHIR also supports XML, but JSON dominates modern US healthcare pipelines. When in doubt, request application/fhir+json.'
  },
  bearerToken:{
    term:'Bearer token',
    def:'A credential string sent in the HTTP Authorization header that proves the caller has been granted permission to make the request.',
    long:'"Bearer" means whoever holds the token can use it — unlike certificate-based auth, the server does not re-verify the caller\'s identity beyond token validity. This means tokens must be kept secret (stored in vaults, never in source code), transmitted only over HTTPS, and kept short-lived (5-60 minute expiry is typical). If a bearer token is compromised, the attacker can impersonate the client until the token expires — short expiry is the first-line defense. Tokens are obtained via OAuth 2.0 (Segment 2). The Authorization header format is always: Authorization: Bearer {token_string}.'
  },

  // ── Segment 2: OAuth 2.0 ──
  oauth2:{
    term:'OAuth 2.0',
    def:'An authorization framework that lets one system access resources on another system using time-limited, scope-limited tokens — without sharing passwords.',
    long:'OAuth 2.0 handles authorization (what the caller can do), not authentication (who the caller is). Key insight: rather than giving system B your password, system A issues a token granting specific permissions for a limited time. FHIR pipelines use OAuth 2.0 as the authorization foundation under SMART on FHIR. The four OAuth 2.0 flows are: authorization code (user present, browser redirect), implicit (deprecated), client credentials (server-to-server, no user), and device (limited-input devices). For server-to-server healthcare pipelines — which is most of the FHIR Pipeline Lab — client credentials is the correct flow.'
  },
  accessToken:{
    term:'Access token',
    def:'A short-lived string issued by an authorization server that grants a client permission to make API calls within a declared scope and duration.',
    long:'Token lifetime: typically 5-60 minutes (expires_in: 900 = 15 minutes). A well-designed pipeline never hard-codes a token. Correct refresh strategy: cache the token\'s expiration time; request a new token at T-2 minutes — not on 401 (that wastes a round-trip and may interrupt a batch operation mid-run). Tokens must be stored in memory or a secrets vault, never written to disk or logged. On an unexpected 401 mid-batch, request a new token once; if the second attempt also fails, abort the run and alert — the problem is likely misconfiguration, not expiry.'
  },
  clientCredentials:{
    term:'Client credentials flow',
    def:'The OAuth 2.0 flow for server-to-server access with no interactive user — the client authenticates with its own credentials and receives a system-scope token.',
    long:'Full sequence: (1) Pre-registration: the client registers its public key (JWKS URL) with the authorization server. (2) At runtime, the client builds a signed JWT assertion and POSTs it to the token endpoint with grant_type=client_credentials and the desired scope. (3) The authorization server verifies the JWT signature using the registered public key. (4) If valid, it returns an access token. (5) The client uses the token in Authorization: Bearer headers for the duration of the batch, refreshing before expiry. The private key never travels on the wire — only the signed assertion does. This is the flow underlying SMART Backend Services, used throughout the FHIR Pipeline Lab.'
  },
  oauthScope:{
    term:'OAuth scope',
    def:'A permission string declaring what resource types and operations a token is authorized to perform, in what patient context.',
    long:'SMART v2 scope syntax: {context}/{ResourceType}.{permissions}. Context options: "system" (all patients, system-wide — requires no user login), "patient" (single-patient context embedded in the token), "user" (based on the logged-in user\'s permissions). Permission letters: c (create), r (read), u (update), d (delete), s (search). Wildcards: system/*.rs = read and search all resource types. Production practice: enumerate specific resource types needed (system/Patient.rs system/Condition.rs) rather than using wildcards. Narrow scopes survive security audits, fail more safely when the upstream schema adds new resource types, and produce readable audit trails.'
  },
  jwt:{
    term:'JWT',expansion:'JSON Web Token',
    def:'A compact, self-contained token format consisting of three Base64url-encoded sections — header, payload, and signature — separated by dots.',
    long:'Structure: header.payload.signature. Header: {"alg":"RS256","typ":"JWT"}. Payload (standard claims): iss (issuer = client ID), sub (subject = also client ID for client credentials), aud (audience = the token endpoint URL — must match exactly), exp (expiration = now + 300 seconds max), jti (JWT ID = UUID, prevents replay). Signature: cryptographic hash of header + payload, signed with the issuer\'s RS256 private key. In SMART Backend Services, the FHIR client signs this JWT with its private key; the authorization server verifies the signature with the registered public key. The private key never travels on the wire — only the signed assertion does.'
  },
  tokenEndpoint:{
    term:'Token endpoint',
    def:'The HTTPS URL a client POSTs to in order to exchange credentials for an access token.',
    long:'Discovered from the FHIR server\'s CapabilityStatement (in the SMART security extension at rest.security.extension) or from the /.well-known/smart-configuration document. Token request is a URL-encoded POST: grant_type=client_credentials &scope={space-separated list} &client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer &client_assertion={signed JWT}. Successful response: {"access_token":"...","token_type":"bearer","expires_in":900,"scope":"..."}. Cache the response; re-request before expires_in seconds have elapsed. A 400 from the token endpoint usually means a malformed assertion; a 401 means the signature failed verification — check key registration.'
  },

  // ── Segment 3: FHIR Core Model ──
  fhirR4:{
    term:'FHIR R4',expansion:'Fast Healthcare Interoperability Resources, Release 4 (version 4.0.1)',
    def:'The current normative version of HL7\'s web-native clinical data standard, published in 2019 and required by US CMS interoperability regulations.',
    long:'FHIR R4 (4.0.1) is the baseline for all US interoperability mandates as of 2026: US Core 6.1.0, USCDI v3, the CMS Interoperability and Patient Access Rule, and the ONC HTI-1 final rule. R4B (4.3.0) introduced targeted changes to a small set of resources (Evidence, Ingredient, etc.) — most pipelines can ignore it. R5 (2023) adds significant enhancements but is not yet required or widely deployed. When a server\'s CapabilityStatement declares fhirVersion: "4.0.1", that\'s R4. Check this at pipeline startup; if the version drifts, fail the run rather than attempting to parse a potentially incompatible response format.'
  },
  fhirResource:{
    term:'FHIR resource',
    def:'The fundamental unit of FHIR data — a typed, self-contained JSON object representing one clinical or administrative entity.',
    long:'Every resource has the same outer envelope: resourceType (always first, drives parsing), id (server-assigned, URL-safe, unique on this server), meta (versionId, lastUpdated, profile URL claims, tags, security labels). Type-specific clinical elements follow. About 150 resource types exist in R4. Most pipeline work involves: Patient, Condition, Observation, MedicationRequest, Encounter, Practitioner, Organization, Bundle, CapabilityStatement, ValueSet, ConceptMap. Resources are addressable by URL: {server}/R4/{resourceType}/{id}. The URL is the global identity of a resource — it changes if the resource moves to a different server, which is why logical identifiers (MRN, NPI) are essential for cross-server matching.'
  },
  fhirBundle:{
    term:'Bundle',
    def:'A FHIR resource that contains a collection of other resources, with a type attribute that determines the semantics of the collection.',
    long:'Bundle types: searchset — returned by every FHIR search; has a total count and entries with search.mode = "match" or "include". transaction — atomic multi-resource write; all entries succeed or all fail; internal references use urn:uuid temporary IDs that the server resolves after commit. batch — like transaction but each entry succeeds or fails independently; useful when partial success is acceptable. collection — generic grouping with no transactional semantics. document — signed clinical document; first entry must be a Composition. The transaction Bundle is the terminal goal of the Produce journey. The searchset Bundle is what every search operation returns.'
  },
  fhirReference:{
    term:'Reference',
    def:'A FHIR element that links from one resource to another — by literal URL, by logical identifier, or by inline embedding.',
    long:'Literal reference: {"reference":"Patient/p001"} — relative URL, resolved on the same server. Absolute: {"reference":"https://fhir.other.example/R4/Patient/abc"} — cross-server. Logical: {"identifier":{"system":"http://hl7.org/fhir/sid/us-npi","value":"1234567890"}} — no URL; client must search by identifier to resolve. Contained: {"reference":"#local"} — points to a resource in the resource.contained array; used when the child has no independent existence. References form FHIR\'s graph: Condition → Patient (subject), Observation → Patient (subject) + Encounter (encounter), MedicationRequest → Patient (subject) + Practitioner (requester). Unresolvable references are "dangling references" — detecting them is a core pipeline concern.'
  },
  fhirExtension:{
    term:'Extension',
    def:'The FHIR mechanism for adding data elements beyond the base specification, each identified by a URL that serves as its globally unique name.',
    long:'Every extension URL is either HL7-defined or implementer-controlled. US Core defines three required Patient extensions: us-core-race (complex — has sub-extensions for ombCategory, detailed, and text), us-core-ethnicity (same structure), and us-core-birthsex (simple coded value). The race extension is not a single code — it is a complex structure with sub-extensions. A producer that expresses race as a bare string fails US Core validation. Modifier extensions live under modifierExtension instead of extension and change the meaning of the element they annotate — receivers must understand them or reject the resource. Modifier extensions are rare and always significant.'
  },
  resourceId:{
    term:'Resource ID',
    def:'The server-assigned, URL-safe string that uniquely identifies one resource instance on a given FHIR server.',
    long:'Server-assigned: the client does not choose the ID on a POST — the server sets it and returns it in the Location response header (201 Created). Clients that need to suggest an ID use PUT to a specific URL or a conditional create. Inside a transaction Bundle, temporary IDs use the urn:uuid: prefix (e.g., urn:uuid:a1b2c3) — entries reference each other with these temporary IDs, and the server replaces all urn:uuid references with server-assigned IDs after committing the transaction. ID scope is per-server: Patient "p001" on Server A is entirely different from Patient "p001" on Server B. For cross-server coordination, always use the full URL or a logical identifier.'
  },

  // ── Segment 4: Profiles + Conformance ──
  fhirProfile:{
    term:'Profile (StructureDefinition)',
    def:'A FHIR resource that constrains a base resource type — adding required elements, value set bindings, must-support flags, invariants, and extensions.',
    long:'Profiles narrow the base spec without breaking it: a valid US Core Patient is still a valid base Patient, but with additional obligations. A resource claims conformance via meta.profile: ["http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient|6.1.0"]. The version is part of the URL. A server that receives a resource with a profile claim validates the resource against that profile and returns 422 + OperationOutcome if it fails. Implementation Guides (IGs) are published collections of profiles and supporting resources — US Core is the US baseline IG; specialty IGs (oncology, cardiology, genomics) layer on top of US Core.'
  },
  usCore:{
    term:'US Core',
    def:'The HL7 Implementation Guide defining minimum FHIR conformance for US healthcare data exchange, anchored to USCDI data classes. Current version: 6.1.0.',
    long:'US Core 6.1.0 defines approximately 30 profiles: Patient, Condition (problems + health concerns), Observation (lab, vitals, social history, smoking status), MedicationRequest, Immunization, AllergyIntolerance, Procedure, Encounter, DocumentReference, DiagnosticReport, and more. US Core 6.1.0 introduces a more precise must-support obligation definition and adds several profiles for USCDI v3 requirements. The FHIR Pipeline Lab validates all incoming and outgoing resources against US Core 6.1.0. Checking a resource\'s meta.profile claim against the server\'s declared supportedProfile list is Consume Station 1\'s first gate.'
  },
  mustSupport:{
    term:'Must-support',
    def:'A US Core profile flag requiring that a producer populate this element when data is available, and a consumer not silently discard it when received.',
    long:'Must-support does NOT equal required. Required = min cardinality of 1 (always present). Must-support = if you have the data, you must send it; if you receive it, you must handle it. Practical example: US Core Patient.birthDate is must-support. A patient in a medical system almost always has a recorded birth date — its absence is a likely conformance gap. Null-flavor pattern: if a patient declined to state race, the us-core-race extension must still be present, populated with the ASKU (asked but unknown) null-flavor code — omitting the extension when the patient was asked violates must-support because the data point exists (we know they were asked and declined).'
  },
  capabilityStatement:{
    term:'CapabilityStatement',
    def:'A FHIR resource describing what a server supports — resource types, interactions, search parameters, operations, profiles, and security schemes.',
    long:'Exposed at GET /metadata (no auth required on most servers). Key fields: fhirVersion (must be "4.0.1" for R4), format (["application/fhir+json","application/fhir+xml"]), rest.mode ("server"), rest.security (SMART extensions with token endpoint URLs), rest.resource (per-type entries listing supported interactions, search parameters, and supportedProfile URLs), rest.operation (system-level operations like $export). A robust FHIR pipeline reads /metadata at startup, validates fhirVersion and declared profile URLs against expected baseline, and fails the run if either has drifted. This startup gate is Consume Station 1 of the FHIR Pipeline Lab.'
  },
  operationOutcome:{
    term:'OperationOutcome',
    def:'A FHIR resource returned by the server to communicate errors, warnings, and information — always the response body on 4xx and 5xx.',
    long:'Structure: {resourceType:"OperationOutcome", issue:[{severity, code, diagnostics, location, expression}]}. Severity: error (request failed), warning (succeeded but notable), information (purely informational). Code: required (missing element), value (invalid value), invalid (structural problem), security (auth failure), not-found. The diagnostics string contains the human-readable explanation — often citing the FHIRPath of the offending element and the constraint violated. The expression array (FHIRPath expressions) pinpoints the exact location. Reading OperationOutcome messages efficiently is the primary debugging skill for FHIR integration. Never ignore them — they contain precise information that generic HTTP error logging loses.'
  },
  uscdi:{
    term:'USCDI',expansion:'United States Core Data for Interoperability',
    def:'ONC\'s standardized set of data classes and elements that US healthcare systems are required to support for nationwide data exchange.',
    long:'USCDI v3 (2022, required by ONC\'s HTI-1 rule) defines the data classes that US Core 6.1.0 implements as FHIR profiles. Data classes include: allergies and intolerances, clinical notes, diagnoses and problems, encounter information, goals, health concerns, immunizations, laboratory, medications, patient demographics, procedures, provenance, smoking status, unique device identifiers, vital signs. When a CMS regulation says a certified EHR must support USCDI, it means the EHR must expose and accept US Core-profiled FHIR resources for all those classes. USCDI is the regulatory mandate; US Core is the FHIR technical implementation of that mandate.'
  },

  // ── Segment 5: SMART + Bulk Data ──
  smartFhir:{
    term:'SMART on FHIR',expansion:'Substitutable Medical Applications and Reusable Technologies on FHIR',
    def:'An OAuth 2.0 profile for FHIR standardizing authorization flows, scope syntax, and launch contexts for apps and server-to-server pipelines.',
    long:'SMART defines launch patterns: EHR Launch (user clicks an app from within an EHR — the app receives patient context in the token), Standalone Launch (app opens independently, requests its own patient list), and Backend Services (server-to-server, signed JWT, system-scope token — no user). SMART v2 refined scope syntax to {context}/{ResourceType}.{cruds} and added support for granular resource-level permissions. All CMS-mandated patient access endpoints must support SMART, making it the de facto US authorization standard for FHIR. The FHIR Pipeline Lab uses SMART Backend Services throughout — Segment 2 covers the underlying OAuth mechanics; SMART is the healthcare-specific wrapper.'
  },
  backendServices:{
    term:'SMART Backend Services',
    def:'The SMART on FHIR flow for machine-to-machine access: signed JWT assertion, system-scope token, no user interaction required.',
    long:'Prerequisites: register a JWKS URL (public key endpoint) with the FHIR authorization server before any token requests — this is one-time setup. Runtime: (1) Build a signed JWT assertion (iss=client_id, sub=client_id, aud=token_endpoint, exp=now+5min, jti=unique_uuid). (2) POST to token endpoint: grant_type=client_credentials, client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer, client_assertion={JWT}, scope={desired}. (3) Use the returned access_token for the batch. Private key storage: AWS Secrets Manager, HashiCorp Vault, Azure Key Vault, or equivalent — never in source code, never in environment variables that may be logged or exported. Rotation: rotate keys on a schedule; update the JWKS URL registration before retiring the old key.'
  },
  bulkExport:{
    term:'$export / Bulk Data',
    def:'An asynchronous FHIR operation that exports a large patient cohort as NDJSON files, designed for population-level pulls without individual resource requests.',
    long:'Kick-off request: POST [base]/Group/{id}/$export (group-scoped, preferred) or GET [base]/Group/{id}/$export. Response: 202 Accepted + Content-Location header pointing to the polling URL. Polling: GET the polling URL periodically — 202 means still in progress, 200 means complete, response body is a manifest listing NDJSON file URLs by resource type (Patient.ndjson, Condition.ndjson, Observation.ndjson, etc.). Download: GET each file URL. Group-scoped export is preferred over system-level export — it restricts to a defined patient cohort, which is both more efficient and more scope-appropriate. The Consume journey uses a group-scoped export from the regional HIE to pull the Cascade Cohort\'s data.'
  },
  ndjson:{
    term:'NDJSON',expansion:'Newline-Delimited JSON',
    def:'A file format where each line is a complete, independent JSON object — the standard output format of FHIR Bulk Data exports.',
    long:'Unlike a JSON array (one giant object requiring full parse before any entry is accessible), NDJSON is streamable: process one resource per line while the file is still downloading. A Bulk Data export of 10,000 Patients produces a single Patient.ndjson file with 10,000 lines — one Patient resource per line. Line count = resource count. Processing options: Python line-by-line, jq -c \'.\'  (one JSON per output line), Apache Spark textFile() input. FHIR Bulk Data NDJSON files may be gzip-compressed (.ndjson.gz) — check the Content-Encoding header on the download response and decompress before parsing. Empty files (zero-length or zero-line) are valid — they mean no resources of that type exist in the cohort.'
  },
  includeRevinclude:{
    term:'_include / _revinclude',
    def:'FHIR search modifiers instructing the server to include referenced or referencing resources in the result Bundle — reducing round-trips.',
    long:'_include follows a reference forward from search result to referenced resource: GET Observation?patient=p001&_include=Observation:subject returns matching Observations plus the Patient they reference. _revinclude follows a reference backward: GET Patient?_id=p001&_revinclude=Condition:subject returns Patient p001 plus all Conditions that have a subject reference pointing to it. Both reduce round-trips significantly for graph-traversal queries. Included resources appear in the Bundle with search.mode = "include" (vs. "match" for primary results). Support varies: not all servers support all _include/_revinclude combinations — check the CapabilityStatement rest.resource[*].searchInclude list before relying on them.'
  },
  conditionalCreate:{
    term:'Conditional create / ifNoneExist',
    def:'A FHIR create operation that only proceeds if no existing resource matches a given search condition — the primary mechanism for preventing duplicates.',
    long:'In a transaction Bundle entry: set request.method = "POST" and request.ifNoneExist to a search string (e.g., "identifier=http://hospital.example/mrn|CRH-10001"). Server behavior: if a Patient with that identifier already exists → return 200 with the existing resource and skip creation. If no match → create the resource and return 201. This is how the Produce journey handles Patient P005 (Maria Gonzales — possible near-duplicate of P001 Maria Gonzalez). Rather than forcing a second Patient resource into the system, the conditional create lets the server\'s deduplication logic decide. The ifNoneExist search string is evaluated as a standard FHIR search on the resource type being created.'
  },

  // ── Segment 6: Terminologies ──
  icd10cm:{
    term:'ICD-10-CM',expansion:'International Classification of Diseases, 10th Revision, Clinical Modification',
    def:'The US standard for coding diagnoses in all billing and interoperability contexts — approximately 70,000 codes, updated annually each October.',
    long:'Maintained by CMS and CDC. Required for all US billing claims and for US Core Condition resources. Code structure: 1 letter (category) + 2 mandatory digits + optional decimal + up to 4 more specificity characters. E11.9 = Type 2 diabetes mellitus without complications. F11.21 = Opioid dependence, in remission. I48.91 = Unspecified atrial fibrillation. The "CM" distinguishes the US clinical modification from the WHO base ICD-10. ICD-9 (used until October 2015) has a ConceptMap crosswalk to ICD-10. Consume Station 7 works this crosswalk for P002 Kowalski, whose incoming CHF record carries a legacy ICD-9 code (428.0 → I50.9).'
  },
  snomedCt:{
    term:'SNOMED CT',expansion:'Systematized Nomenclature of Medicine — Clinical Terms',
    def:'A comprehensive clinical terminology with ~350,000 hierarchically organized concepts covering diseases, findings, procedures, body structures, and substances.',
    long:'SNOMED concept IDs are integers with no structural meaning (44054006 = Diabetes mellitus type 2). Organized into 19 hierarchical axes: Clinical finding, Procedure, Observable entity, Body structure, Organism, Substance, Product, etc. More clinically detailed than ICD-10 (which was designed for billing) and broader than LOINC (observations only). SNOMED CT is the preferred clinical concept system for US Core Condition.code — a Condition should carry both a SNOMED concept (clinical accuracy) and an ICD-10 code (billing requirement) when both are available. One SNOMED concept may map to multiple ICD-10 codes depending on specificity.'
  },
  loincCode:{
    term:'LOINC',expansion:'Logical Observation Identifiers Names and Codes',
    def:'The standard for identifying lab tests, vital signs, and clinical observations — the "what was measured" identifier attached to a result.',
    long:'Maintained free by Regenstrief Institute. Code format: numeric sequence + hyphen + check digit (4548-4 = Hemoglobin A1c/Hemoglobin.total in Renal dialysis). In FHIR Observation resources, LOINC codes belong in Observation.code.coding to identify what was observed; the measured value goes in Observation.value[x]. US Core vital sign profiles bind required LOINC codes: 8480-6 = Systolic blood pressure, 8462-4 = Diastolic blood pressure, 8867-4 = Heart rate, 29463-7 = Body weight. A vital sign Observation missing the correct LOINC code fails US Core validation. LOINC is also used in DiagnosticReport and DocumentReference to identify the type of document or report.'
  },
  rxnorm:{
    term:'RxNorm',
    def:'The US standard for medication names — providing normalized, unique identifiers (RxCUI codes) for medications at multiple levels of specificity.',
    long:'Maintained free by the National Library of Medicine. RxNorm organizes medications in a hierarchy: ingredient (metformin), clinical drug (metformin 500 MG), branded drug (Glucophage 500 MG), dose form group (metformin oral product). RxCUI 860975 = Metformin 500 MG Oral Tablet. US Core MedicationRequest.medication must be coded with RxNorm — a medication documented only as free text fails conformance. The Cascade Cohort\'s P003 (buprenorphine/naloxone, a 42 CFR Part 2 case) requires ensuring the combination product RxNorm code exists in the current release before submission.'
  },
  conceptMap:{
    term:'ConceptMap',
    def:'A FHIR resource that formally defines mappings between codes in different code systems — the machine-readable representation of a crosswalk.',
    long:'Structure: groups (each maps from one source system to one target system) containing element entries (source code → target code + equivalence). Equivalence values: equivalent (exact match), wider (target is broader), narrower (target is more specific), inexact (approximate), unmatched (no mapping). The $translate terminology service operation executes a ConceptMap: send a code from system A, receive the mapped code in system B. Consume Station 7 uses a ConceptMap to translate P002 Kowalski\'s atrial fibrillation from ICD-9 (427.31) to ICD-10 (I48.91). Equivalence is "narrower" — I48.91 is more specific than old 427.31.'
  },
  valueSet:{
    term:'ValueSet',
    def:'A FHIR resource defining the allowed set of coded values for a given context — drawn from one or more code systems.',
    long:'Profiles bind elements to ValueSets at a binding strength. Key FHIR operations: $expand returns all codes in a ValueSet (used for UI pickers and completeness checks); $validate-code checks whether a given code is valid within a ValueSet. In the US, the VSAC (Value Set Authority Center) hosts most US Core ValueSets. Key sets in the FHIR Pipeline Lab: AdministrativeGender (male/female/other/unknown), ConditionClinicalStatusCodes (active/recurrence/inactive/remission/resolved), US Core Race (OMB racial categories), ObservationStatus (registered/preliminary/final/amended). A required-bound ValueSet means validators reject any code not in the set.'
  },
  bindingStrength:{
    term:'Binding strength',
    def:'How strictly a profile requires use of a bound ValueSet: required, extensible, preferred, or example.',
    long:'Required: must use a code from the ValueSet — validation fails otherwise. Example: Observation.status is required-bound to ObservationStatus; any code not in {registered, preliminary, final, amended, corrected, cancelled, entered-in-error, unknown} fails validation. Extensible: use a code from the ValueSet if one applies; use a local code only if no applicable code exists in the set — a common trap: local codes pass schema validation but may fail semantic validation on the receiving end. Preferred: strongly encouraged but not enforced. Example: illustrative only, any code accepted. The binding strength is declared in the StructureDefinition for each coded element.'
  },

  // ── Segment 7: EHR / HIE / HIPAA ──
  ehrSystem:{
    term:'EHR',expansion:'Electronic Health Record',
    def:'The primary clinical software where a healthcare organization stores patient charts, encounter notes, orders, lab results, and care plans.',
    long:'Major US vendors: Epic (dominant in large health systems and academic medical centers), Oracle Health / Cerner (large and mid-size hospitals), Meditech (community hospitals), athenahealth (ambulatory). EHRs are the primary source of FHIR data in modern pipelines. CMS certification requirements have pushed all major EHRs to expose FHIR R4 / US Core APIs, but implementation quality and completeness vary significantly by vendor and configuration. SMART on FHIR app launch is certified by ONC. The Produce journey models submitting post-discharge data from a hospital EHR to external recipients — a transaction Bundle POST to the receiving organization\'s FHIR server.'
  },
  hie:{
    term:'HIE',expansion:'Health Information Exchange',
    def:'A network or organization enabling the sharing of clinical data among multiple healthcare providers across a region or state.',
    long:'National networks: CommonWell Health Alliance, Carequality (a framework enabling cross-network query). State HIEs vary: NY SHIN-NY, CalHIE (California), Colorado RHIO. The Cascade Regional HIE (fictional) used in the FHIR Pipeline Lab is a regional HIE aggregating patient data from multiple organizations and exposing it via FHIR. The Consume journey models a pipeline receiving data from this HIE — a realistic pattern for health systems wanting community-wide clinical history to support care coordination and readmission risk modeling. In practice, HIE FHIR APIs may lag EHR vendor implementations in profile conformance quality.'
  },
  hipaa:{
    term:'HIPAA',expansion:'Health Insurance Portability and Accountability Act (1996)',
    def:'US federal law establishing national standards for the protection of health information privacy and security.',
    long:'Three rules relevant to FHIR engineers: Privacy Rule (defines PHI, restricts use and disclosure — minimum necessary principle applies to scope design: request only the data the pipeline actually needs). Security Rule (requires administrative, physical, and technical safeguards for electronic PHI — encryption in transit and at rest, access controls, audit logging). Breach Notification Rule (mandatory notification when PHI is compromised). Business Associate Agreements (BAAs) are required between covered entities and their technology vendors. HIPAA shapes FHIR pipeline design throughout: what data you request, how long you retain it, how you log access, and how you respond to unauthorized disclosure.'
  },
  phi:{
    term:'PHI',expansion:'Protected Health Information',
    def:'Individually identifiable health information held by a HIPAA-covered entity — the regulated category of data that triggers HIPAA protections.',
    long:'HIPAA defines 18 identifier categories whose presence makes information PHI: names, geographic subdivisions smaller than state, dates (except year) related to the individual, phone numbers, fax numbers, email addresses, SSNs, MRNs, health plan beneficiary numbers, account numbers, certificate/license numbers, VINs, device identifiers, URLs, IP addresses, biometric identifiers, full-face photographs, and any other unique identifying number. FHIR Patient resources contain PHI by definition. All FHIR pipeline traffic involving PHI must be HTTPS, must be authorized with an OAuth token, and must be logged for HIPAA audit purposes. PHI must not appear in log files, error messages, or monitoring dashboards.'
  },
  safeHarbor:{
    term:'Safe Harbor de-identification',
    def:'A HIPAA-approved method requiring removal of all 18 identifier categories plus good-faith verification that remaining data cannot re-identify an individual.',

    lecture:`
<p><strong>Sofia Patel</strong>, 55, recently relocated from Phoenix to Portland. Last Tuesday she visited Valley Urgent Care with elevated blood pressure — her Lisinopril refill had been delayed and her systolic had climbed to 148. The clinic adjusted her dosage and created a visit record in their EHR.</p>
<p>Two days later, Sofia's new primary care physician at Cascade Valley Medical wants to review that urgent care visit before her intake appointment. Both clinics run FHIR-enabled systems. The mechanism that lets one system reach into another and request clinical data is a <button class="card-link" onclick="openCardModal('restApi')">REST API</button> — and the shared language both systems already speak is <strong>HTTP</strong>.</p>

<h4>HTTP — the shared protocol</h4>
<p>HTTP (Hypertext Transfer Protocol) is the same protocol your browser uses to load webpages. It is also what every FHIR system uses to exchange clinical data. When Sofia's PCP's system wants her Patient resource, it sends an HTTP <em>request</em> to Valley Urgent Care's FHIR server. The server sends back an HTTP <em>response</em>.</p>
<p>Every request has four parts: a <strong>verb</strong> (what action), a <strong>URL</strong> (which resource), <strong>headers</strong> (metadata), and an optional <strong>body</strong> (data being sent). Every response has: a <strong>status code</strong> (did it work?), <strong>headers</strong>, and an optional <strong>body</strong> (the data or an error explanation).</p>

<h4>The five verbs — what each one does</h4>
<ul>
  <li><strong>GET</strong> — read a resource or search for resources. No body. Repeatable without side effects: GETting the same Patient 100 times changes nothing on the server.</li>
  <li><strong>POST</strong> — create a new resource or submit a Bundle transaction. Has a body. The server assigns the new resource's ID.</li>
  <li><strong>PUT</strong> — replace a resource entirely. Requires the full resource body — not just the changed fields.</li>
  <li><strong>DELETE</strong> — remove a resource. Rare in clinical contexts; most production FHIR servers disable it due to regulatory retention requirements.</li>
  <li><strong>PATCH</strong> — partial update. Changes specific fields without resending the whole resource — useful for correcting a Condition status.</li>
</ul>
<p>For a <em>consuming</em> pipeline (reading data you don't control), GET dominates. For a <em>producing</em> pipeline (writing data to an external server), POST and PUT are the workhorses.</p>

<h4>Status codes — the server's answer</h4>
<p>Every response carries a <button class="card-link" onclick="openCardModal('statusCode')">status code</button>. The first digit tells you the category. The codes you'll see constantly in FHIR work:</p>
<ul>
  <li><code>200 OK</code> — resource returned successfully</li>
  <li><code>201 Created</code> — new resource created; the Location response header holds its URL</li>
  <li><code>400 Bad Request</code> — malformed JSON or a missing required header</li>
  <li><code>401 Unauthorized</code> — no valid access token (or token expired)</li>
  <li><code>403 Forbidden</code> — valid token but insufficient scope</li>
  <li><code>404 Not Found</code> — no resource with that ID on this server</li>
  <li><code>422 Unprocessable Entity</code> — FHIR's validation error. The JSON parsed, but the resource content failed profile rules. The response body is always an <code>OperationOutcome</code> naming exactly what failed and why. <strong>This is the most common non-trivial error in FHIR integration work.</strong></li>
  <li><code>500 Internal Server Error</code> — something broke on the server, not the caller's fault</li>
</ul>

<h4>Headers — the envelope metadata</h4>
<p>Every FHIR request carries <button class="card-link" onclick="openCardModal('httpHeader')">headers</button> that govern how the message is interpreted:</p>
<ul>
  <li><code>Content-Type: application/fhir+json</code> — required when sending a resource body. Missing this header on a POST causes many servers to reject the request even if the JSON is otherwise valid.</li>
  <li><code>Accept: application/fhir+json</code> — tells the server to respond in FHIR JSON rather than XML.</li>
  <li><code>Authorization: Bearer {token}</code> — carries the OAuth 2.0 access token. Required on virtually every request beyond <code>/metadata</code>. Segment 2 explains how to obtain this token.</li>
</ul>

<h4>JSON — the data format</h4>
<p>FHIR resources are <button class="card-link" onclick="openCardModal('jsonFormat')">JSON</button> objects. JSON has six value types: strings (<code>"female"</code>), numbers (<code>62</code>), booleans (<code>true</code>), null, objects (<code>{"key":"value"}</code>), and arrays (<code>["item1","item2"]</code>). FHIR resources are deeply nested JSON objects. Three operations cover most navigation: access a field (<code>resource.resourceType</code>), access an array element (<code>resource.name[0].family</code>), check whether a key exists before accessing it.</p>

<h4>The FHIR URL pattern</h4>
<pre class="code-block"><span class="hl-comment"># Read one specific resource by its ID</span>
{base}/R4/{resourceType}/{id}
https://fhir.valley-uc.example/R4/Patient/p-sofia-001

<span class="hl-comment"># Search for resources by attribute (returns a searchset Bundle)</span>
{base}/R4/{resourceType}?{search parameters}
https://fhir.valley-uc.example/R4/Patient?family=Patel&birthdate=1970-06-15</pre>
<p>The <code>/R4/</code> segment in the path identifies the FHIR version. Some servers include it; others use a version-less base URL and declare the version in their CapabilityStatement. When a URL lacks <code>/R4/</code>, check <code>/metadata</code> to confirm what version the server speaks before assuming.</p>

<div class="callout"><span class="callout-icon">💡</span>The <button class="card-link" onclick="openCardModal('bearerToken')">bearer token</button> travels in the Authorization header on every request. It proves the calling system has been granted permission. Segment 2 covers how it's obtained. For now, note the header slot it occupies — every example in this primer will include it.</div>

    lecture:`
<p>We know how to <em>fetch</em> Sofia's record once we have a URL. The harder question is: how does Valley Urgent Care's FHIR server know that the PCP's system is who it claims to be — and that it's permitted to access Sofia's records at all?</p>
<p>The answer is <button class="card-link" onclick="openCardModal('oauth2')">OAuth 2.0</button>. Before any FHIR request, the pipeline must obtain an <button class="card-link" onclick="openCardModal('accessToken')">access token</button> and include it in the Authorization header of every subsequent request.</p>

<h4>Why not passwords?</h4>
<p>Shared passwords between systems create shared risk. If the PCP's system is compromised, the attacker has full access to Valley Urgent Care's patient data for as long as the password is valid — and shared passwords typically don't expire. They also can't express granular permissions: "read Patient and Condition for the next 15 minutes only."</p>
<p>OAuth 2.0 solves both problems. The authorization server issues a token with a declared scope and a short lifetime. If stolen, the attacker has limited access for limited time. When it expires, it's worthless. And the scope string encodes exactly what the token permits.</p>

<h4>The client credentials flow — step by step</h4>
<p>When no user is involved — a batch pipeline, a nightly sync, an automated intake process — use the <button class="card-link" onclick="openCardModal('clientCredentials')">client credentials flow</button>. The complete sequence:</p>
<ol>
  <li><strong>Pre-registration (one-time setup):</strong> The PCP's system registers its public key (a JWKS URL) with Valley Urgent Care's authorization server. This is identity establishment — "here is my public key; verify my signatures with it."</li>
  <li><strong>Build a JWT assertion:</strong> At runtime, the pipeline constructs a <button class="card-link" onclick="openCardModal('jwt')">JWT</button> signed with its private key. The JWT claims: who I am (<code>iss</code>), who I'm requesting from (<code>aud</code> = the token endpoint URL), when this expires (<code>exp</code> = a few minutes from now), a unique ID (<code>jti</code>) to prevent replay attacks.</li>
  <li><strong>POST to the token endpoint:</strong> Send the signed JWT to the <button class="card-link" onclick="openCardModal('tokenEndpoint')">token endpoint</button> with <code>grant_type=client_credentials</code> and the desired scope.</li>
  <li><strong>Server verifies:</strong> The authorization server checks the JWT's signature against the registered public key. If valid, it issues a token.</li>
  <li><strong>Token response:</strong> <code>{"access_token":"eyJhb...","token_type":"bearer","expires_in":900,"scope":"..."}</code></li>
  <li><strong>Use the token:</strong> Every FHIR request carries <code>Authorization: Bearer eyJhb...</code>. Cache the token; re-request two minutes before <code>expires_in</code> elapses.</li>
</ol>
<p>The private key never travels on the wire — only the signed assertion does. An assertion that fails signature verification is rejected before any token is issued.</p>

<h4>Scopes — what the token is allowed to do</h4>
<p>A <button class="card-link" onclick="openCardModal('oauthScope')">scope</button> is a permission string. SMART v2 syntax: <code>{context}/{ResourceType}.{permissions}</code></p>
<ul>
  <li><code>system/Patient.rs</code> — read and search Patient resources, system-wide (all patients, no user context needed)</li>
  <li><code>system/Condition.rs</code> — read and search Conditions system-wide</li>
  <li><code>system/MedicationRequest.rs</code> — read and search MedicationRequests system-wide</li>
  <li><code>system/*.rs</code> — read and search every resource type the server exposes (broad — use only when a narrower scope is genuinely not feasible; will fail most security audits)</li>
</ul>
<p>For a pipeline loading data for a cohort of 5 patients: enumerate the specific resource types needed. A security reviewer will ask "why does this system have wildcard access?" Narrow scopes have defensible answers. Wildcards rarely do.</p>

<h4>Token lifetime and the refresh strategy</h4>
<ul>
  <li>Request a token at pipeline startup; cache its <code>expires_in</code> timestamp</li>
  <li>Refresh two minutes before expiry — proactively, not reactively on 401</li>
  <li>Store the private key in a secrets vault (AWS Secrets Manager, HashiCorp Vault, Azure Key Vault) — never in source code, never in environment variables that may be logged</li>
  <li>On an unexpected 401 mid-batch, request one new token; if that also fails 401, abort and alert — the problem is configuration, not expiry</li>
</ul>

<p>When the authorized GET request reaches Valley Urgent Care's server and returns 200 OK, the response body is a JSON object — but not arbitrary JSON. It's a <button class="card-link" onclick="openCardModal('fhirResource')">FHIR resource</button>. Resources are the building blocks of everything in <button class="card-link" onclick="openCardModal('fhirR4')">FHIR R4</button>. Let's open one up.</p>

<h4>The anatomy of every resource</h4>
<p>Every FHIR R4 resource shares the same outer envelope regardless of type:</p>
<pre class="code-block">{

    <span class="hl-key">"lastUpdated"</span>: <span class="hl-str">"2026-04-15T14:22:00Z"</span>,
    <span class="hl-key">"profile"</span>: [
      <span class="hl-str">"http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient|6.1.0"</span>
    ]                                  <span class="hl-comment">// profile conformance claim</span>
  },
  <span class="hl-comment">// ... type-specific clinical elements below</span>
}</pre>
<p>The <code>meta.profile</code> array is where a resource declares which profiles it claims to conform to. A receiving server that sees this claim validates the resource against that profile and returns 422 + OperationOutcome if it fails.</p>

<h4>Resource types that matter in pipeline work</h4>
<ul>
  <li><strong>Patient</strong> — the person. Every other resource references Patient directly or indirectly.</li>
  <li><strong>Condition</strong> — a diagnosis or health concern. Has clinical status (active/resolved), verification status (confirmed/provisional), and one or more codes (ICD-10, SNOMED CT).</li>
  <li><strong>Observation</strong> — a measurement: lab result, vital sign, social history item. Has a LOINC code (what was measured) and a value (the result).</li>
  <li><strong>MedicationRequest</strong> — a medication order. Has an RxNorm code, dose instructions, authored date, and a status.</li>
  <li><strong>Encounter</strong> — a visit: an ED arrival, outpatient appointment, inpatient admission. The container that clinical resources hang off of.</li>
  <li><strong>CapabilityStatement</strong> — the server's self-description. Segment 4 covers this in detail.</li>
</ul>

<h4>Bundle types — the four you need</h4>
<p>A <button class="card-link" onclick="openCardModal('fhirBundle')">Bundle</button> is itself a resource whose job is to hold other resources. The <code>type</code> field determines what the Bundle means:</p>
<ul>
  <li><strong>searchset</strong> — returned by every FHIR search. Has a <code>total</code> count; each entry has <code>search.mode</code> of "match" (primary result) or "include" (pulled in via _include/_revinclude).</li>
  <li><strong>transaction</strong> — atomic multi-resource write: all entries succeed or all fail together. Internal references between entries use <code>urn:uuid:</code> temporary IDs that the server resolves after commit. <em>This is the Produce journey's terminal goal.</em></li>
  <li><strong>batch</strong> — like transaction, but each entry succeeds or fails independently. Useful when partial success is acceptable.</li>
  <li><strong>collection</strong> — generic grouping with no transactional semantics. Used to group resources for informational purposes.</li>
</ul>

<h4>References — how resources link to each other</h4>
<p>FHIR is a graph. Every Condition has a <code>subject</code> (the Patient), every Observation has a <code>subject</code> (the Patient) and an <code>encounter</code> (the Encounter), every MedicationRequest has a <code>requester</code> (the Practitioner). These links are <button class="card-link" onclick="openCardModal('fhirReference')">References</button>:</p>
<pre class="code-block">{
  <span class="hl-key">"resourceType"</span>: <span class="hl-str">"Condition"</span>,
  <span class="hl-key">"id"</span>: <span class="hl-str">"cond-sofia-htn"</span>,
  <span class="hl-key">"subject"</span>: {
    <span class="hl-key">"reference"</span>: <span class="hl-str">"Patient/p-sofia-001"</span>    <span class="hl-comment">// literal ref — same server</span>
  },
  <span class="hl-key">"asserter"</span>: {
    <span class="hl-key">"identifier"</span>: {                           <span class="hl-comment">// logical ref — search by ID</span>
      <span class="hl-key">"system"</span>: <span class="hl-str">"http://hl7.org/fhir/sid/us-npi"</span>,
      <span class="hl-key">"value"</span>: <span class="hl-str">"1234567890"</span>
    }
  }
}</pre>
<p>A <strong>literal reference</strong> (<code>"Patient/p-sofia-001"</code>) is a relative URL resolved on the same server. An <strong>absolute reference</strong> is a full HTTPS URL for cross-server resources. A <strong>logical reference</strong> uses an identifier — the receiver must search by that identifier to resolve it. Unresolvable references (the referenced resource doesn't exist) are called <em>dangling references</em> — detecting them is a core Consume pipeline concern.</p>

<h4>Extensions — when the base spec has no field</h4>
<p>Some clinical data has no home in the base resource. <button class="card-link" onclick="openCardModal('fhirExtension')">Extensions</button> are FHIR's solution. Sofia's race and ethnicity live in US Core extensions, not in base Patient fields:</p>
<pre class="code-block">{
  <span class="hl-key">"extension"</span>: [{
    <span class="hl-key">"url"</span>: <span class="hl-str">"http://hl7.org/fhir/us/core/StructureDefinition/us-core-race"</span>,
    <span class="hl-key">"extension"</span>: [
      { <span class="hl-key">"url"</span>: <span class="hl-str">"ombCategory"</span>,
        <span class="hl-key">"valueCoding"</span>: { <span class="hl-key">"code"</span>: <span class="hl-str">"2106-3"</span>, <span class="hl-key">"display"</span>: <span class="hl-str">"White"</span> } },
      { <span class="hl-key">"url"</span>: <span class="hl-str">"text"</span>, <span class="hl-key">"valueString"</span>: <span class="hl-str">"White"</span> }
    ]
  }]
}</pre>
<p>The race extension is <em>structured</em> — it contains sub-extensions, not a single code. A producer that tries to express race as a bare string fails US Core validation. This pattern — an extension containing further extensions — appears whenever a concept requires more than one data point to express.</p>

<div class="callout"><span class="callout-icon">📌</span><strong>Resource IDs</strong> are <button class="card-link" onclick="openCardModal('resourceId')">server-assigned</button>. On a successful POST, the server returns 201 Created with a Location header containing the new resource's URL. Inside transaction Bundles, temporary <code>urn:uuid:</code> IDs allow entries to reference each other before the server assigns real IDs post-commit.</div>

  {

    title:'Profiles and conformance rules',

    endGoal:'You\'ll understand what a profile constrains, what must-support actually requires of a producer, and how to read an OperationOutcome to diagnose a 422 failure.',

    cards:['fhirProfile','usCore','mustSupport','capabilityStatement','operationOutcome','uscdi'],
    lecture:`
<p>A base FHIR Patient resource is permissive — it defines many optional fields and few required ones. It imposes no obligation on race or ethnicity, no particular identifier format, and no requirement to claim any profile at all. What <button class="card-link" onclick="openCardModal('usCore')">US Core 6.1.0</button> adds is a constrained layer: specific elements that must be present when data is available, specific value sets that must be used, and specific extensions that producers are obligated to include. Those constraints live in a <button class="card-link" onclick="openCardModal('fhirProfile')">profile</button>.</p>
<p>US Core 6.1.0 defines approximately 30 profiles, aligned to <button class="card-link" onclick="openCardModal('uscdi')">USCDI v3</button> data classes — the ONC regulatory mandate. A resource that claims conformance to a US Core profile via <code>meta.profile</code> will be validated against that profile's rules by any compliant server. Validation failure returns 422 + <button class="card-link" onclick="openCardModal('operationOutcome')">OperationOutcome</button>.</p>

<h4>The profile claim and what triggers validation</h4>
<p>When Sofia's Patient resource includes:</p>
<pre class="code-block"><span class="hl-key">"meta"</span>: { <span class="hl-key">"profile"</span>: [<span class="hl-str">"http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient|6.1.0"</span>] }</pre>
<p>...the server reads that as a promise: "this resource conforms to US Core Patient 6.1.0." A compliant server validates the resource against that profile. If it fails — say, the race extension is absent when it should be present — the server returns 422 with an OperationOutcome. A resource without any <code>meta.profile</code> claim is validated only against the base spec; the server won't check US Core rules unless it's configured to enforce them regardless.</p>

<h4>Must-support — the most misunderstood flag</h4>
<p>Every profile element carries one of three conformance designations: <em>required</em> (cardinality min=1 — always present), <em>must-support</em>, or <em>optional</em>. <button class="card-link" onclick="openCardModal('mustSupport')">Must-support</button> sits between required and optional, and both sides of the exchange carry an obligation:</p>
<ul>
  <li><strong>Producer obligation:</strong> if the data is available, include the element. You may not omit it just because it's inconvenient to populate.</li>
  <li><strong>Consumer obligation:</strong> if the element is received, process it meaningfully. You may not silently discard it.</li>
</ul>
<p>A subtle but important case: <em>known-declined data</em>. Suppose Sofia was asked her race and declined to answer. US Core Patient.extension:race is must-support. The data point exists — we know she was asked, we know she declined. The producer must still include the extension, populated with the null-flavor code <code>ASKU</code> (asked but unknown). Omitting the extension because the value is missing violates must-support. This is why a Patient record arriving without any race extension warrants a quality flag: either the data was never collected (possible conformance gap at intake) or the producer omitted it without applying the null-flavor (definite conformance gap).</p>

<h4>The CapabilityStatement — read this before issuing any other request</h4>
<p>Every FHIR server exposes a <button class="card-link" onclick="openCardModal('capabilityStatement')">CapabilityStatement</button> at <code>GET /metadata</code>. No auth required on most servers. A production pipeline reads this document at startup and validates three things before proceeding:</p>
<ol>
  <li><strong>fhirVersion:</strong> must be <code>"4.0.1"</code> for R4. If the server upgraded to R5 or is running R4B, the response format may be incompatible — fail the run.</li>
  <li><strong>Declared profile URLs:</strong> the <code>rest.resource[*].supportedProfile</code> list should include the US Core profile URLs the pipeline expects. If a profile has been removed or renamed, downstream validation behavior will differ — fail the run.</li>
  <li><strong>Security scheme:</strong> <code>rest.security.extension</code> contains the SMART URLs — token endpoint, authorize endpoint. Extract these here rather than hardcoding them in the pipeline configuration.</li>
</ol>
<p>Consume Station 1 of the FHIR Pipeline Lab is built around this startup gate. A server that passes all three checks gets a green light; anything else aborts with a diagnostic message rather than letting bad data silently propagate.</p>

<h4>Reading an OperationOutcome — the core debugging skill</h4>
<p>When a FHIR request returns 422 (or any 4xx), the response body is always an OperationOutcome. Knowing where to look makes diagnosis fast:</p>
<pre class="code-block">{
  <span class="hl-key">"resourceType"</span>: <span class="hl-str">"OperationOutcome"</span>,
  <span class="hl-key">"issue"</span>: [{
    <span class="hl-key">"severity"</span>: <span class="hl-str">"error"</span>,          <span class="hl-comment">// error | warning | information</span>
    <span class="hl-key">"code"</span>: <span class="hl-str">"required"</span>,           <span class="hl-comment">// required | value | invalid | security ...</span>
    <span class="hl-key">"diagnostics"</span>: <span class="hl-str">"Patient.name: minimum required = 1, but only found 0"</span>,
    <span class="hl-key">"expression"</span>: [<span class="hl-str">"Patient.name"</span>]   <span class="hl-comment">// FHIRPath — exact location</span>
  }]
}</pre>
<p>The <code>expression</code> array is the most actionable field — it gives you the FHIRPath location of the failing element so you can navigate directly to it in the resource. The <code>diagnostics</code> string explains why it failed. The <code>code</code> tells you the category: <code>required</code> means a missing element, <code>value</code> means an invalid value (wrong code, wrong format), <code>security</code> means an auth failure. Read issue entries top-to-bottom; fix the first error before investigating the rest — later errors are sometimes cascading symptoms of the first.</p>
    `,
    beforeAfter:{
      beforeLabel:'Unprofiiled base Patient — passes base spec, fails US Core',
      beforeContent:`<pre style="font-family:var(--mono);font-size:10.5px;line-height:1.75;color:#2a2a2a;background:transparent;margin:0;white-space:pre-wrap">{

}</pre>`

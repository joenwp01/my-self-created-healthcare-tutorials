{id:5,icon:'📊',title:'Measuring Re-Identification Risk',subtitle:'Three attacker models, three formulas, one threshold: ≤ 0.09',minutes:10,
cards:['prosecutor_model','journalist_model','marketer_model'],
endGoal:'You can compute all three re-identification risk metrics (Prosecutor, Journalist, Marketer) for a small dataset and determine whether each passes the ≤ 0.09 Expert Determination threshold.',
lecture:`
<p>Alex has applied Safe Harbor rules. But his research partner wants Expert Determination — a statistical certificate that the re-identification risk is "very small." HIPAA interprets "very small" as <strong>≤ 0.09 (9%)</strong> under the prosecutor model.</p>
<p>This requires computing three different risk metrics, each representing a different type of attacker. Understanding which metric measures which threat is the key to interpreting the results.</p>

<h3>The three attacker models</h3>
<p>The models differ in what the attacker already knows and what they are trying to do:</p>

<h4>Model 1 — The <button class="card-link" onclick="openCardModal('prosecutor_model')">Prosecutor Model</button></h4>
<p><strong>Attacker profile:</strong> Already knows a specific named individual is in the dataset. Trying to find that person's record and confirm their diagnosis. Models: targeted litigation, insurance fraud investigation, domestic surveillance.</p>
<div class="demo-formula">Prosecutor Risk = 1 / min(k)</div>
<p>Where min(k) = the smallest equivalence class size in the dataset. <strong>Even a single record with k=1 drives prosecutor risk to 1.0 (100%).</strong> This is the most conservative of the three models.</p>
<p><strong>Threshold:</strong> Prosecutor Risk ≤ 0.09 requires min(k) ≥ 12, because 1/12 ≈ 0.083 &lt; 0.09.</p>

<h4>Model 2 — The <button class="card-link" onclick="openCardModal('journalist_model')">Journalist Model</button></h4>
<p><strong>Attacker profile:</strong> Picks a random record from the dataset and tries to identify whoever it belongs to. Models: investigative journalism, spot-check attacks, random sampling attacks.</p>
<div class="demo-formula">Journalist Risk = (number of records with k = 1) / N</div>
<p>This measures what fraction of the dataset is trivially re-identifiable. A record with k=1 is a singleton — the only record in its equivalence class. Anyone who lands on that record by random selection immediately knows which specific person it is.</p>

<h4>Model 3 — The <button class="card-link" onclick="openCardModal('marketer_model')">Marketer Model</button></h4>
<p><strong>Attacker profile:</strong> Purchases the dataset and runs a bulk linkage attack against a commercial auxiliary database, trying to re-identify as many records as possible. Models: data brokers, commercial surveillance.</p>
<div class="demo-formula">Marketer Risk = (1/N) × Σ(1/kᵢ)  [sum over all records i]</div>
<p>This is the <em>average expected re-identification rate</em>. For each record, compute the probability of correctly identifying that individual (= 1/kᵢ). Add all those probabilities together. Divide by N to get the average.</p>

<h3>Connecting k to the threshold</h3>
<p>The variable <strong>k</strong> (equivalence class size) is the common thread across all three models. Larger k → more people share the same QI combination → harder to identify anyone → lower risk.</p>
<ul>
<li>k = 1 → prosecutor risk = 1.0 (fails immediately)</li>
<li>k = 5 → prosecutor risk = 1/5 = 0.20 (fails)</li>
<li>k = 10 → prosecutor risk = 1/10 = 0.10 (fails — just above threshold)</li>
<li>k = 12 → prosecutor risk = 1/12 ≈ 0.083 ✓ (passes)</li>
<li>k = 20 → prosecutor risk = 1/20 = 0.05 ✓ (passes comfortably)</li>
</ul>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — All Three Risks for a 10-Patient Dataset</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600"><strong>Scenario:</strong> A dataset of N=10 records. After generalization: 1 record has k=1, 4 records have k=2, 5 records have k=5. Compute all three risks.</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Prosecutor Risk = 1 / min(k)</strong><br>The smallest k is 1 (that one unique record). min(k) = 1.<br>Prosecutor Risk = 1/1 = <strong>1.00 → FAIL</strong> ✗ (threshold is ≤ 0.09)</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>Journalist Risk = (k=1 records) / N</strong><br>Records with k=1: just 1 record. N = 10.<br>Journalist Risk = 1/10 = <strong>0.10 → FAIL</strong> ✗ (just above 0.09)</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>Marketer Risk = (1/N) × Σ(1/kᵢ)</strong><br>Compute 1/k for each record: 1 record contributes 1/1 = 1.0; 4 records each contribute 1/2 = 0.5; 5 records each contribute 1/5 = 0.2<br>Σ(1/kᵢ) = 1.0 + (4 × 0.5) + (5 × 0.2) = 1.0 + 2.0 + 1.0 = 4.0<br>Marketer Risk = (1/10) × 4.0 = <strong>0.40 → FAIL</strong> ✗</div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>Conclusion:</strong> All three models fail. The k=1 record is the primary cause. Suppressing it removes it from the dataset: new N=9, all records have k ≥ 2. Recompute to verify the dataset then passes.</div></div>
</div>
</details>

<div class="fill-exercise">

<div class="fill-actions">

<div id="s5_sol" class="fill-solution">
<strong>Prosecutor:</strong> min(k) = 1 (two records have k=1). 1 ÷ 1 = 1.00. Fails badly — the presence of ANY k=1 record drives prosecutor risk to maximum.<br>
<strong>Journalist:</strong> 2 records with k=1, N=15. Risk = 2/15 ≈ 0.133. Fails (> 0.09). Those 2 records represent 13.3% of the dataset — too high a fraction of trivially exposable records.<br>
<strong>Marketer:</strong> Σ(1/kᵢ) = 2×(1/1) + 6×(1/3) + 7×(1/7) = 2 + 2 + 1 = 5. Marketer = (1/15) × 5 = 0.333. Fails significantly.<br>
<strong>Fix:</strong> Suppress the 2 k=1 records. New N=13, min(k)=3. Prosecutor = 1/3 ≈ 0.333 — still fails! The dataset needs k ≥ 12 for prosecutor to pass. More generalization (or a much larger source dataset) is required.
</div>
</div>
`,

// ─── SEGMENT 6: k-Anonymity & l-Diversity ───
{id:6,icon:'👥',title:'k-Anonymity and l-Diversity',subtitle:'Forming equivalence classes, suppression decisions, and attribute protection',minutes:10,
cards:['k_anonymity','equivalence_class','l_diversity','homogeneity_attack'],
endGoal:'You can form equivalence classes from a small dataset, decide which records require suppression, compute both k and l for each class, and identify homogeneity attack failures.',
lecture:`
<p>Alex now knows how to <em>measure</em> re-identification risk. Now he needs to know how to <em>achieve</em> low risk — specifically, how to organize the dataset into groups where no individual can be singled out, and where the groups themselves do not reveal sensitive diagnoses.</p>

<h3>k-Anonymity — hiding in a crowd</h3>
<p><button class="card-link" onclick="openCardModal('k_anonymity')">k-Anonymity</button> provides a formal guarantee: every record in the dataset is indistinguishable from at least <strong>k-1 other records</strong> on all quasi-identifier fields.</p>
<p>Think of it like this: if your QI combination is "Female, age 50s, ZIP 980," you cannot be identified unless the attacker can narrow it down to one specific person. If 4 other records share that exact combination, the attacker faces 1-in-5 uncertainty — they know you are one of those 5 people, but not which one.</p>
<p>The group of records sharing identical QI values is called an <button class="card-link" onclick="openCardModal('equivalence_class')">equivalence class</button>.</p>

<h3>How to form equivalence classes: step by step</h3>
<p>Given a small dataset, the process is:</p>
<ul>
<li><strong>Step 1:</strong> Apply generalization to all QI fields (DOB → year, ZIP → 3-digit prefix)</li>
<li><strong>Step 2:</strong> Group records with identical generalized QI values — each group is one equivalence class</li>
<li><strong>Step 3:</strong> Count the size of each group — that is the k value for those records</li>
<li><strong>Step 4:</strong> Any record whose group size &lt; required k must either be further generalized (merge it into a larger group) or suppressed (deleted)</li>
</ul>

<h3>The suppression decision rule</h3>
<p>When a record cannot be grouped (it is the only record with its QI combination after generalization): <strong>suppress it</strong> (delete from the released dataset). This is the record's "cost" — it is removed to protect the remaining records' privacy guarantees.</p>
<p><button class="card-link" onclick="openCardModal('suppression')">Suppression</button> rate = (records suppressed) ÷ N. A high suppression rate reduces the dataset's analytical value. Larger datasets typically achieve lower suppression rates because natural groupings are more common.</p>

<h3>l-Diversity — protecting the diagnosis</h3>
<p>k-Anonymity protects <em>identity</em>. It does not protect <em>what the attacker can infer about a person</em>. This is where <button class="card-link" onclick="openCardModal('l_diversity')">l-diversity</button> comes in.</p>
<p>Suppose a k=5 equivalence class contains 5 records — all with the same diagnosis: HIV. An attacker who successfully links a person to this class immediately knows their diagnosis with 100% certainty, despite having no idea which of the 5 people it is. This is called the <button class="card-link" onclick="openCardModal('homogeneity_attack')">homogeneity attack</button>.</p>
<p><strong>l-Diversity rule:</strong> Within each equivalence class, there must be at least <strong>l distinct values</strong> of every sensitive attribute.</p>
<div class="demo-formula">l = number of distinct sensitive attribute values within one equivalence class</div>
<ul>
<li>l = 1 → all records share the same sensitive value → 100% inference certainty → <strong>FAIL</strong></li>
<li>l = 2 → at least 2 distinct values → attacker has at most 50% certainty → meets minimum standard</li>
<li>l = 3 → at least 3 distinct values → attacker has at most 33% certainty → stronger protection</li>
</ul>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Meridian Cohort: Forming Groups and Checking l</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600"><strong>Scenario:</strong> After applying DOB → year and ZIP → 3-digit prefix, Alex groups the Meridian Cohort records by their generalized QI values: {Sex, Birth Year Decade, ZIP prefix}. Target: k = 2.</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Assign generalized QI values:</strong><br>P1 Margaret: {F, 70s, 980} — P2 David: {M, 40s, 981} — P3 Yolanda: {F, 50s, 980}<br>P4 Thomas: {M, 40s, 981} — P5 Priya: {F, 50s, 980} — P6 James: {M, 30s, 980}</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>Group by identical QI values:</strong><br>Group α: P2 David {M, 40s, 981} + P4 Thomas {M, 40s, 981} → k = 2 ✓<br>Group β: P3 Yolanda {F, 50s, 980} + P5 Priya {F, 50s, 980} → k = 2 ✓<br>P1 Margaret {F, 70s, 980} → alone → k = 1 → must suppress<br>P6 James {M, 30s, 980} → alone → k = 1 → must suppress</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>Check l-diversity for each group:</strong><br>Group α: David has OUD (F11.20), Thomas has Hypertension (I10) → 2 distinct values → l = 2 ✓<br>Group β: Yolanda has T2DM (E11.9), Priya has Bipolar (F31.9) → 2 distinct values → l = 2 ✓</div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>Suppression rate:</strong> 2 records suppressed (P1, P6) out of N=6 total. Suppression rate = 2/6 ≈ 33%. High, but unavoidable in this small cohort. In a 2,000-patient dataset, this same combination would produce &lt;1% suppression.</div></div>
</div>
</details>

{id:7,icon:'🎲',title:'Probability Chains and Unicity',subtitle:'Anonymity sets, QI intersection, and how generalization restores safety',minutes:9,
cards:['conditional_probability','anonymity_set','unicity'],
endGoal:'You can compute an anonymity set size by applying population fractions, calculate re-identification probability as 1/set size, and compute unicity before and after generalization.',
lecture:`
<p>Alex's research partner asks a direct question: "For any record in the de-identified dataset, what is the probability that we can identify the individual using only the published QI fields?" This requires computing the <button class="card-link" onclick="openCardModal('anonymity_set')">anonymity set</button> — the number of real people sharing those QI values in the external population.</p>

<h3>Conditional probability — filtering down to the right group</h3>
<p><button class="card-link" onclick="openCardModal('conditional_probability')">Conditional probability</button> P(A | B) means "probability of A, given that B is already known to be true." In privacy:</p>
<p><em>"Given that the person in this record is Female, born in 1972, and lives in ZIP prefix 980, how many real people share all of those characteristics?"</em></p>
<p>Each quasi-identifier field <em>filters</em> the population. Start with everyone in the geographic area, then apply each QI as a filter:</p>
<ul>
<li>Start: 420,000 people in the ZIP 980 area</li>
<li>Filter 1 (Female, ~52%): 420,000 × 0.52 = 218,400 females</li>
<li>Filter 2 (born in 1972, ~1 in 70 birth years): 218,400 ÷ 70 ≈ 3,120 females born in 1972</li>
<li>Anonymity set = <strong>3,120 people</strong></li>
<li>Re-ID probability = 1 ÷ 3,120 ≈ <strong>0.032%</strong> — very safe</li>
</ul>
<p>Now add a 4th QI (suppose the attacker also knows Priya's diagnosis: Bipolar Disorder, prevalence ~0.5% in this demographic):</p>
<ul>
<li>Filter 3: 3,120 × 0.005 = <strong>~16 people</strong></li>
<li>Re-ID probability = 1 ÷ 16 = <strong>6.25%</strong> — approaching the 9% threshold!</li>
</ul>
<p>This is the QI intersection collapse effect: each additional field multiplies risk. Four fields that each seem innocuous can combine explosively.</p>

<h3>Unicity — how singleton-heavy is the dataset?</h3>
<p><button class="card-link" onclick="openCardModal('unicity')">Unicity</button> measures, on average, how many records fall into each unique QI combination cell:</p>
<div class="demo-formula">u = N / (S₁ × S₂ × ... × Sₖ)</div>
<p>Where N = total records, and each Sᵢ = number of distinct values for QI field i.</p>
<ul>
<li><strong>u &gt;&gt; 1</strong> (say, u = 50): each QI cell contains many records on average → low unicity → good privacy</li>
<li><strong>u ≈ 1</strong>: each cell contains about one record on average → critical boundary</li>
<li><strong>u &lt;&lt; 1</strong> (say, u = 0.1): most cells contain zero records; occupied cells contain exactly one → nearly every record is a unique fingerprint → high unicity → dangerous</li>
</ul>
<p><strong>Why generalization helps:</strong> Reducing S₃ from 50 (distinct 5-digit ZIPs) to 8 (distinct 3-digit prefixes) reduces the total cell count by a factor of 50/8 = 6.25, multiplying unicity by the same factor.</p>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Unicity Before and After Generalization</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600"><strong>Scenario:</strong> A hospital has N=500 records with QI fields: Sex (2 values), Age Decade (8 values), 5-digit ZIP (50 distinct ZIPs in dataset).</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Before generalization — 5-digit ZIP:</strong><br>Total cells = S_Sex × S_Age × S_ZIP = 2 × 8 × 50 = 800 cells<br>Unicity u = N / cells = 500 / 800 = <strong>0.625</strong><br>Interpretation: u = 0.625 &lt; 1. More cells exist than records. Most occupied cells contain exactly one record — nearly every patient is uniquely identifiable by their QI combination.</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>After generalization — 3-digit ZIP prefix (50 → 8 distinct):</strong><br>New total cells = 2 × 8 × 8 = 128 cells<br>Unicity u = 500 / 128 = <strong>3.91</strong><br>Interpretation: u = 3.91 &gt; 1. Each occupied cell now contains about 4 records on average — much better privacy.</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>The improvement:</strong> Simply changing ZIP-5 to ZIP-3 boosted unicity by a factor of 6.25 (3.91 / 0.625 ≈ 6.25). No records were deleted. The dataset's size and richness are unchanged — only the QI precision changed.</div></div>
</div>
</details>

<div class="fill-exercise">
<div class="fill-ex-label">📝 Try It — Compute Unicity Before and After</div>
<div class="fill-ex-prompt">A dataset has N=600 records with 3 QI fields: Sex (2 values), 5-digit ZIP (60 distinct values), Age Group (6 values). After ZIP generalization, the 60 ZIPs reduce to 10 distinct 3-digit prefixes. Compute unicity before and after.</div>
<div class="fill-actions" style="margin-bottom:8px"><button class="pulse-link" onclick="toggleSolution('s7_hint')">💡 Hint</button></div>
<div id="s7_hint" class="fill-solution">Total cells = S₁ × S₂ × S₃. Before: 2 × 60 × 6. After: 2 × 10 × 6. Unicity = N ÷ total cells. Compare each to 1.0 to assess safety.</div>
<div class="fill-row">BEFORE: Total cells = 2 × 60 × 6 = <input class="fill-input" id="s7_f1" data-ans="720" placeholder="?"></div>
<div class="fill-row">Unicity BEFORE = 600 / <input class="fill-input" id="s7_f2" data-ans="720" placeholder="?"> = <input class="fill-input" id="s7_f3" data-ans="0.833" data-tol="0.02" placeholder="?"> → Safe (u≥1)? <input class="fill-input sm" id="s7_f4" data-ans="no" placeholder="?"></div>
<div class="fill-row">AFTER: Total cells = 2 × 10 × 6 = <input class="fill-input" id="s7_f5" data-ans="120" placeholder="?"></div>
<div class="fill-row">Unicity AFTER = 600 / <input class="fill-input" id="s7_f6" data-ans="120" placeholder="?"> = <input class="fill-input sm" id="s7_f7" data-ans="5.0" data-tol="0.1" placeholder="?"> → Safe (u≥1)? <input class="fill-input sm" id="s7_f8" data-ans="yes" placeholder="?"></div>
<div class="fill-actions">
<button class="btn" onclick="checkFill('s7_ex1',['s7_f1','s7_f2','s7_f3','s7_f4','s7_f5','s7_f6','s7_f7','s7_f8'])">Check</button>
<button class="btn ghost" onclick="revealFill(['s7_f1','s7_f2','s7_f3','s7_f4','s7_f5','s7_f6','s7_f7','s7_f8'])">Show answers</button>
<button class="pulse-link" onclick="toggleSolution('s7_sol')">Show solution</button>
</div>
<div class="fill-fb" id="s7_ex1_fb"></div>
<div id="s7_sol" class="fill-solution">
<strong>Before:</strong> 2 × 60 × 6 = 720 cells. u = 600/720 ≈ 0.833. Dangerous — u &lt; 1 means most occupied cells contain only one record.<br>
<strong>After ZIP generalization:</strong> 2 × 10 × 6 = 120 cells. u = 600/120 = 5.0. Safe — each cell contains about 5 records on average.<br>
<strong>Improvement factor:</strong> 5.0 / 0.833 = 6.0x improvement from one generalization step — matching the ratio of distinct ZIPs reduced: 60/10 = 6.
</div>
</div>
`,

{question:'A dataset has N=100 records, Sex (2 values), Age (10 values), ZIP-3 (5 values). Unicity u = 100 / (2×10×5) = ?',options:[{key:'A',text:'u = 0.1 (very high unicity — dangerous)'},{key:'B',text:'u = 1.0 (exactly at the critical threshold)'},{key:'C',text:'u = 1.0 (exactly one record per cell on average)'},{key:'D',text:'u = 100 (100 records per cell on average)'}],correctKey:'C',feedback:{correct:'u = 100 / (2 × 10 × 5) = 100 / 100 = 1.0. This is exactly at the critical boundary — on average, each cell contains one record. This means roughly half the occupied cells are singletons. This is an unsafe dataset — you need u significantly above 1 for comfort.',incorrect:'Total cells = 2 × 10 × 5 = 100. u = N / cells = 100 / 100 = 1.0. This is exactly the critical boundary — u = 1 means on average one record per occupied cell, which means many singleton records.'}},
{question:'When one QI field is generalized (reducing its distinct values from 50 to 5), what happens to unicity?',options:[{key:'A',text:'Unicity decreases by a factor of 10 (becomes 10× more dangerous)'},{key:'B',text:'Unicity increases by a factor of 10 (becomes 10× safer)'},{key:'C',text:'Unicity stays the same — it depends on N, not the fields'},{key:'D',text:'Unicity drops to zero'}],correctKey:'B',feedback:{correct:'Reducing one field from 50 to 5 distinct values reduces total cells by a factor of 50/5 = 10. Fewer cells means N records are packed into a smaller number of cells → more records per cell → higher u → safer. Unicity increases by exactly the same factor as the field reduction.',incorrect:'Generalization reduces the number of distinct values in a field, reducing total cells. Fewer cells with the same N records means more records per cell — unicity INCREASES (becomes safer). The improvement factor = (old distinct values) / (new distinct values).'}}
]},

// ─── SEGMENT 8: Bayesian Thinking ───
{id:8,icon:'🧠',title:'Bayesian Thinking — Updating Beliefs with Evidence',subtitle:'Prior, likelihood, false positives, and the posterior — built piece by piece',minutes:12,
cards:['prior_probability','likelihood','false_positive_rate','bayes_theorem'],
endGoal:'You can identify the prior, likelihood, and false positive rate in a clinical scenario, compute the Bayes denominator using the law of total probability, and calculate the posterior probability.',
lecture:`
<p>The hospital's ED physician has ordered a rapid sepsis test for a patient with fever. The test came back positive. She asks Alex: "Statistically, how likely is it that this patient actually has sepsis, given the positive result?" Alex recognizes this as a Bayesian question — updating a prior belief with new evidence.</p>
<p>This same mathematical structure appears in privacy: an attacker's certainty about a person's identity updates each time a new quasi-identifier field matches.</p>

<h3>Building Bayes from scratch — four components</h3>
<p>Before writing the formula, let's understand each piece:</p>

<h4>Component 1 — The Prior: P(H)</h4>
<p>The <button class="card-link" onclick="openCardModal('prior_probability')">prior</button> is your belief <em>before</em> seeing any evidence. It answers: "In general, how likely is this hypothesis?"</p>
<p><strong>Clinical example:</strong> Among patients who present to the ED with fever, roughly 20% turn out to have sepsis. So P(sepsis) = 0.20 — the prior.</p>
<p><strong>Privacy example:</strong> Among all records in a dataset, before observing any QI field, any specific person could be the subject of any record: P(it is Margaret) = 1/N.</p>

<h4>Component 2 — The Likelihood: P(E | H)</h4>
<p>The <button class="card-link" onclick="openCardModal('likelihood')">likelihood</button> answers: "If the hypothesis is true, how likely is it that we would see this evidence?" This is the test's <em>sensitivity</em>.</p>
<p><strong>Example:</strong> The rapid sepsis test correctly identifies 90% of true sepsis cases. P(positive test | patient has sepsis) = 0.90.</p>

<h4>Component 3 — The False Positive Rate: P(E | ¬H)</h4>
<p>The <button class="card-link" onclick="openCardModal('false_positive_rate')">false positive rate</button> answers: "If the hypothesis is FALSE, how often would we still see this evidence?" The ¬ symbol means "NOT."</p>
<p><strong>Example:</strong> The test returns positive for 10% of patients who do NOT have sepsis. P(positive test | no sepsis) = 0.10. This is 1 − specificity.</p>

<h4>Component 4 — The Complement: P(¬H)</h4>
<p>Simple arithmetic: if P(H) = 0.20, then P(NOT H) = 1 − 0.20 = 0.80. If 20% have sepsis, 80% do not.</p>

<h3>Assembling Bayes' Theorem</h3>
<p>Now we can put it together. <button class="card-link" onclick="openCardModal('bayes_theorem')">Bayes' Theorem</button>:</p>
<div class="demo-formula">P(H|E) = [P(E|H) × P(H)] / [P(E|H)×P(H) + P(E|¬H)×P(¬H)]</div>
<p>The denominator is called the <strong>Law of Total Probability</strong> — it computes the total probability of seeing a positive test result, regardless of the true disease state. It has two parts:</p>
<ul>
<li><strong>True positive contribution:</strong> P(E|H) × P(H) — positive tests from patients who truly have the disease</li>
<li><strong>False positive contribution:</strong> P(E|¬H) × P(¬H) — positive tests from patients who do NOT have the disease</li>
</ul>
<p>Adding these gives the total probability that any randomly selected patient would have a positive test. The posterior (P(H|E)) is the fraction of that total contributed by true cases.</p>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Sepsis Test (Step by Step)</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600">P(H)=0.20 (prior), P(E|H)=0.90 (sensitivity), P(E|¬H)=0.10 (false positive rate)</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Compute P(¬H):</strong> 1 − P(H) = 1 − 0.20 = <strong>0.80</strong></div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>Compute the numerator:</strong> P(E|H) × P(H) = 0.90 × 0.20 = <strong>0.18</strong><br>(This is the true positive contribution)</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>Compute the false alarm term:</strong> P(E|¬H) × P(¬H) = 0.10 × 0.80 = <strong>0.08</strong><br>(This is the false positive contribution)</div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>Compute the denominator:</strong> 0.18 + 0.08 = <strong>0.26</strong><br>(Total probability of a positive test from any patient)</div></div>
<div class="demo-step"><div class="demo-num">5</div><div class="demo-text"><strong>Compute the posterior:</strong> P(H|E) = 0.18 / 0.26 = <strong>0.692 ≈ 69.2%</strong></div></div>
<div class="demo-step"><div class="demo-num">6</div><div class="demo-text"><strong>Interpretation:</strong> Before the test, the physician estimated 20% probability of sepsis. After a positive result, that estimate rises to 69.2%. The test is informative but not definitive — a ~31% chance remains that the positive is a false alarm. Clinical confirmation (blood culture, additional markers) is warranted before committing to full sepsis treatment.</div></div>
</div>
</details>

{id:9,icon:'🔗',title:'Record Linkage and Privacy-Preserving Linkage',subtitle:'Fellegi-Sunter weights, Bloom filters, bigrams, and Dice similarity',minutes:11,
cards:['record_linkage','m_rate','u_rate','bloom_filter','bigram','dice_similarity'],
endGoal:'You can compute a Fellegi-Sunter field weight using log₂(m/u), explain why Bloom filters enable PPRL, and calculate Dice similarity between two name bigram sets.',
lecture:`
<p>Riverside Medical Center and Central Valley Health both have records for David Okafor — but neither system uses the same patient identifier. Alex needs to link David's records across the two systems for a care-coordination initiative. The challenge: both organizations have signed data use agreements prohibiting them from sharing patient names with the other institution. How do you link records without sharing the PII that would enable linking?</p>
<p>This is the <button class="card-link" onclick="openCardModal('record_linkage')">record linkage</button> problem, and it has two solutions: deterministic linkage (when a shared unique identifier exists) and probabilistic linkage (when it does not). In healthcare, shared IDs are rare — probabilistic linkage is the norm.</p>

<h3>Fellegi-Sunter: evidence-based linking</h3>
<p>The Fellegi-Sunter framework treats each field comparison as a piece of evidence: agreement on a rare field (like last name) is strong evidence for a true match; agreement on a common field (like sex) is weak evidence.</p>
<p>For each field i, two rates are estimated:</p>
<ul>
<li><strong><button class="card-link" onclick="openCardModal('m_rate')">m-rate (mᵢ)</button></strong> — probability that field i agrees when the two records ARE a true match. High m-rate = field is reliably consistent in true matches.</li>
<li><strong><button class="card-link" onclick="openCardModal('u_rate')">u-rate (uᵢ)</button></strong> — probability that field i agrees when the records are NOT a true match (pure coincidence). Low u-rate = field agreement is rare by chance = strong evidence.</li>
</ul>
<p>The weight for each field is:</p>
<div class="demo-formula">wᵢ = log₂(mᵢ / uᵢ)</div>
<p>The total linkage score is W = w₁ + w₂ + w₃ + ... (sum weights for every field that AGREES). Compare W to thresholds: above the upper threshold → definite match; below the lower → definite non-match; in between → human review.</p>

<h3>Interpreting log₂(m/u) intuitively</h3>
<p>The weight measures "how many bits of evidence does agreement on this field provide?"</p>
<ul>
<li><strong>Date of birth:</strong> m = 0.97, u = 0.003 → w = log₂(0.97/0.003) = log₂(323) ≈ <strong>8.3 bits</strong> — very strong evidence. Random non-matching records rarely share a DOB (3 in 1,000).</li>
<li><strong>Sex:</strong> m = 0.99, u = 0.50 → w = log₂(0.99/0.50) = log₂(1.98) ≈ <strong>0.98 bits</strong> — weak evidence. Half of random pairs share the same sex by chance.</li>
<li><strong>Last name:</strong> m = 0.95, u = 0.004 → w = log₂(0.95/0.004) = log₂(237.5) ≈ <strong>7.9 bits</strong> — very strong. Only 4 in 1,000 random pairs share a last name.</li>
</ul>
<p>A total score above ~15–20 bits is typically a confident match. Below 0 bits (m &lt; u — field disagrees more in true matches than by chance) indicates evidence AGAINST a match.</p>

<h3>Privacy-Preserving Record Linkage (PPRL) — linking without sharing PII</h3>
<p>Standard Fellegi-Sunter requires comparing the actual field values (names, DOBs) across the two systems. PPRL solves the case where neither system may share the raw values.</p>
<p>The solution uses <button class="card-link" onclick="openCardModal('bloom_filter')">Bloom filters</button>: a compact bit array that encodes whether specific elements are present, without revealing the elements themselves.</p>

<h4>Step 1 — Extract bigrams</h4>
<p>A <button class="card-link" onclick="openCardModal('bigram')">bigram</button> is a two-character pair extracted from a name. For "DAVID": add padding characters at start and end → "_DAVID_" → bigrams: {_D, DA, AV, VI, ID, D_}.</p>

<h4>Step 2 — Hash bigrams into a bit array</h4>
<p>Each bigram is passed through 2-3 hash functions, each of which returns a bit position in the array. That bit is set to 1. The result is a bit array with specific positions lit, representing the name without storing it.</p>

<h4>Step 3 — Compute Dice similarity</h4>
<p>Each organization computes Bloom filters for their version of the name. They exchange only the bit arrays. Similarity between the two arrays is measured by the <button class="card-link" onclick="openCardModal('dice_similarity')">Dice coefficient</button>:</p>
<div class="demo-formula">Dice = 2 × |shared bits| / (|bits in A| + |bits in B|)</div>
<p>Range: 0 (no overlap) to 1 (identical). Threshold ≥ 0.75 → probable match.</p>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Dice Similarity for "DAVID" vs "DAVID"</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600">Hospital A has "DAVID OKAFOR", Central Valley has "DAVID OKAFOR" (same spelling). We compute bigrams for the first name only, then check Dice similarity.</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Add padding and extract bigrams for "DAVID":</strong><br>Padded: _DAVID_ → bigrams: {_D, DA, AV, VI, ID, D_} → 6 bigrams total</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>Both systems encode identical names → identical bit arrays.</strong><br>Bits set in A: {_D, DA, AV, VI, ID, D_} = 6 positions<br>Bits set in B: {_D, DA, AV, VI, ID, D_} = 6 positions<br>Shared bits = 6 (all of them match)</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>Compute Dice:</strong><br>Dice = 2 × 6 / (6 + 6) = 12 / 12 = <strong>1.00</strong><br>Perfect match — as expected for identical names.</div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>Variation test — "DAVID" vs "DAVYD" (typo):</strong><br>DAVID: {_D, DA, AV, VI, ID, D_}<br>DAVYD: {_D, DA, AV, VY, YD, D_}<br>Shared: {_D, DA, AV, D_} = 4 bits<br>Dice = 2×4 / (6+6) = 8/12 ≈ <strong>0.667</strong> → human review zone (0.5–0.74)</div></div>
</div>
</details>

<div class="fill-exercise">

<div class="fill-row">Decision (≥0.75 match, 0.5–0.74 review, &lt;0.5 non-match): <input class="fill-input wide" id="s9_f8" data-ans="review" placeholder="?"></div>
<div class="fill-actions">
<button class="btn" onclick="checkFill('s9_ex1',['s9_f1','s9_f2','s9_f3','s9_f4','s9_f5','s9_f6','s9_f7','s9_f8'])">Check</button>
<button class="btn ghost" onclick="revealFill(['s9_f1','s9_f2','s9_f3','s9_f4','s9_f5','s9_f6','s9_f7','s9_f8'])">Show answers</button>
<button class="pulse-link" onclick="toggleSolution('s9_sol')">Show solution</button>
</div>
<div class="fill-fb" id="s9_ex1_fb"></div>
<div id="s9_sol" class="fill-solution">
<strong>PRIYA bigrams:</strong> _P, PR, RI, IY, YA, A_ → 6 total<br>
<strong>PREYA bigrams:</strong> _P, PR, RE, EY, YA, A_ → 6 total<br>
<strong>Shared bigrams:</strong> {_P, PR, YA, A_} → 4 shared. (RI, IY are in PRIYA but not PREYA; RE, EY are in PREYA but not PRIYA.)<br>

<strong>Decision: Human review zone</strong> (0.5 ≤ Dice &lt; 0.75). A reviewer would compare additional fields (DOB, ZIP) before deciding. In practice, if DOB and sex also match strongly, the record pair would be accepted as a match despite the name variation.
</div>
</div>

{id:10,icon:'🛡️',title:'Differential Privacy — Adding Protective Noise',subtitle:'Membership inference, the Laplace mechanism, epsilon, and sensitivity',minutes:11,
cards:['differential_privacy','membership_inference','sensitivity_delta','epsilon_budget','laplace_mechanism'],
endGoal:'You can compute the Laplace noise scale b = Δf/ε for a count query, explain what ε controls, and describe how differential privacy protects against membership inference attacks.',
lecture:`
<p>Alex has de-identified the Meridian Cohort and formed equivalence classes meeting k=2, l=2. Now his research partner makes one more request: "We need aggregate counts published on your hospital's data portal — number of patients with mental health diagnoses, by age group and ZIP prefix. Can you release those?"</p>
<p>Alex realizes this is a new kind of privacy problem. The aggregates themselves are not patient-level records — but they could still reveal whether a specific person is in the dataset. This is the <button class="card-link" onclick="openCardModal('membership_inference')">membership inference attack</button>.</p>

<h3>The problem: aggregate statistics still leak</h3>
<p>Suppose the hospital published "342 patients with mental health diagnoses" in March. In April, after adding one new patient (whose admission was publicly reported in a local newspaper), the count becomes 343. An adversary who knows both counts and knows who was admitted can infer that this specific patient has a mental health diagnosis — a serious HIPAA violation, even though only aggregate counts were published.</p>
<p><button class="card-link" onclick="openCardModal('differential_privacy')">Differential Privacy (DP)</button> is the solution. It adds precisely calibrated random noise to the published statistic before release, making it mathematically impossible to determine with confidence whether any specific individual's data was included.</p>

<h3>The formal guarantee</h3>
<p>DP guarantees that the probability of any specific output is nearly identical whether or not a specific person's data is included. The formal criterion:</p>
<div class="demo-formula">|P(output WITH person X) − P(output WITHOUT person X)| ≤ ε</div>
<p>The smaller the <button class="card-link" onclick="openCardModal('epsilon_budget')">epsilon (ε)</button>, the closer these two probabilities are — the stronger the privacy guarantee. ε = 0 would mean perfect indistinguishability (complete privacy but the output is pure noise). In practice, ε between 0.1 and 10 is used depending on the sensitivity of the data and acceptable utility loss.</p>

<h3>Sensitivity — how much can one person change the answer?</h3>
<p><button class="card-link" onclick="openCardModal('sensitivity_delta')">Sensitivity (Δf)</button> measures the maximum amount by which any single person's data can change the query result.</p>
<p><strong>For a count query</strong> ("How many patients have condition X?"): adding or removing one patient changes the count by at most 1. Therefore:</p>
<div class="demo-formula">Δf = 1 (for any count query, always)</div>
<p>This is independent of N. Whether the dataset has 50 patients or 500,000, adding one person to a count changes it by exactly ±1.</p>
<p><strong>For an average query</strong> (mean of a value): the sensitivity depends on the range of the value and N, making count queries preferred for DP releases.</p>

<h3>The Laplace mechanism — adding noise</h3>
<p>The <button class="card-link" onclick="openCardModal('laplace_mechanism')">Laplace mechanism</button> releases:</p>
<div class="demo-formula">Published value = true_count + Laplace(0, b) &nbsp; where b = Δf / ε</div>
<p>Laplace(0, b) is random noise drawn from a Laplace distribution centered at 0 with scale parameter b. The noise can be positive or negative. On average, the noise has magnitude ≈ b.</p>

<h4>The ε–b relationship: smaller ε → larger b → more noise → stronger privacy</h4>
<ul>
<li>ε = 10 → b = 1/10 = 0.1 → tiny noise (~±0.1) → near-useless privacy, very accurate count</li>
<li>ε = 1 → b = 1/1 = 1.0 → moderate noise (~±1) → reasonable trade-off</li>
<li>ε = 0.5 → b = 1/0.5 = 2.0 → noticeable noise (~±2) → stronger privacy</li>
<li>ε = 0.1 → b = 1/0.1 = 10.0 → large noise (~±10) → very strong privacy, reduced accuracy</li>
</ul>

<div class="callout">🔑 <strong>Why it works:</strong> An attacker seeing a published count of "343 ± noise" cannot determine whether the true count is 342 (person X not included) or 343 (person X included) because the noise makes both equally plausible. The stronger the privacy (smaller ε), the larger the noise, and the larger the uncertainty gap the attacker faces.</div>

<h3>Post-processing: cleaning up the noisy result</h3>
<p>The raw Laplace noise may produce nonsensical results: a negative count, or a non-integer. Standard practice:</p>
<ul>
<li>Clamp to ≥ 0: if the published value is negative, replace with 0</li>
<li>Round to nearest integer if the count should be a whole number</li>
<li>These post-processing steps do NOT weaken the DP guarantee — they only improve interpretability</li>
</ul>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Releasing a Mental Health Count with DP</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600"><strong>Scenario:</strong> True count of mental health patients = 342. Alex's DUA specifies ε = 0.5 for this release. Δf = 1 (count query).</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Compute noise scale b:</strong><br>b = Δf / ε = 1 / 0.5 = <strong>2.0</strong><br>The Laplace distribution from which noise is drawn has scale 2.0.</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>Sample noise from Laplace(0, 2.0):</strong><br>In this example, the random draw produces noise = +3. (In a real release, this is sampled from the distribution — different each time.)</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>Compute published value:</strong><br>Published count = 342 + 3 = <strong>345</strong></div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>What the attacker sees:</strong> "345 patients." They suspect the true count might be 342 (someone they are tracking is in the dataset) or 343 (a different scenario). But the noise range makes values from ~336 to ~354 all plausible. They cannot tell whether the true count is 342 or 343 — membership inference fails.</div></div>
<div class="demo-step"><div class="demo-num">5</div><div class="demo-text"><strong>Accuracy trade-off:</strong> The true count is 342; the published count is 345 — an error of 3 (about 0.9%). At ε = 0.5 and b = 2.0, expected absolute error ≈ 2 counts. For a large aggregate like mental health prevalence across thousands of patients, ±2 is acceptable. For a count of 5 patients in a very small subgroup, ±2 would be a 40% error — a much more significant trade-off.</div></div>
</div>
</details>

<div class="fill-exercise">
<div class="fill-ex-label">📝 Try It — Computing Noise Scale for Two ε Values</div>
<div class="fill-ex-prompt">Alex's team needs to release two aggregate statistics. Release A uses ε = 1.0 for a less sensitive count. Release B uses ε = 0.2 for a more sensitive statistic. Both are count queries (Δf = 1). Compute the noise scale b for each and explain the privacy/utility trade-off.</div>
<div class="fill-actions" style="margin-bottom:8px"><button class="pulse-link" onclick="toggleSolution('s10_hint')">💡 Hint</button></div>

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const STATE_KEY = 'privacyPrimer_v1';
let state = {};

function defaultState(){
  return {currentSegment:1,completed:[],pulseAnswers:{},pulseRevealed:[],pulseRetries:{},lastVisited:Date.now(),welcomeBackShown:false};
}
function loadState(){
  try{
    const raw = localStorage.getItem(STATE_KEY);
    if(raw){ const s = JSON.parse(raw); return Object.assign(defaultState(), s); }
  }catch(e){}
  return defaultState();
}
function saveState(){
  state.lastVisited = Date.now();
  try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }catch(e){}
}
function resetProgress(){
  if(!confirm('Reset all progress? Your segment completion, pulse check answers, and fill-in history will be cleared.')) return;
  localStorage.removeItem(STATE_KEY);
  state = defaultState();
  fullRender();
  scrollToTop();
}
function isSegmentUnlocked(id){ return id === 1 || state.completed.includes(id-1) || state.completed.includes(id); }
function isSegmentComplete(id){ return state.completed.includes(id); }
function totalRemainingMinutes(){ return SEGMENTS.filter(s => !state.completed.includes(s.id)).reduce((sum,s) => sum + s.minutes, 0); }
function formatRelativeTime(ts){
  const ms = Date.now() - ts;
  const h = Math.floor(ms/3600000);
  const d = Math.floor(h/24);
  if(d >= 2) return d + ' days ago';
  if(d === 1) return 'yesterday';
  if(h >= 2) return h + ' hours ago';
  if(h === 1) return '1 hour ago';
  return 'recently';
}

// ═══════════════════════════════════════════════════
//  FILL-IN ENGINE
// ═══════════════════════════════════════════════════
function checkFill(exId, ids){
  let allOk = true;
  ids.forEach(function(id){
    const el = document.getElementById(id);
    if(!el) return;
    const ans = (el.dataset.ans || '').toLowerCase().trim();
    const tol = parseFloat(el.dataset.tol || '0');
    const val = el.value.trim().toLowerCase();
    let ok;
    if(tol > 0){
      const num = parseFloat(val);
      ok = !isNaN(num) && Math.abs(num - parseFloat(ans)) <= tol;
    } else {
      const numAns = parseFloat(ans), numVal = parseFloat(val);
      ok = val === ans || (!isNaN(numAns) && !isNaN(numVal) && Math.abs(numVal - numAns) < 0.0001);
    }
    el.classList.toggle('ok', ok);
    el.classList.toggle('no', !ok);
    if(!ok) allOk = false;
  });
  const fb = document.getElementById(exId + '_fb');
  if(fb){
    fb.className = 'fill-fb ' + (allOk ? 'ok' : 'no');
    fb.textContent = allOk ? '✓ Correct! Well done.' : '✗ One or more answers need review — try again or click Show answers.';
  }
}
function revealFill(ids){
  ids.forEach(function(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.value = el.dataset.ans || '';
    el.classList.remove('no');
    el.classList.add('ok');
  });
}
function toggleSolution(id){
  const el = document.getElementById(id);
  if(el){ el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none'; }
}

// ═══════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function renderProgressBar(){
  const bar = document.getElementById('progressBar');
  let html = '';
  SEGMENTS.forEach(function(seg){
    const unlocked = isSegmentUnlocked(seg.id);
    const done = isSegmentComplete(seg.id);
    const active = state.currentSegment === seg.id;
    let cls = 'seg-pill';
    if(active) cls += ' active';
    else if(done) cls += ' done';
    else if(!unlocked) cls += ' locked';
    const onclick = unlocked ? ('goToSegment('+seg.id+')') : '';
    html += '<button class="'+cls+'" '+(onclick?'onclick="'+onclick+'"':'disabled')+' title="'+esc(seg.title)+'">'
      + '<span class="seg-num">'+seg.id+'</span>'
      + '<span class="seg-icon">'+seg.icon+'</span>'
      + '</button>';
  });
  const rem = totalRemainingMinutes();
  if(rem > 0) html += '<span class="time-remaining">~'+rem+' min remaining</span>';
  bar.innerHTML = html;
}

function renderHero(){
  const hero = document.getElementById('heroSection');
  if(state.currentSegment === 1 && state.completed.length === 0){
    hero.innerHTML = '<section class="hero">'
      + '<div class="hero-sub">Before you begin &middot; Foundation</div>'
      + '<h1>Healthcare Privacy Primer</h1>'
      + '<p>This primer is your starting point before the Healthcare Privacy &amp; De-Identification Tutorial. Over 10 segments — about 100 minutes total — we build every mathematical and conceptual tool you need, from basic probability to differential privacy noise calculations.</p>'
      + '<p>You will follow <strong>Alex Chen</strong>, a data analyst at Riverside Medical Center, as he prepares the Meridian Cohort dataset for external research. Every privacy technique is introduced through Alex\'s real challenges: classifying fields, forming equivalence classes, computing risk metrics, and deciding how much noise to add to an aggregate statistic.</p>'
      + '<p>No prior statistics course is assumed — only basic arithmetic and a willingness to work through the formulas step by step. Each station introduces concepts at a comfortable pace and ends with a worked example and a practice problem before moving on.</p>'
      + '<div class="hero-cta"><button class="btn" onclick="goToSegment(1);scrollToTop();">Start Segment 1 &#8594;</button></div>'
      + '</section>';
  } else {
    hero.innerHTML = '';
  }
}

function renderActionBar(){
  const bar = document.getElementById('actionBar');
  bar.innerHTML = '<div class="action-bar">'
    + '<div class="left-actions">'
    + '<button class="btn ghost" onclick="openCardLibrary()">&#128218; Card library</button>'
    + '<button class="btn ghost" onclick="replaySegment('+state.currentSegment+')">&#8635; Replay segment</button>'
    + '</div>'
    + '<div class="right-actions">'
    + '<button class="btn ghost" onclick="goToPrevSegment()" '+(state.currentSegment===1?'disabled':'')+'>&#8592; Previous</button>'
    + '</div>'
    + '</div>';
}

function renderPulseCheckHTML(segId, idx, pc){
  const key = 's'+segId+'_p'+idx;
  const userAnswer = state.pulseAnswers[key];
  const wasRevealed = state.pulseRevealed.includes(key);
  const answered = userAnswer !== undefined;
  const isCorrect = userAnswer === pc.correctKey;
  let optionsHTML = '';
  pc.options.forEach(function(opt){
    let cls = 'pulse-option';
    let clickAttr = 'onclick="handlePulseAnswer('+segId+','+idx+',\''+opt.key+'\')"';
    if(answered || wasRevealed){
      cls += ' disabled'; clickAttr = '';
      if(opt.key === pc.correctKey) cls += ' correct';
      else if(opt.key === userAnswer && !isCorrect) cls += ' wrong';
    }
    optionsHTML += '<button class="'+cls+'" '+clickAttr+'><span class="pulse-key">'+opt.key+'</span><span>'+opt.text+'</span></button>';
  });
  let feedbackHTML = '';
  if(answered || wasRevealed){
    let fbCls = 'pulse-feedback visible';
    let fbContent = '';
    if(wasRevealed && !answered){ fbCls += ' revealed'; fbContent = '<strong>Answer revealed:</strong> '+pc.feedback.incorrect; }
    else if(isCorrect){ fbCls += ' correct'; fbContent = '<strong>&#10003; Correct.</strong> '+pc.feedback.correct; }
    else { fbCls += ' incorrect'; fbContent = '<strong>Not quite.</strong> '+pc.feedback.incorrect; }
    feedbackHTML = '<div class="'+fbCls+'">'+fbContent+'</div>';
  }
  let actionsHTML = (!answered && !wasRevealed)
    ? '<div class="pulse-actions"><button class="pulse-link" onclick="revealPulseAnswer('+segId+','+idx+')">Reveal answer</button></div>'
    : '<div class="pulse-actions"><button class="pulse-link" onclick="retryPulseCheck('+segId+','+idx+')">&#8635; Try again</button></div>';
  return '<div class="pulse-check">'
    + '<div class="pulse-header"><span class="pulse-icon">&#128173;</span><span class="pulse-label">Pulse check</span></div>'
    + '<div class="pulse-question">'+pc.question+'</div>'
    + '<div class="pulse-options">'+optionsHTML+'</div>'
    + feedbackHTML + actionsHTML
    + '</div>';
}

function renderSegment(id){
  const seg = SEGMENTS.find(function(s){ return s.id === id; });
  if(!seg) return;
  const container = document.getElementById('segmentContainer');
  const done = isSegmentComplete(seg.id);
  const isLast = seg.id === SEGMENTS.length;
  let html = '<section class="segment">'
    + '<div class="segment-header">'
    + '<div class="segment-meta"><span class="seg-step">Segment '+seg.id+' of '+SEGMENTS.length+'</span><span>~'+seg.minutes+' min</span>'
    + (done ? '<span style="color:var(--green);font-weight:700">&#10003; Completed</span>' : '')
    + '</div>'
    + '<div class="segment-title"><span style="font-size:28px">'+seg.icon+'</span>'+esc(seg.title)+'</div>'
    + '<div class="segment-subtitle">'+esc(seg.subtitle)+'</div>'
    + '<div class="end-goal"><div class="end-goal-label">End goal</div><div class="end-goal-text">'+esc(seg.endGoal)+'</div></div>'
    + '</div>'
    + '<div class="lecture">'+seg.lecture+'</div>';
  seg.pulseChecks.forEach(function(pc, idx){ html += renderPulseCheckHTML(seg.id, idx, pc); });
  html += '<div class="seg-nav">'
    + '<div>'+(seg.id > 1 ? '<button class="btn ghost" onclick="goToPrevSegment()">&#8592; Previous segment</button>' : '')+'</div>'
    + '<div>'+(
        !isLast
        ? '<button class="btn" onclick="markCompleteAndContinue('+seg.id+')">'+(done ? 'Continue to' : 'Mark complete &amp; continue to')+' segment '+(seg.id+1)+' &#8594;</button>'
        : '<button class="btn" onclick="markCompleteAndContinue('+seg.id+')">'+(done ? 'Finish primer &#8594;' : 'Mark complete &amp; finish primer &#8594;')+'</button>'
      )+'</div>'
    + '</div></section>';
  container.innerHTML = html;
}

function renderCardsSidebar(){
  const sidebar = document.getElementById('cardsSidebar');
  const seg = SEGMENTS.find(function(s){ return s.id === state.currentSegment; });
  if(!seg || !seg.cards || seg.cards.length === 0){ sidebar.innerHTML = ''; return; }
  let html = '<div class="cards-panel"><h3>Cards &middot; Segment '+seg.id+'</h3><div class="cards-sub">Tap any term for a full definition and deep explanation.</div>';
  seg.cards.forEach(function(cid){
    const card = CARDS[cid];
    if(!card) return;
    html += '<div class="card-item" onclick="openCardModal(\''+cid+'\')">'
      + '<span class="card-item-term">'+esc(card.term)+'</span>'
      + '<span class="card-item-expand">&#8250;</span>'
      + '</div>';
  });
  html += '</div>';
  sidebar.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════════════
function openCardModal(cardId){
  const card = CARDS[cardId];
  if(!card) return;
  document.getElementById('modalTitle').textContent = card.term;
  let html = '<div class="card-modal-term">'+esc(card.term)+'</div>';
  html += '<div class="card-modal-def">'+esc(card.def)+'</div>';
  if(card.long) html += '<div class="card-modal-long">'+esc(card.long)+'</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function openCardLibrary(){
  const visibleIds = new Set([state.currentSegment].concat(state.completed));
  const visibleSegs = SEGMENTS.filter(function(s){ return visibleIds.has(s.id); }).sort(function(a,b){ return a.id-b.id; });
  document.getElementById('modalTitle').textContent = '&#128218; Card library';
  let html = '<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;font-weight:600">Definitions from segments you have visited. More cards unlock as you progress.</div>'
    + '<div class="modal-search"><input type="text" id="cardSearch" placeholder="Search terms..." oninput="filterCards()"></div>'
    + '<div id="cardLibBody">';
  let total = 0;
  visibleSegs.forEach(function(seg){
    if(!seg.cards || seg.cards.length === 0) return;
    html += '<div class="lib-segment-group" data-seg="'+seg.id+'"><div class="lib-segment-header">'+seg.icon+' Segment '+seg.id+': '+esc(seg.title)+'</div>';
    seg.cards.forEach(function(cid){
      const card = CARDS[cid];
      if(!card) return;
      total++;
      html += '<div class="lib-card" data-term="'+esc(card.term.toLowerCase())+'" data-def="'+esc(card.def.toLowerCase())+'">'
        + '<div class="lib-card-term">'+esc(card.term)+'</div>'
        + '<div class="lib-card-def">'+esc(card.def)+'</div>'
        + '</div>';
    });
    html += '</div>';
  });
  if(total === 0) html += '<div style="text-align:center;color:var(--text-dim);padding:30px 0;font-size:13px">Complete Segment 1 to start building your card library.</div>';
  html += '</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function filterCards(){
  const q = (document.getElementById('cardSearch').value || '').toLowerCase().trim();
  document.querySelectorAll('.lib-card').forEach(function(card){
    const match = !q || (card.dataset.term||'').includes(q) || (card.dataset.def||'').includes(q);
    card.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.lib-segment-group').forEach(function(group){
    const vis = group.querySelectorAll('.lib-card:not([style*="display: none"])').length;
    group.style.display = vis > 0 ? '' : 'none';
  });
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

// ═══════════════════════════════════════════════════
//  PULSE CHECK HANDLERS
// ═══════════════════════════════════════════════════
function handlePulseAnswer(segId, idx, key){
  const k = 's'+segId+'_p'+idx;
  state.pulseAnswers[k] = key;
  saveState(); renderSegment(segId);
}
function revealPulseAnswer(segId, idx){
  const k = 's'+segId+'_p'+idx;
  if(!state.pulseRevealed.includes(k)) state.pulseRevealed.push(k);
  saveState(); renderSegment(segId);
}
function retryPulseCheck(segId, idx){
  const k = 's'+segId+'_p'+idx;
  delete state.pulseAnswers[k];
  state.pulseRevealed = state.pulseRevealed.filter(function(x){ return x !== k; });
  state.pulseRetries[k] = (state.pulseRetries[k] || 0) + 1;
  saveState(); renderSegment(segId);
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function markCompleteAndContinue(segId){
  if(!state.completed.includes(segId)) state.completed.push(segId);
  saveState();
  if(segId < SEGMENTS.length){
    state.currentSegment = segId + 1;
    saveState(); fullRender(); scrollToTop();
  } else {
    fullRender();
  }
}
function goToSegment(id){
  if(!isSegmentUnlocked(id)) return;
  state.currentSegment = id;
  saveState(); fullRender(); scrollToTop();
}
function goToPrevSegment(){ if(state.currentSegment > 1) goToSegment(state.currentSegment - 1); }
function replaySegment(segId){
  if(!confirm('Replay this segment? Pulse check answers for this segment will be reset. Overall progress is preserved.')) return;
  Object.keys(state.pulseAnswers).forEach(function(k){ if(k.startsWith('s'+segId+'_p')) delete state.pulseAnswers[k]; });
  state.pulseRevealed = state.pulseRevealed.filter(function(k){ return !k.startsWith('s'+segId+'_p'); });
  saveState(); renderSegment(segId); scrollToTop();
}

// ═══════════════════════════════════════════════════
//  WELCOME-BACK BANNER
// ═══════════════════════════════════════════════════
function maybeShowWelcomeBack(){
  const hoursAway = (Date.now() - state.lastVisited) / 3600000;
  if(hoursAway > 4 && state.completed.length > 0 && !state.welcomeBackShown){
    const seg = SEGMENTS.find(function(s){ return s.id === state.currentSegment; });
    const banner = document.getElementById('welcomeBackBanner');
    banner.style.display = 'block';
    banner.innerHTML = '<div class="welcome-back">'
      + '<div class="welcome-back-text">Welcome back. You were on <strong>Segment '+seg.id+': '+esc(seg.title)+'</strong> '+formatRelativeTime(state.lastVisited)+'.</div>'
      + '<button class="btn" onclick="dismissWelcomeBack()">Continue &#8594;</button>'
      + '</div>';
    state.welcomeBackShown = true; saveState();
  }
}
function dismissWelcomeBack(){ document.getElementById('welcomeBackBanner').style.display = 'none'; scrollToTop(); }

// ═══════════════════════════════════════════════════
//  FULL RENDER + INIT
// ═══════════════════════════════════════════════════
function fullRender(){
  renderProgressBar();
  renderHero();
  renderActionBar();
  renderSegment(state.currentSegment);
  renderCardsSidebar();
  const btn = document.getElementById('beginTutBtn');
  const allDone = state.completed.length >= SEGMENTS.length;
  btn.disabled = !allDone;
  btn.style.opacity = allDone ? '1' : '.38';
  btn.style.cursor = allDone ? 'pointer' : 'not-allowed';
}
function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

function init(){
  state = loadState();
  if(Date.now() - state.lastVisited > 1800000) state.welcomeBackShown = false;
  fullRender();
  maybeShowWelcomeBack();
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>

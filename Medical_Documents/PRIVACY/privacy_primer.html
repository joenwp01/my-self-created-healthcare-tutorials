<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Healthcare Privacy Primer — Before You Begin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#7a9ab5;--header-bg:#1e4670;
  --surface:#d3dde8;--surface-raised:#c8d3e0;--surface-inset:#a8b4c2;
  --border:#8693a3;--border-accent:#5d6e85;--border-focus:#1a4a7a;
  --text:#111111;--text-muted:#1a2a3a;--text-dim:#3a4a5a;
  --accent:#7a5418;--accent-glow:rgba(184,134,42,.12);--accent-dim:#5d3f10;--accent-badge:#b8862a;
  --green:#1f6843;--green-bg:rgba(31,104,67,.12);
  --red:#9c382d;--red-bg:rgba(156,56,45,.10);
  --orange:#8e4d10;--orange-bg:rgba(142,77,16,.10);
  --blue:#1a4a7a;--blue-bg:rgba(26,74,122,.10);
  --purple:#553a80;--purple-bg:rgba(85,58,128,.10);
  --radius:8px;--radius-lg:12px;
  --mono:'JetBrains Mono',monospace;--serif:'Crimson Pro',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.7;min-height:100vh}
.header{background:var(--header-bg);border-bottom:2px solid var(--accent-badge);padding:18px 28px 0;color:#f0f4fa}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-bottom:14px}
.header-brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.header-brand h1{font-family:var(--serif);font-size:24px;font-weight:700;color:#f4c97c;letter-spacing:.3px}
.header-brand .pipe-motif{font-family:var(--mono);color:#a8b8c8;font-size:11px;opacity:.75}
.header-brand .subtitle{font-size:13px;color:#cfd8e3;font-weight:400;margin-left:4px}
.header-credit{font-size:11px;color:#a8b8c8;font-family:var(--mono)}
.welcome-back{background:rgba(184,134,42,.18);border:1px solid var(--accent-badge);padding:10px 18px;margin-bottom:14px;border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.welcome-back-text{color:#f0f4fa;font-size:13px}.welcome-back-text strong{color:#f4c97c}
.progress-bar{position:sticky;top:0;z-index:90;background:rgba(105,125,148,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;white-space:nowrap;display:flex;gap:5px;align-items:center;scrollbar-width:thin}
.seg-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:18px;font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;background:#73798a;color:#000;border:1px solid #525861;transition:all .15s;flex-shrink:0}
.seg-pill .seg-num{font-size:10px;color:#000;font-weight:700}.seg-pill .seg-icon{font-size:13px}
.seg-pill:hover{background:#8a92a0;color:#000}.seg-pill.done{background:#5cae6a;color:#000;border-color:#3d9555}
.seg-pill.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.seg-pill.done.active{background:#4a90c2;color:#000;border-color:#3a7aa6}
.seg-pill.locked{background:#5d6470;color:#3a3a3a;border-color:#4a5058;cursor:not-allowed;opacity:.5}
.time-remaining{margin-left:auto;font-family:var(--mono);font-size:10px;color:#0d2640;padding:4px 10px;background:rgba(255,255,255,.15);border-radius:10px;flex-shrink:0}
main{max-width:1160px;margin:0 auto;padding:22px 24px;display:grid;grid-template-columns:1fr 270px;gap:24px}
@media(max-width:900px){main{grid-template-columns:1fr;padding:14px}}
.content-col{min-width:0}.sidebar-col{position:relative}
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:30px 28px;margin-bottom:22px}
.hero h1{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--text);margin-bottom:8px}
.hero .hero-sub{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.hero p{color:var(--text-muted);margin-bottom:12px;font-size:15px;line-height:1.75;font-weight:600}
.hero-cta{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.action-bar .left-actions,.action-bar .right-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:12px;font-weight:700;padding:8px 18px;border-radius:var(--radius);border:1px solid var(--accent-badge);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;background:var(--accent-badge);color:#000}
.btn:hover{background:#cc9633;border-color:#cc9633}.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--text-muted);border-color:var(--border-accent)}
.btn.ghost:hover{background:var(--surface-inset);color:var(--text)}
.segment{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px 30px;margin-bottom:22px}
@media(max-width:900px){.segment{padding:18px 16px}}
.segment-header{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.segment-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap}
.segment-meta .seg-step{color:var(--accent-dim);font-weight:700}
.segment-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:12px}
.segment-subtitle{color:var(--text-muted);font-size:14px;margin-bottom:12px;font-weight:600}
.end-goal{background:var(--accent-glow);border-left:3px solid var(--accent-badge);padding:11px 16px;margin-top:12px;border-radius:0 var(--radius) var(--radius) 0}
.end-goal-label{font-family:var(--mono);font-size:10px;color:var(--accent-dim);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.end-goal-text{color:var(--text);font-size:14px;font-style:italic;font-weight:600}
.lecture{font-size:15px;color:var(--text);line-height:1.8}
.lecture h3{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);margin:22px 0 10px}
.lecture h4{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--accent-dim);margin:16px 0 7px;letter-spacing:.2px}
.lecture p{margin-bottom:13px;color:var(--text-muted);font-weight:600}
.lecture p strong{color:var(--text)}
.lecture ul,.lecture ol{margin:10px 0 13px 22px;color:var(--text-muted)}
.lecture li{margin-bottom:7px;font-weight:600}
.lecture code{font-family:var(--mono);font-size:12.5px;background:var(--surface-inset);color:#1a4a7a;padding:2px 6px;border-radius:4px;border:1px solid var(--border);font-weight:600}
.callout{background:#dde5ee;border:1px solid #aab5c5;border-radius:var(--radius);padding:13px 18px;margin:14px 0;font-size:14px;color:#0a1828;font-weight:600}
.callout strong{color:#0a1828}
.card-link{color:var(--accent);cursor:pointer;border-bottom:1px dotted var(--accent);font-weight:700;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;font-size:inherit;padding:0;display:inline}
.card-link:hover{color:var(--accent-dim);border-bottom-style:solid}
.ba-block{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;margin:16px 0;align-items:stretch}
@media(max-width:640px){.ba-block{grid-template-columns:1fr;gap:8px}}
.ba-panel{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;flex-direction:column}
.ba-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:7px}
.ba-before .ba-label{color:var(--red)}.ba-after .ba-label{color:var(--green)}
.ba-content{font-size:13px;color:var(--text-muted);line-height:1.7;flex:1;font-weight:600}
.ba-arrow{display:flex;align-items:center;justify-content:center;color:var(--accent-badge);font-size:22px;font-weight:700}
@media(max-width:640px){.ba-arrow{transform:rotate(90deg);padding:4px 0}}
.pulse-check{background:#dde5ee;border:1px solid #aab5c5;border-radius:var(--radius-lg);padding:16px 20px;margin:20px 0;color:#0a1828}
.pulse-header{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.pulse-icon{font-size:17px}
.pulse-label{font-family:var(--mono);font-size:11px;color:#0a1828;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.pulse-question{font-size:15px;color:#0a1828;margin-bottom:13px;line-height:1.6;font-weight:600}
.pulse-question code{font-family:var(--mono);font-size:12.5px;background:#fff;color:#7a5418;padding:2px 5px;border-radius:3px;border:1px solid #aab5c5;font-weight:700}
.pulse-options{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.pulse-option{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;color:#0a1828;font-size:13.5px;line-height:1.5;text-align:left;width:100%;font-family:var(--sans);font-weight:600}
.pulse-option:hover{background:var(--surface);border-color:var(--border-accent)}
.pulse-option.correct{background:rgba(31,104,67,.18);border-color:var(--green)}
.pulse-option.wrong{background:rgba(156,56,45,.15);border-color:var(--red)}
.pulse-option.disabled{cursor:not-allowed;opacity:.6}
.pulse-option.disabled.correct,.pulse-option.disabled.wrong{opacity:1}
.pulse-key{font-family:var(--mono);font-weight:700;font-size:12px;color:#0a1828;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;flex-shrink:0;background:var(--surface)}
.pulse-feedback{padding:11px 13px;border-radius:var(--radius);font-size:13.5px;line-height:1.6;margin-top:9px;color:#0a1828;display:none;font-weight:600}
.pulse-feedback.visible{display:block}.pulse-feedback.correct{background:rgba(31,104,67,.15);border:1px solid var(--green)}
.pulse-feedback.incorrect{background:rgba(156,56,45,.12);border:1px solid var(--red)}
.pulse-feedback.revealed{background:rgba(26,74,122,.12);border:1px solid var(--blue)}
.pulse-feedback strong{color:#0a1828}
.pulse-actions{display:flex;gap:10px;margin-top:9px;flex-wrap:wrap}
.pulse-link{font-family:var(--mono);font-size:11px;color:var(--accent-dim);font-weight:700;background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 0}
.pulse-link:hover{color:var(--accent)}
.fill-exercise{background:#dde5ee;border:1px solid #aab5c5;border-left:4px solid var(--blue);border-radius:var(--radius);padding:16px 20px;margin:18px 0}
.fill-ex-label{font-family:var(--mono);font-size:10px;color:var(--blue);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.fill-ex-prompt{font-size:14.5px;color:#0a1828;margin-bottom:12px;line-height:1.7;font-weight:600}
.fill-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:10px 0;font-size:14.5px;color:#0a1828;font-weight:700;line-height:2.4}
.fill-input{background:#fff;border:1px solid var(--border-accent);border-bottom:2px solid var(--blue);border-radius:4px 4px 0 0;font-family:var(--mono);font-size:13.5px;padding:4px 8px;text-align:center;width:80px;color:#111;transition:border-color .2s;font-weight:600}
.fill-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,74,122,.18)}
.fill-input.ok{border-color:var(--green);border-bottom-color:var(--green);background:rgba(31,104,67,.10)}
.fill-input.no{border-color:var(--red);border-bottom-color:var(--red);background:rgba(156,56,45,.08)}
.fill-input.wide{width:110px}.fill-input.sm{width:58px}
.fill-fb{font-size:13.5px;margin-top:8px;min-height:20px;font-weight:700;padding:2px 0}
.fill-fb.ok{color:var(--green)}.fill-fb.no{color:var(--red)}
.fill-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.fill-solution{background:rgba(26,74,122,.08);border:1px solid rgba(26,74,122,.2);border-radius:var(--radius);padding:11px 15px;margin-top:8px;font-size:13.5px;color:#0a1828;line-height:1.8;font-weight:600;display:none}
.demo-block{background:var(--surface-raised);border:1px solid var(--border-accent);border-left:4px solid var(--blue);border-radius:var(--radius);margin:16px 0;overflow:hidden}
.demo-summary{padding:12px 16px;cursor:pointer;font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);font-weight:700;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
.demo-summary::-webkit-details-marker{display:none}
details[open] .demo-summary{border-bottom:1px solid var(--border)}
.demo-body{padding:16px}
.demo-step{display:flex;gap:10px;margin:10px 0;align-items:flex-start}
.demo-num{background:var(--blue);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.demo-text{font-size:14px;color:var(--text-muted);line-height:1.75;font-weight:600}
.demo-formula{font-family:var(--mono);font-size:12.5px;background:var(--surface-inset);padding:8px 12px;border-radius:4px;margin:6px 0;color:#0a1828;border-left:3px solid var(--blue);font-weight:700;line-height:1.9}
.greek-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
.greek-table th{padding:7px 12px;background:#1e4670;color:#f4c97c;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border-accent);text-align:left}
.greek-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-muted)}
.greek-table td:first-child{font-family:var(--mono);font-size:18px;color:var(--blue);font-weight:700;width:50px}
.greek-table td:nth-child(2){font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700}
.greek-table tr:last-child td{border-bottom:none}
.cards-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:sticky;top:78px}
.cards-panel h3{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.cards-panel .cards-sub{font-size:11.5px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;font-weight:600}
.card-item{padding:8px 11px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:600}
.card-item:hover{background:var(--surface-inset);border-color:var(--border-accent)}
.card-item-expand{font-size:10px;color:var(--text-dim);font-family:var(--mono)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:660px;width:100%;max-height:84vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#1e4670;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal-title{font-family:var(--serif);font-size:19px;font-weight:700;color:#f4c97c}
.modal-close{background:none;border:1px solid rgba(255,255,255,.3);color:#e0e8f0;font-size:18px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,.15)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-body .card-modal-term{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.modal-body .card-modal-def{font-size:14.5px;color:var(--text);line-height:1.7;margin-bottom:11px;font-weight:600}
.modal-body .card-modal-long{font-size:13.5px;color:var(--text-muted);line-height:1.75;padding-top:11px;border-top:1px solid var(--border);font-weight:600}
.modal-search{margin-bottom:12px}
.modal-search input{width:100%;padding:7px 11px;font-family:var(--sans);font-size:14px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-weight:600}
.modal-search input:focus{outline:none;border-color:var(--border-focus)}
.lib-segment-header{font-family:var(--mono);font-size:11px;color:var(--accent-dim);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.lib-card{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px}
.lib-card-term{font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px}
.lib-card-def{font-size:13px;color:var(--text-muted);line-height:1.6;font-weight:600}
.seg-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.footer{padding:28px;text-align:center;border-top:1px solid rgba(255,255,255,.1)}
.footer-actions{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.footer-credit{font-family:var(--mono);font-size:11px;color:#a8b8c8}
</style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <h1>Healthcare Privacy Primer</h1>
      <span class="pipe-motif">&#x2502; Before You Begin</span>
      <span class="subtitle">Foundation for the Healthcare Privacy &amp; De-Identification Tutorial</span>
    </div>
    <div class="header-credit">Developed by: Joe Williams</div>
  </div>
  <div id="welcomeBackBanner" style="display:none"></div>
  <div class="progress-bar" id="progressBar"></div>
</header>
<main>
  <div class="content-col">
    <div id="heroSection"></div>
    <div id="actionBar"></div>
    <div id="segmentContainer"></div>
  </div>
  <aside class="sidebar-col"><div id="cardsSidebar"></div></aside>
</main>
<footer class="footer">
  <div class="footer-actions">
    <button class="btn ghost" onclick="resetProgress()">&#8635; Start over</button>
    <button class="btn" id="beginTutBtn" disabled onclick="window.location.href='privacy_tutorial_integrated.html'">Begin Privacy Tutorial &#8594;</button>
  </div>
  <div class="footer-credit">Healthcare Privacy Primer &middot; Developed by: Joe Williams</div>
</footer>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Definition</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════
//  CARDS — key terms, one per concept
// ═══════════════════════════════════════════════════
const CARDS = {
  probability:{term:'Probability',def:'A number between 0 and 1 measuring how likely an event is. P = 0 means impossible; P = 1 means certain. Computed as: favorable outcomes ÷ total outcomes.',long:'In privacy work, probability appears constantly. "The probability that this record belongs to Margaret Chen" = 1 / (number of people sharing her quasi-identifier values). If 3 people share the same combination, probability = 1/3 ≈ 0.333. If she is the only one, probability = 1/1 = 1.0 — certain identification. The closer to 1, the more dangerous the re-identification risk.'},
  fraction_ratio:{term:'Fraction / Ratio',def:'A fraction is one number divided by another: numerator ÷ denominator. A ratio compares two quantities. Both express the same idea: "how much of one thing per unit of another."',long:'5/100 = 0.05 = 5%. In privacy: "3 records with k=1 out of 20 total" is the fraction 3/20 = 0.15, which is the Journalist re-identification risk. Reading a fraction: the top (numerator) is the part you care about; the bottom (denominator) is the whole. Division is always: how many times does the bottom fit into the top?'},
  multiplication_rule:{term:'Counting by Multiplication',def:'When combining independent categories, the total number of combinations = product of the number of options in each category. Example: 2 sexes × 8 age groups × 50 ZIPs = 800 possible QI combinations.',long:'This is also called the "multiplication principle" or "counting rule." It underlies the Unicity formula: total cells = S₁ × S₂ × ... × Sₖ where each Sᵢ is the number of distinct values for quasi-identifier field i. Why multiply? Because every combination of (one value from field 1) × (one value from field 2) × ... creates a unique cell. 2 × 3 = 6 total cells when field A has 2 options and field B has 3.'},
  log_base2:{term:'Logarithm (log₂)',def:'log₂(x) asks: "How many times must I multiply 2 by itself to get x?" log₂(2)=1, log₂(4)=2, log₂(8)=3, log₂(1)=0. Used in Fellegi-Sunter to measure how much information a field match provides.',long:'Think of log₂ as "doublings." log₂(8) = 3 because 2³ = 8. If a ratio m/u = 16, then log₂(16) = 4 — matching this field gives 4 "bits" of evidence for a true match. Larger log₂(m/u) means the field is more diagnostic. A field where random records agree 50% of the time (u=0.5) and true matches agree 99% of the time (m=0.99) contributes only log₂(0.99/0.5) ≈ 0.98 bits — barely helpful, because chance agreement is so common. Always: log₂(1) = 0 (neutral), log₂(>1) > 0 (evidence FOR match).'},
  summation_sigma:{term:'Summation (Σ — capital Sigma)',def:'The Greek capital letter Sigma (Σ) is shorthand for "add all of these up." Σ(1/kᵢ) means: compute 1/kᵢ for each record i, then add all results together.',long:'Σ is one of the most useful notations in statistics. Instead of writing 1/k₁ + 1/k₂ + 1/k₃ + ... for every record, you write Σ(1/kᵢ). The subscript i just means "for each record." In the Marketer risk formula: Marketer = (1/N) × Σ(1/kᵢ). That says: for every record, compute 1/(its group size), add all those fractions together, then divide by N. This gives the average re-identification success rate across all records.'},
  product_pi:{term:'Product Notation (Π — capital Pi)',def:'The Greek capital letter Pi (Π) means "multiply all of these together." Π(Sᵢ) = S₁ × S₂ × S₃ × ... — multiply the number of distinct values for each quasi-identifier field.',long:'Just as Σ is shorthand for a long sum, Π is shorthand for a long product. In the Unicity formula: total cells = Π(Sᵢ). If you have 3 QI fields with 2, 8, and 50 distinct values: Π(Sᵢ) = 2 × 8 × 50 = 800 cells. Pi (Π) is the same letter as the mathematical constant π ≈ 3.14159, but here it is used as a capital letter for the product operation — not the circle ratio.'},
  epsilon_symbol:{term:'ε — Epsilon (lowercase)',def:'In this tutorial, ε (epsilon) is the differential privacy "budget" — a number controlling how much noise is added to protect individual records. Smaller ε = stronger privacy, more noise.',long:'ε is NOT the summation symbol (that is Σ, capital Sigma). Epsilon (ε) appears in: noise scale = Δf / ε. When ε = 1.0: standard research-grade privacy. When ε = 0.1: very strong privacy (a lot of noise). When ε = 10: weak privacy (little noise). The name "budget" is apt: each query you publish consumes from the total ε budget. Publish too many queries and the budget runs out — each additional query reduces protection.'},
  delta_symbol:{term:'Δ — Delta (capital)',def:'Capital delta (Δ) in this tutorial means "sensitivity" — the maximum amount by which one person\'s data can change the query output. For count queries, Δf = 1 always.',long:'Δ comes from "difference" — it represents the maximum change. For a query f that counts patients: adding or removing one patient changes the count by at most 1. So Δf = 1. This is true for ANY count query, regardless of the total number of patients. In the Laplace mechanism: noise scale = Δf / ε = 1 / ε. The sensitivity Δ appears in many places in statistics — it always means "the maximum possible change."'},
  subscript_notation:{term:'Subscript Notation (kᵢ, Sᵢ)',def:'A small number or letter written below and to the right of a variable. kᵢ means "the value of k for record number i." Sᵢ means "the number of distinct values for quasi-identifier field number i."',long:'Subscripts are just a labeling system — they distinguish multiple instances of the same variable type. k₁ is the group size for record 1; k₂ for record 2, etc. You can also see: S₁ = distinct values for field 1 (e.g., Sex has S₁ = 2), S₂ = distinct values for field 2 (e.g., Age Decade has S₂ = 8). The subscript i is a placeholder meaning "for whichever one we are currently considering."'},
  formula_anatomy:{term:'Anatomy of a Formula',def:'Every formula has the form: OUTPUT = COMPUTATION. The left side names what you are computing. The right side describes how. The "/" symbol means divide. Parentheses group operations that must happen first.',long:'Example: Journalist Risk = (# records with k=1) / N. Reading left to right: "Journalist Risk equals the count of records whose group size is 1, divided by the total number of records N." Order of operations: parentheses first, then multiplication and division (left to right), then addition and subtraction. When you see a formula, identify: (1) what is the left side computing? (2) What are the inputs on the right? (3) What operation connects them?'},
  de_identification:{term:'De-Identification',def:'The process of removing or transforming data fields so that individuals cannot be readily identified. It reduces re-identification risk to an acceptable level — not necessarily zero.',long:'De-identification ≠ anonymization. Anonymization implies identity can never be recovered. De-identification only reduces risk below a threshold. HIPAA provides two pathways: Safe Harbor (remove 18 specific identifier types — mechanical) and Expert Determination (a statistician certifies risk ≤ 0.09 using a formal analysis). De-identified data can still be re-identified if an attacker has access to auxiliary data containing the same quasi-identifiers — this is called a linkage attack.'},
  direct_identifier:{term:'Direct Identifier',def:'A data field that, alone or nearly alone, identifies a specific individual. Examples: full name, Social Security Number, date of birth + full address combined, medical record number.',long:'HIPAA Safe Harbor lists 18 direct identifier categories. The action for direct identifiers is always: SUPPRESS (remove the value entirely). There is no "generalize" option for names or SSNs — they must be deleted. This contrasts with quasi-identifiers (which can be generalized rather than deleted). Biometric data (fingerprints, retinal scans, voice prints) are also direct identifiers under HIPAA Category 16.'},
  quasi_identifier:{term:'Quasi-Identifier (QI)',def:'A data field that is not directly identifying alone, but can combine with other quasi-identifiers to re-identify individuals. Examples: ZIP code, date of birth (year only), sex, age, race/ethnicity.',long:'Sweeney (1997) showed that 87% of the U.S. population could be uniquely identified using just three fields: ZIP code + full date of birth + sex. This finding motivated HIPAA\'s QI rules. The danger of QIs is combinatorial: each additional QI field multiplies re-identification risk. The action for QIs is: GENERALIZE (make less precise — replace exact DOB with birth year, replace 5-digit ZIP with 3-digit prefix).'},
  sensitive_attribute:{term:'Sensitive Attribute',def:'The clinical data you actually want to analyze: diagnoses, lab results, medications, procedures. These are retained in de-identified datasets but must be protected from inference via k-anonymity and l-diversity.',long:'Protecting sensitive attributes requires two layers: (1) k-anonymity so identity cannot be singled out, and (2) l-diversity so the attribute cannot be inferred just from knowing the equivalence class. Example: if all 5 patients in a k=5 group have the same HIV diagnosis, an attacker who links anyone to that group learns the diagnosis with 100% certainty — this is the homogeneity attack. l-diversity requires at least l distinct sensitive values per group.'},
  generalization:{term:'Generalization',def:'Replacing a precise quasi-identifier value with a broader, less specific category to reduce linkability while preserving analytical utility.',long:'Examples: exact date of birth (03/14/1952) → birth year only (1952). 5-digit ZIP code (98032) → 3-digit prefix (980**). Exact age (72) → decade (70s). The 3-digit prefix contains roughly 100× more people than the 5-digit ZIP, making any specific combination much harder to link. Generalization is preferred over suppression because it keeps a data point in the dataset — you lose precision but not the record.'},
  suppression:{term:'Suppression',def:'Completely removing a data field value or an entire record from the dataset. Applied to direct identifiers (always) and to records whose quasi-identifier combination is so unique that generalization cannot make it private.',long:'A record with k=1 (it is the only record in its equivalence class) must be suppressed if more aggressive generalization cannot merge it into a group. Suppression costs one full data point. In a 6-patient cohort requiring k=2, suppressing 2 records means 33% data loss — painful. In a 2,000-patient dataset the same situation might produce only 1-2% suppression rate, because there are enough records to form natural groups.'},
  safe_harbor:{term:'HIPAA Safe Harbor',def:'One of two HIPAA de-identification methods. Remove all 18 identifier categories from the dataset. Mechanical — no statistical analysis required. Compliance is binary: either all 18 are removed or they are not.',long:'Safe Harbor is a rules-based checklist. An organization can declare a dataset de-identified under Safe Harbor without any statistician or risk calculation, as long as all 18 identifier types have been removed or generalized according to the specific rules. The advantage: simple, legally clear, no expert needed. The disadvantage: it does not actually measure residual risk — a Safe Harbor dataset might still carry substantial re-identification risk from remaining quasi-identifiers. Expert Determination measures that residual risk directly.'},
  expert_determination:{term:'Expert Determination',def:'The second HIPAA de-identification method. A qualified statistician applies methods to certify that the re-identification risk is "very small" — interpreted in practice as ≤ 0.09 (9%) under the prosecutor model.',long:'Expert Determination is more flexible than Safe Harbor — it allows retaining fields that Safe Harbor would require removing, as long as the statistician can prove overall risk stays below threshold. The documentation requirement: the expert must write up their methodology and conclusions. This is the basis of the three attacker model calculations (Prosecutor, Journalist, Marketer) in the privacy tutorial. The 0.09 threshold implies a minimum k ≥ 12, because 1/12 ≈ 0.083 < 0.09.'},
  zip_threshold:{term:'ZIP Code Population Threshold',def:'Under HIPAA Safe Harbor, a 3-digit ZIP prefix may be retained only if the geographic area it covers contains ≥ 20,000 residents (per U.S. Census). Otherwise, replace with 000.',long:'Why 20,000? The threshold was set to ensure that a 3-digit ZIP area contains enough people that any QI combination will have many potential matches. Rural ZIP areas with fewer residents would be too identifying even at the 3-digit prefix level. To check: look up the population covered by the 3-digit prefix using Census data. If pop < 20,000, the field must become 000**. Note: this is a Safe Harbor rule — under Expert Determination, a statistician might allow a smaller-population prefix if the full risk calculation still passes the 0.09 threshold.'},
  age_90_rule:{term:'Age 90+ Rule (HIPAA)',def:'Under Safe Harbor, all dates must be reduced to year only. Additionally, patients aged 90 or older must have their birth year replaced with the label "Age 90+" — their birth year alone is considered too identifying.',long:'Why? Extremely long-lived individuals are statistically rare. A birth year of 1929 in a dataset, combined with other QIs, could uniquely identify one of a very small group of centenarians. The age 90+ rule collapses all ages ≥ 90 into a single category, preventing unique identification of very old patients. This rule applies to the birth date, not the current age field. If a patient is 92, their birth year is replaced with "Age 90+" regardless of how many other 90+ patients are in the dataset.'},
  prosecutor_model:{term:'Prosecutor Model',def:'An attacker who already knows a specific individual is in the dataset and tries to find their record. Models targeted attacks. Formula: Prosecutor Risk = 1 / min(k). Even one k=1 record makes risk = 1.0.',long:'The prosecutor model is the most conservative of the three. It assumes a worst-case adversary with specific intent. One record with k=1 (completely unique QI combination) means: risk = 1/1 = 1.0 = 100%. This single record fails, regardless of how many other records have k=10 or k=50. The fix: suppress or further generalize until min(k) ≥ 12 (giving risk ≈ 0.083, below the 0.09 threshold).'},
  journalist_model:{term:'Journalist Model',def:'An attacker who randomly selects a record and tries to identify the person it belongs to. Models investigative journalism or spot-check attacks. Formula: Journalist Risk = (# records with k=1) / N.',long:'Unlike the prosecutor model, the journalist does not have a specific target — they pick any record and ask "who is this?" The risk measures what fraction of the dataset is trivially exposable. If 3 records out of 20 have k=1, journalist risk = 3/20 = 0.15 = 15%, which exceeds the 0.09 threshold. If those 3 records are suppressed, journalist risk = 0/17 = 0.0 — perfect score. The journalist model is the easiest to satisfy of the three.'},
  marketer_model:{term:'Marketer Model',def:'An attacker trying to maximize total successful re-identifications across the entire dataset. Models bulk data broker attacks. Formula: Marketer Risk = (1/N) × Σ(1/kᵢ) summed over all records.',long:'The marketer treats the dataset as a commodity and wants to correctly identify as many records as possible. For each record, the probability of correct identification = 1/kᵢ (one in its group size). Adding these up and dividing by N gives the average success rate across all records. A record with k=1 contributes 1/1 = 1.0 to the sum; one with k=10 contributes 0.1. This is the "average expected re-identification rate" — the expected fraction of the dataset the attacker successfully links.'},
  k_anonymity:{term:'k-Anonymity',def:'A dataset property guaranteeing that every record is indistinguishable from at least k−1 other records on all quasi-identifier fields. Every individual "hides in a crowd" of k people.',long:'Formally: for every record r, the number of records sharing identical quasi-identifier values must be ≥ k. The group of records sharing the same QI values is called an equivalence class. If a class contains only 2 records, k=2 for those records. The dataset\'s k = min(k across all classes). k=2 means the best an attacker can do is 50% certainty on identity. k=12 means the best is 1/12 ≈ 8.3% — below the 0.09 prosecutor threshold.'},
  equivalence_class:{term:'Equivalence Class',def:'A group of records in a k-anonymized dataset that share identical values on every quasi-identifier field. All members of the class are indistinguishable from each other on QI fields.',long:'Example: if Sex=M, Age Decade=40s, ZIP-3=981 describes both David Okafor and Thomas Nakamura, they form an equivalence class with k=2. An attacker who links either person to this class knows only "it is David or Thomas" — 50/50 uncertainty. The attacker cannot know which one without additional information. Equivalence classes are the building block of k-anonymity — the goal of the generalization step is to produce classes large enough to meet the required k.'},
  l_diversity:{term:'l-Diversity',def:'An extension of k-anonymity requiring that each equivalence class contains at least l distinct values of every sensitive attribute. Protects against attribute inference even when identity cannot be singled out.',long:'k-Anonymity alone is insufficient if all members of a class share the same sensitive attribute value. If all 5 patients in a class have HIV, an attacker linking anyone to that class learns the diagnosis with 100% certainty — despite perfect identity protection. l-Diversity requires: distinct sensitive attribute values per class ≥ l. l=2 means at most 50% certainty for the attacker. l=3 means at most 33%. Required l is specified in the Data Use Agreement alongside required k.'},
  homogeneity_attack:{term:'Homogeneity Attack',def:'A re-identification attack exploiting l-diversity failure: all members of an equivalence class share the same sensitive attribute value. The attacker infers the attribute with 100% certainty despite k-anonymity protecting identity.',long:'This is why k-anonymity alone is considered insufficient for sensitive health data. "Homogeneous" means "all the same." If a k=5 class contains five patients all with HIV, the class is homogeneous on the sensitive attribute — anyone linked to it is known to have HIV regardless of which of the 5 they are. l-Diversity prevents this by requiring diversity (distinctness) of sensitive values within every class. The minimum l to prevent homogeneity attacks is l ≥ 2.'},
  conditional_probability:{term:'Conditional Probability',def:'P(A | B) — the probability of event A given that event B has already occurred. Read as "probability of A given B." Computed as P(A and B) / P(B).',long:'The vertical bar "|" means "given." P(re-id | Female, 1952, 980**) means: "given we know the person is Female, born in 1952, with ZIP prefix 980, what fraction of such people can we uniquely identify?" This is foundational to understanding re-identification risk. Each quasi-identifier field acts as a "given" that narrows the candidate population. The more fields known, the smaller the remaining population — the higher the re-identification probability.'},
  anonymity_set:{term:'Anonymity Set',def:'The number of real people in the external population who share all the same quasi-identifier values as a specific de-identified record. Re-ID probability ≈ 1 / anonymity set size.',long:'If Priya\'s record shows {Female, born 1972, ZIP prefix 980}, the anonymity set = all women born in 1972 living in the 980 ZIP area. If Census data shows 3,120 such women, her re-id probability = 1/3,120 ≈ 0.032%. Adding a 4th QI field (diagnosis: Bipolar, prevalence 0.5% in this group) shrinks the set to 3,120 × 0.005 ≈ 15 people — re-id probability jumps to 6.7%. This is the QI intersection collapse effect: each additional field multiplies risk.'},
  unicity:{term:'Unicity',def:'u = N / (S₁ × S₂ × ... × Sₖ). Measures average records per QI combination cell. u >> 1 = low unicity (safe). u << 1 = high unicity (dangerous). Critical threshold: u ≈ 1.',long:'Unicity answers: "Are most QI combination cells occupied by many records (good) or by singletons (dangerous)?" When u < 1, more cells are empty than occupied — the occupied ones are mostly singletons, meaning most records are unique fingerprints. Applying generalization (e.g., ZIP-5 → ZIP-3) reduces the number of cells (fewer S values), increasing u and improving safety. The critical insight: u = 1 is the boundary where the average cell contains exactly one record.'},
  prior_probability:{term:'Prior Probability — P(H)',def:'The probability of a hypothesis before seeing any evidence. The "starting belief." In Bayes\' theorem: P(H) is whatever you believe is true before the test or observation.',long:'In clinical context: P(sepsis) before running any test might be 0.20 — 20% of fever patients who present to the ED turn out to have sepsis. In re-identification context: P(this record belongs to Person X) = 1/N before any QI matching. The prior is your baseline. Bayes\' theorem updates the prior using evidence. A low prior (rare condition) means even a positive test may not be very convincing — the posterior stays low because false positives dominate when the condition is rare.'},
  likelihood:{term:'Likelihood — P(E|H)',def:'The probability of observing the evidence E given that the hypothesis H is true. If the test is very sensitive, P(positive test | truly has disease) is high — close to 1.',long:'P(E|H) is NOT "the probability of H given E" — that is the posterior. Likelihood is the probability of the data, not the hypothesis. A sensitivity of 0.90 means: if you truly have the disease, the test correctly identifies you 90% of the time. A sensitivity of 1.0 would mean the test never misses a true case. The likelihood is the upward pull in Bayes\' theorem — it rewards the hypothesis for predicting the observed evidence.'},
  false_positive_rate:{term:'False Positive Rate — P(E|¬H)',def:'The probability of seeing the evidence E even when the hypothesis H is FALSE. If the test shows positive for someone who does NOT have the disease, that is a false positive.',long:'P(E|¬H) = 1 − specificity. A test with 90% specificity produces false positives 10% of the time. The false positive rate is the "noise" that dilutes the signal of a positive result. When the prior P(H) is very low (rare condition) and P(E|¬H) is not extremely low, the denominator of Bayes\' theorem gets dominated by false positives — making the posterior surprisingly low even for a positive test.'},
  bayes_theorem:{term:'Bayes\' Theorem',def:'P(H|E) = [P(E|H) × P(H)] / [P(E|H)×P(H) + P(E|¬H)×P(¬H)]. Updates a prior belief after observing evidence. The denominator is the law of total probability.',long:'Step by step: (1) Numerator = P(E|H) × P(H): how likely is the evidence if H is true, times how probable H was before the test. (2) False-alarm term = P(E|¬H) × P(¬H): how likely is the evidence even if H is false, times how probable H-is-false was. (3) Denominator = numerator + false-alarm term: total probability of seeing this evidence regardless of truth. (4) Posterior = numerator / denominator. Bayes\' theorem is not just a medical formula — it is the foundation of all rational belief updating.'},
  record_linkage:{term:'Record Linkage',def:'The process of connecting records from two different databases that refer to the same real person, even when no shared unique identifier (like SSN or MRN) exists across both systems.',long:'Record linkage is necessary when health systems exchange data but use incompatible patient ID systems. Without a shared ID, the algorithm must compare field values (name, DOB, address, ZIP) and decide probabilistically whether two records belong to the same person. Fellegi-Sunter is the dominant probabilistic framework. Privacy-Preserving Record Linkage (PPRL) solves the additional problem of linking without revealing the raw PII to either organization.'},
  m_rate:{term:'m-rate (mᵢ)',def:'In Fellegi-Sunter linkage, the probability that field i agrees between two records that ARE a true match. A high m-rate means true pairs almost always agree on this field.',long:'m = P(field agrees | true match). Date of birth has a very high m-rate (~0.97) because people almost always enter their own DOB correctly. Last name has m ~0.95 (some variation from transcription errors, name changes). Sex has m ~0.99 (almost always consistent). The m-rate is determined by the quality of the field — fields with frequent errors (like middle names, which people sometimes omit) have lower m-rates. A higher m-rate contributes to a larger positive weight for that field.'},
  u_rate:{term:'u-rate (uᵢ)',def:'In Fellegi-Sunter linkage, the probability that field i agrees between two records that are NOT a true match — pure coincidence agreement. A very low u-rate makes a field more diagnostic.',long:'u = P(field agrees | random non-match). For last name: u ≈ 0.003 — only 0.3% of random non-matching record pairs share the same last name. For sex: u ≈ 0.50 — roughly half of random pairs share the same sex (because the population is roughly half male, half female). The log₂(m/u) weight is large when u is very small — DOB agreement is strong evidence of a match because the chance of two non-matching people sharing a DOB is tiny (u ≈ 0.003).'},
  bloom_filter:{term:'Bloom Filter (PPRL)',def:'A compact bit array where each data element (e.g., a name bigram) is mapped to bit positions by hash functions. Used in PPRL to compare records without revealing the original PII.',long:'The Bloom filter approach: take a name like "PRIYA", generate its bigrams (_P, PR, RI, IY, YA, A_), hash each bigram to specific bit positions in an array, set those bits to 1. Two organizations do this independently for their version of the same name. They exchange only the bit arrays — not the names. Similarity between bit arrays (measured by Dice coefficient) estimates whether the underlying names are the same. The original names cannot be recovered from the bit arrays as long as the hash salt is kept secret.'},
  bigram:{term:'Bigram',def:'A two-character overlapping substring extracted from a name for Bloom filter hashing. "PRIYA" → {_P, PR, RI, IY, YA, A_} where _ is a padding character added at start and end.',long:'Bigrams capture the local character structure of a name. Similar names share many bigrams: "PRIYA" and "PRIYAH" share {_P, PR, RI, IY, YA} — 5 of 6 bigrams. Very different names share few: "PRIYA" and "JAMES" share only bigrams that happen to have the same two characters by chance. Using bigrams instead of raw characters makes the Bloom filter robust to minor spelling variations — a one-character typo changes at most 2 bigrams out of n.'},
  dice_similarity:{term:'Dice Similarity',def:'Dice = 2 × |shared bits| / (|bits in A| + |bits in B|). Ranges from 0 (no overlap) to 1 (identical). Threshold: ≥ 0.75 probable match, 0.5–0.74 human review, < 0.5 non-match.',long:'The Dice coefficient measures the overlap between two sets (here, two bit arrays). It rewards shared bits and penalizes extra bits in either array. Dice = 0 means no common bits — completely different names. Dice = 1.0 means every bit set in A is also set in B and vice versa — identical names. The threshold of 0.75 was calibrated empirically to balance sensitivity (catching true matches) against specificity (avoiding false links). Short names (3 letters) have very few bigrams and can produce artificially high Dice scores — a limitation of the method.'},
  differential_privacy:{term:'Differential Privacy (DP)',def:'A mathematical guarantee that an algorithm\'s output is essentially indistinguishable whether or not any single individual\'s data was included. Achieved by adding precisely calibrated random noise before releasing statistics.',long:'DP is the only privacy technique in this tutorial that provides protection against attackers with unlimited background knowledge. k-Anonymity, l-diversity, and Safe Harbor all assume a bounded attacker. DP provides protection even against an attacker who knows everything about everyone else in the dataset. The formal guarantee: |P(output with person X) - P(output without person X)| ≤ ε. A smaller ε makes these two probabilities closer — stronger protection.'},
  membership_inference:{term:'Membership Inference Attack',def:'An attack determining whether a specific named individual\'s data was included in a dataset or model. Even aggregate statistics can leak membership — if a count changes by 1 between two releases, the attacker may infer whose record was added.',long:'Example: A hospital publishes "342 patients with mental health diagnoses." An attacker who previously observed "341" (before one new patient was added) can infer that a specific person was added to the dataset if they know of only one new mental health patient admitted during that period. Differential privacy prevents this by adding enough noise that the count could be 341, 342, or 343 regardless of whether the specific person is included — making the inference impossible.'},
  sensitivity_delta:{term:'Sensitivity (Δf)',def:'The maximum change in a query result when one individual\'s data is added or removed. For count queries: Δf = 1 always. For average queries: Δf = (max value − min value) / N.',long:'Sensitivity determines how much noise to add. If adding/removing one person changes the count by at most 1 (Δf=1), then the noise scale = 1/ε. If the query is "average age" and ages range from 18 to 90: Δf = (90−18)/N. Large sensitivity requires more noise to achieve the same ε protection level. Count queries are preferred for DP release because Δf=1 is guaranteed — no matter how many patients are in the dataset, adding/removing one changes the count by exactly ±1.'},
  laplace_mechanism:{term:'Laplace Mechanism',def:'M(D) = f(D) + Laplace(0, Δf/ε). The most common differential privacy mechanism for numeric queries. Adds noise drawn from a Laplace distribution with scale = Δf/ε.',long:'The Laplace distribution is bell-shaped (like a normal distribution) but with heavier tails and a peak at 0. Scale parameter b = Δf/ε controls the spread: larger b = more noise = stronger privacy. The expected absolute noise magnitude ≈ b = Δf/ε. For Δf=1, ε=0.5: b = 2.0, expected noise ≈ ±2 counts. For Δf=1, ε=1.0: b = 1.0, expected noise ≈ ±1. For Δf=1, ε=10: b = 0.1, expected noise ≈ ±0.1. Post-processing: negative published counts are typically clamped to 0, and non-integers rounded to the nearest integer.'}
};

// ─── SEGMENT 1: Math Refresher ───
{id:1,icon:'🧮',title:'The Math Behind Privacy',subtitle:'Fractions, probability, counting, and reading formulas without fear',minutes:12,
cards:['probability','fraction_ratio','multiplication_rule','log_base2','summation_sigma','product_pi'],
endGoal:'You can compute a basic probability from a fraction, count QI combinations by multiplication, and read the Σ notation in a formula without skipping it.',
lecture:`
<p><strong>Alex Chen</strong> is a data analyst at Riverside Medical Center. He has just been handed a project: prepare the Meridian Cohort dataset for an external research partner. Before he can run a single de-identification formula, he needs to be comfortable with the math those formulas use.</p>
<p>This segment covers every mathematical concept you need for the entire privacy tutorial — nothing more, nothing less. If you have taken a high school statistics course or remember basic algebra, most of this will be familiar. We are shaking off rust, not learning from scratch.</p>

<h3>Probability — the core idea</h3>
<p><button class="card-link" onclick="openCardModal('probability')">Probability</button> measures <em>how likely</em> something is. It is always a number between 0 and 1:</p>
<ul>
<li>P = 0 means <strong>impossible</strong> (it will never happen)</li>
<li>P = 1 means <strong>certain</strong> (it always happens)</li>
<li>P = 0.25 means a <strong>25% chance</strong> (1 in 4)</li>
</ul>
<p>The formula is simply a <button class="card-link" onclick="openCardModal('fraction_ratio')">fraction</button>:</p>
<div style="background:var(--surface-inset);border-left:4px solid var(--blue);padding:12px 16px;margin:10px 0;border-radius:0 6px 6px 0;font-family:var(--mono);font-size:14px;font-weight:700;color:#0a1828">
P = (favorable outcomes) ÷ (total possible outcomes)
</div>
<p><strong>Example:</strong> A bowl holds 4 red marbles and 16 blue ones (20 total). The probability of picking a red marble = 4 ÷ 20 = 0.20 = 20%.</p>
<p>In privacy work: <em>"What is the probability that this record belongs to Margaret Chen?"</em> The favorable outcome is "it is Margaret's record." The total outcomes are all records sharing her quasi-identifier values. If 3 records share her combination: P = 1/3 ≈ 0.333.</p>

<h3>Counting combinations — multiply, don't add</h3>
<p>When you combine categories, the number of unique <em>combinations</em> grows by multiplication, not addition. This is the <button class="card-link" onclick="openCardModal('multiplication_rule')">multiplication rule</button>.</p>
<p><strong>Example:</strong> A dataset has 3 quasi-identifier fields: Sex (2 values: M/F), Age Decade (8 values: 10s through 80s+), and 3-digit ZIP (50 distinct prefixes). How many unique QI combinations exist?</p>
<div style="background:var(--surface-inset);border-left:4px solid var(--blue);padding:12px 16px;margin:10px 0;border-radius:0 6px 6px 0;font-family:var(--mono);font-size:13px;font-weight:700;color:#0a1828">
Total cells = 2 × 8 × 50 = 800 possible combinations
</div>
<p>Each cell is a unique (Sex, Age, ZIP) combination. The dataset has 500 records. 500 records spread across 800 cells means most cells contain fewer than 1 record — many records will be unique. This is the <em>unicity</em> problem, which Station 07 addresses.</p>

<h3>Logarithm base 2 — a gentle introduction</h3>
<p>The <button class="card-link" onclick="openCardModal('log_base2')">logarithm base 2</button>, written log₂, appears in the Fellegi-Sunter record linkage formula. Here is the core idea without algebra:</p>
<p><strong>log₂(x) asks: "How many times must I double the number 1 to reach x?"</strong></p>
<ul>
<li>log₂(2) = 1 &nbsp;(double 1 once: 1 → 2)</li>
<li>log₂(4) = 2 &nbsp;(double 1 twice: 1 → 2 → 4)</li>
<li>log₂(8) = 3 &nbsp;(three doublings: 1 → 2 → 4 → 8)</li>
<li>log₂(1) = 0 &nbsp;(no doublings needed; already at 1)</li>
<li>log₂(100) ≈ 6.64 (about 6.64 doublings to reach 100)</li>
</ul>
<p>In Fellegi-Sunter: log₂(m ÷ u) measures how many "bits of evidence" a field agreement provides. A ratio m/u = 100 gives log₂(100) ≈ 6.64 bits — strong evidence. A ratio of 2 gives log₂(2) = 1 bit — weak evidence. You do not need to compute this by hand; the key is to <em>understand what larger values mean</em>: more evidence that the records match.</p>

<h3>Summation (Σ) and Products (Π)</h3>
<p>Two Greek capital letters appear as shorthand for long arithmetic operations:</p>
<p><button class="card-link" onclick="openCardModal('summation_sigma')"><strong>Σ (capital Sigma)</strong></button> means "add all of these up." Instead of writing a₁ + a₂ + a₃ + a₄ + a₅, you write Σ aᵢ. The subscript i just means "for each one."</p>
<p><button class="card-link" onclick="openCardModal('product_pi')"><strong>Π (capital Pi)</strong></button> means "multiply all of these together." Instead of S₁ × S₂ × S₃ × ... you write Π Sᵢ.</p>
<p>In the Marketer risk formula: Marketer Risk = (1/N) × Σ(1/kᵢ). That says: for each record i, compute 1 divided by its group size kᵢ. Add all those fractions together. Multiply by 1/N. Nothing more intimidating than a long addition problem.</p>

<div class="callout">💡 <strong>Pattern to memorize:</strong> In every privacy formula, the denominator (bottom of the fraction) represents the crowd that protects an individual's identity. A bigger denominator = more people = lower probability = better privacy.</div>

<details class="demo-block">

</div>

{id:2,icon:'🔤',title:'Decoding the Symbols',subtitle:'Greek letters, subscripts, and how to read any privacy formula',minutes:8,
cards:['epsilon_symbol','delta_symbol','subscript_notation','formula_anatomy'],
endGoal:'You can look at any formula in the privacy tutorial and identify what each symbol means, what is being computed on the left, and what operations are performed on the right.',
lecture:`
<p>Alex opens his statistics reference and is immediately confronted by Greek letters: Σ, ε, Δ, Π. He pauses. "I remember these from school," he thinks, "but I cannot remember what they all mean."</p>
<p>This segment is a symbol decoder. You will encounter all of these in the privacy tutorial. By the end, none will be mysterious.</p>

<h3>The Greek letters used in this tutorial</h3>
<p>Below is every Greek letter you will encounter, what it looks like, and exactly what it means in the context of healthcare privacy. You do <strong>not</strong> need to know the full Greek alphabet — only these:</p>
<table class="greek-table">
<thead><tr><th>Symbol</th><th>Name</th><th>In this tutorial it means...</th></tr></thead>
<tbody>
<tr><td>Σ</td><td>Capital Sigma</td><td>Add everything up: Σ(1/kᵢ) = 1/k₁ + 1/k₂ + 1/k₃ + ...</td></tr>
<tr><td>Π</td><td>Capital Pi</td><td>Multiply everything together: Π Sᵢ = S₁ × S₂ × S₃ × ...</td></tr>
<tr><td>ε</td><td>Lowercase Epsilon</td><td>The differential privacy budget — controls how much noise is added</td></tr>
<tr><td>Δ</td><td>Capital Delta</td><td>Sensitivity — the maximum change one person can cause in a query result</td></tr>
<tr><td>α, β</td><td>Alpha, Beta</td><td>Just labels for groups (Group α, Group β) — no mathematical meaning beyond a name</td></tr>
</tbody>
</table>

<div class="callout">⚠️ <strong>Common confusion:</strong> The summation symbol is Σ (capital Sigma), NOT ε (epsilon). Epsilon (ε) is a different letter used specifically for the differential privacy budget. If you see ε in a privacy formula, it means privacy budget — not summation.</div>

<h3>Subscripts — the labeling system</h3>
<p><button class="card-link" onclick="openCardModal('subscript_notation')">Subscript notation</button> uses a small number or letter below and to the right of a variable to label which instance you are referring to.</p>
<ul>
<li><strong>kᵢ</strong> — the group size (k) for record number i. k₁ is record 1's group size; k₅ is record 5's group size.</li>
<li><strong>Sᵢ</strong> — the number of distinct values for QI field number i. S₁ = 2 for Sex; S₂ = 8 for Age Decade; S₃ = 50 for ZIP codes.</li>
<li><strong>mᵢ, uᵢ</strong> — the m-rate and u-rate for field i in Fellegi-Sunter linkage.</li>
<li><strong>wᵢ</strong> — the weight assigned to field i in Fellegi-Sunter linkage.</li>
</ul>
<p>The subscript i is a placeholder. When a formula says Σ(1/kᵢ), it means: "evaluate 1/k for every record i in the dataset, then add all results together." Replace i with 1, then 2, then 3... until you have gone through every record.</p>

<h3>Anatomy of a formula — reading left to right</h3>
<p>Every formula in this tutorial follows the same pattern: <strong>OUTPUT = COMPUTATION</strong>.</p>
<p>The <button class="card-link" onclick="openCardModal('formula_anatomy')">left side</button> names what you are computing. The right side describes how to compute it using the inputs.</p>

<p><strong>Example 1 — Marketer Risk:</strong></p>
<div class="demo-formula">Marketer Risk = (1/N) × Σ(1/kᵢ)</div>
<p>Left side: <em>Marketer Risk</em> — the number we want to find.<br>
Right side: (1 divided by N) multiplied by (the sum of 1/k for every record i).</p>

<p><strong>Example 2 — Unicity:</strong></p>
<div class="demo-formula">u = N / (S₁ × S₂ × ... × Sₖ)</div>
<p>Left side: u — the unicity score we want.<br>
Right side: total records (N) divided by the total number of QI cells (the product of all Sᵢ values).</p>

<p><strong>Example 3 — Fellegi-Sunter weight:</strong></p>
<div class="demo-formula">wᵢ = log₂(mᵢ / uᵢ)</div>
<p>Left side: wᵢ — the weight for field i.<br>
Right side: log base 2 of (the m-rate divided by the u-rate) for field i.</p>

<h3>The "/" symbol always means divide</h3>
<p>In every formula in this tutorial, "/" means division. Always. 1/N = 1 divided by N. Δf/ε = delta-f divided by epsilon. m/u = m divided by u. When you see a fraction in a formula, ask yourself: "What is on top? What is on bottom? What does dividing them give me?"</p>

<div class="callout">📌 <strong>Practice habit:</strong> Before computing any formula, write out in plain English what the left side is computing and what each term on the right side represents. This prevents arithmetic errors and builds genuine understanding of what the formula is measuring.</div>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Decoding the Bayes' Theorem Formula</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600">Let's decode this formula step by step before computing anything:</p>
<div class="demo-formula">P(H|E) = [P(E|H) × P(H)] / [P(E|H)×P(H) + P(E|¬H)×P(¬H)]</div>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Left side P(H|E):</strong> This is our output — "probability of H given E." The vertical bar | means "given." H = hypothesis (patient has disease). E = evidence (test was positive). So we are computing: probability the patient truly has the disease, given a positive test result.</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>P(E|H) — top-left:</strong> Probability the test is positive GIVEN the patient truly has the disease. This is the test sensitivity. If sensitivity = 90%, P(E|H) = 0.90.</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>P(H) — the prior:</strong> Probability of having the disease BEFORE the test. If 20% of patients with this symptom have the disease, P(H) = 0.20.</div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>P(E|¬H) — the false positive rate:</strong> The ¬ symbol means "NOT." P(E|¬H) = probability the test is positive when the patient does NOT have the disease. If specificity = 90%, then false positive rate = 1 − 0.90 = 0.10.</div></div>
<div class="demo-step"><div class="demo-num">5</div><div class="demo-text"><strong>P(¬H) = 1 − P(H):</strong> If 20% have the disease, then 80% do not. P(¬H) = 1 − 0.20 = 0.80.</div></div>
<div class="demo-step"><div class="demo-num">6</div><div class="demo-text"><strong>Whole formula decoded:</strong> Posterior = (sensitivity × prior) / [(sensitivity × prior) + (false_positive_rate × prior_of_not_having_it)]</div></div>
</div>
</details>

<div class="fill-exercise">
<div class="fill-ex-label">📝 Try It — Match the Symbol</div>
<div class="fill-ex-prompt">Fill in each blank with the correct symbol or term. Use: Σ, Π, ε, Δ, subscript, left side, divide</div>
<div class="fill-actions" style="margin-bottom:8px"><button class="pulse-link" onclick="toggleSolution('s2_hint')">💡 Hint</button></div>
<div id="s2_hint" class="fill-solution">Review the Greek table above. Σ = summation (add). Π = product (multiply). ε = epsilon = privacy budget. Δ = delta = sensitivity = maximum change. A subscript is the small label below a variable.</div>
<div class="fill-row">"Add all terms together" → <input class="fill-input" id="s2_f1" data-ans="Σ" placeholder="?"></div>
<div class="fill-row">"Multiply all terms together" → <input class="fill-input" id="s2_f2" data-ans="Π" placeholder="?"></div>
<div class="fill-row">Privacy budget (controls noise level) → <input class="fill-input" id="s2_f3" data-ans="ε" placeholder="?"></div>
<div class="fill-row">Maximum change one person causes → <input class="fill-input" id="s2_f4" data-ans="Δ" placeholder="?"></div>
<div class="fill-row">In kᵢ, the small letter i is called a <input class="fill-input wide" id="s2_f5" data-ans="subscript" placeholder="?"></div>
<div class="fill-row">In "Journalist Risk = (k=1 count) / N", the "/" symbol means <input class="fill-input wide" id="s2_f6" data-ans="divide" placeholder="?"></div>
<div class="fill-actions">
<button class="btn" onclick="checkFill('s2_ex1',['s2_f1','s2_f2','s2_f3','s2_f4','s2_f5','s2_f6'])">Check</button>
<button class="btn ghost" onclick="revealFill(['s2_f1','s2_f2','s2_f3','s2_f4','s2_f5','s2_f6'])">Show answers</button>
</div>
<div class="fill-fb" id="s2_ex1_fb"></div>
</div>

// ─── SEGMENT 3: Privacy Fundamentals ───
{id:3,icon:'🔐',title:'Why Privacy? The Fundamentals',subtitle:'De-identification, data classification, and the threat of re-identification',minutes:9,
cards:['de_identification','direct_identifier','quasi_identifier','sensitive_attribute','generalization','suppression'],
endGoal:'You can classify any patient data field as direct identifier, quasi-identifier, or sensitive attribute, and select the correct transformation (suppress or generalize) for each.',
lecture:`
<p>Alex has his math tools in hand. Now he opens the Meridian Cohort spreadsheet — six synthetic patients, each with a name, date of birth, SSN, ZIP code, primary diagnosis, and phone number. His task: transform this into something an external analytics team can use, without exposing any patient's identity.</p>
<p>This is <button class="card-link" onclick="openCardModal('de_identification')">de-identification</button> — and the first step is understanding what type of threat each field poses.</p>

<h3>Three categories of fields</h3>
<p>Every field in a healthcare dataset falls into one of three categories, each requiring a different response:</p>

<h4>Category 1 — Direct Identifiers</h4>
<p>A <button class="card-link" onclick="openCardModal('direct_identifier')">direct identifier</button> is any field that, alone or nearly alone, identifies a specific person. <strong>Action: SUPPRESS</strong> (delete the value entirely).</p>
<ul>
<li><strong>Full name</strong> — "Margaret Chen" identifies exactly one person (or very few)</li>
<li><strong>Social Security Number</strong> — uniquely assigned by design</li>
<li><strong>Medical Record Number (MRN)</strong> — hospital's internal unique ID</li>
<li><strong>Phone number, email, full street address</strong> — all directly linking</li>
<li><strong>Date of birth combined with name</strong> — together they uniquely identify nearly anyone</li>
</ul>
<p>There is no "gentle" version of suppression — the value is deleted. You cannot "generalize" a name or an SSN into a safer form.</p>

<h4>Category 2 — Quasi-Identifiers (QI)</h4>
<p>A <button class="card-link" onclick="openCardModal('quasi_identifier')">quasi-identifier</button> is a field that looks harmless alone but becomes identifying in combination. <strong>Action: GENERALIZE</strong> (make the value less precise, not delete it).</p>
<ul>
<li><strong>Date of birth</strong> — generalize to birth year only (03/14/1952 → 1952)</li>
<li><strong>ZIP code</strong> — generalize to 3-digit prefix (98032 → 980**)</li>
<li><strong>Sex/gender</strong> — already a category; may be retained at this level</li>
<li><strong>Race/ethnicity</strong> — retained but combined with other QI controls</li>
<li><strong>Age</strong> — generalize to decade (72 → 70s)</li>
</ul>
<p>Why generalize instead of suppress? Because QI fields have analytical value — researchers studying hypertension outcomes need to know approximate age and geography. Removing birth year entirely would destroy the dataset's usefulness. Generalizing preserves the <em>shape</em> of the data while reducing its linking power.</p>

<h4>Category 3 — Sensitive Attributes</h4>
<p><button class="card-link" onclick="openCardModal('sensitive_attribute')">Sensitive attributes</button> are the clinical facts you need to analyze: diagnoses (ICD-10 codes), lab results, medications. <strong>Action: RETAIN</strong> — but only after the quasi-identifiers have been adequately protected via k-anonymity and l-diversity.</p>
<p>A sensitive attribute like "Z21 — HIV/AIDS" must not be suppressed — that would destroy the research value. But it must be protected from <em>inference</em>: an attacker who cannot identify who a record belongs to must also be unable to determine what the diagnosis is simply from knowing the group.</p>

<h3>Why simple removal is not enough: Sweeney's finding</h3>
<p>In 1997, Harvard researcher Latanya Sweeney demonstrated that <strong>87% of the U.S. population</strong> could be uniquely identified using only three fields from public voter registration rolls: 5-digit ZIP code, full date of birth, and sex. No names, no SSNs — just three quasi-identifiers.</p>
<p>This finding directly motivated HIPAA's de-identification rules. It proves that removing direct identifiers is necessary but not sufficient — the quasi-identifiers must also be carefully controlled.</p>

<div class="callout">🔑 <strong>Key distinction:</strong> De-identification is NOT anonymization. "Anonymized" implies identity can never be recovered. "De-identified" means re-identification risk has been reduced to an acceptable level — typically below 9%. With sufficient auxiliary data, a determined attacker may still be able to re-identify some records in a de-identified dataset.</div>

<details class="demo-block">
<summary class="demo-summary">📊 Worked Example — Classifying and Transforming P4 (Thomas Nakamura)</summary>
<div class="demo-body">
<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px;font-weight:600">Alex classifies every field in Thomas Nakamura's raw record and applies the correct transformation.</p>
<div class="demo-step"><div class="demo-num">1</div><div class="demo-text"><strong>Full Name: "Thomas Nakamura"</strong> → Direct Identifier → SUPPRESS (delete). A name alone identifies an individual. No generalization is possible.</div></div>
<div class="demo-step"><div class="demo-num">2</div><div class="demo-text"><strong>Date of Birth: "02/28/1981"</strong> → Quasi-Identifier → GENERALIZE to year only: <strong>1981</strong>. The month and day are removed; the year provides approximate age for analysis.</div></div>
<div class="demo-step"><div class="demo-num">3</div><div class="demo-text"><strong>SSN: "453-67-8821"</strong> → Direct Identifier → SUPPRESS (delete). Uniquely assigned by design.</div></div>
<div class="demo-step"><div class="demo-num">4</div><div class="demo-text"><strong>ZIP Code: "98102"</strong> → Quasi-Identifier → GENERALIZE to 3-digit prefix: <strong>981**</strong>. The 3-digit prefix covers ~85,000 residents — far less identifying than the 5-digit code.</div></div>
<div class="demo-step"><div class="demo-num">5</div><div class="demo-text"><strong>Primary Diagnosis: "I10 — Hypertension"</strong> → Sensitive Attribute → RETAIN. This is the clinical fact the research team needs. It will be protected by k-anonymity controls in the next stations.</div></div>
<div class="demo-step"><div class="demo-num">6</div><div class="demo-text"><strong>Phone: "206-555-0182"</strong> → Direct Identifier → SUPPRESS (delete). HIPAA Category 4.</div></div>
</div>
</details>

<div class="fill-exercise">

lecture:`
<p>Alex's compliance officer stops by. "Does this dataset qualify under HIPAA Safe Harbor?" she asks. Safe Harbor is HIPAA's mechanical de-identification pathway — a checklist of exactly 18 identifier categories. Remove all 18, and the dataset is legally de-identified without any statistical analysis.</p>
<p>This segment covers the specific rules of <button class="card-link" onclick="openCardModal('safe_harbor')">Safe Harbor</button> and when you would need the more rigorous <button class="card-link" onclick="openCardModal('expert_determination')">Expert Determination</button> pathway instead.</p>

<h3>The 18 identifier categories</h3>
<p>HIPAA Safe Harbor requires removing all of the following:</p>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;margin:12px 0">
<div style="background:var(--surface-inset);border-left:3px solid var(--red);border-radius:5px;padding:7px 11px;font-size:13px;color:var(--text-muted);font-weight:600"><span style="font-family:var(--mono);color:var(--red);font-size:10px;font-weight:700;display:block">01</span>Names</div>
<div style="background:var(--surface-inset);border-left:3px solid var(--red);border-radius:5px;padding:7px 11px;font-size:13px;color:var(--text-muted);font-weight:600"><span style="font-family:var(--mono);color:var(--red);font-size:10px;font-weight:700;display:block">02</span>Geographic data smaller than state</div>
<div style="background:var(--surface-inset);border-left:3px solid var(--red);border-radius:5px;padding:7px 11px;font-size:13px;color:var(--text-muted);font-weight:600"><span style="font-family:var(--mono);color:var(--red);font-size:10px;font-weight:700;display:block">03</span>Dates (except year) for ages ≤ 89</div>
<div style="background:var(--surface-inset);border-left:3px solid var(--red);border-radius:5px;padding:7px 11px;font-size:13px;color:var(--text-muted);font-weight:600"><span style="font-family:var(--mono);color:var(--red);font-size:10px;font-weight:700;display:block">04</span>Phone numbers</div>
<div style="background:var(--surface-inset);border-left:3px solid var(--red);border-radius:5px;padding:7px 11px;font-size:13px;color:var(--text-muted);font-weight:600"><span style="font-family:var(--mono);color:var(--red);font-size:10px;font-weight:700;display:block">05</span>Fax numbers</div>

</div>

<h3>Three critical nuanced rules</h3>
<h4>Rule 1 — The ZIP Population Threshold</h4>
<p>Under <button class="card-link" onclick="openCardModal('zip_threshold')">Safe Harbor</button>, a 3-digit ZIP prefix may be retained ONLY if the geographic area it represents contains <strong>≥ 20,000 residents</strong> according to U.S. Census data. If population &lt; 20,000, you must replace the entire ZIP with <code>000</code>.</p>
<p><strong>Why?</strong> Very sparsely populated areas have so few residents that even a 3-digit prefix can narrow down an individual to a handful of people — making it nearly as identifying as the full 5-digit code.</p>
<p><strong>In our cohort:</strong> ZIP prefix 980 covers ~420,000 residents ✓ safe. ZIP prefix 981 covers ~85,000 residents ✓ safe. Both prefixes can be retained.</p>

<h4>Rule 2 — Dates Must Become Year Only</h4>
<p>All patient-associated dates — date of birth, admission date, discharge date, death date, procedure dates — must be reduced to <strong>year only</strong>. The month and day are removed because combining a specific date (e.g., March 14) with a ZIP and age can be highly identifying.</p>

<h4>Rule 3 — The <button class="card-link" onclick="openCardModal('age_90_rule')">Age 90+ Rule</button></h4>
<p>Patients aged <strong>90 or older</strong> have an additional requirement: even their birth year must be removed and replaced with the label <strong>"Age 90+"</strong>. Why? Extremely long-lived individuals are statistically very rare. A birth year of 1929, combined with other QIs, could uniquely identify a small group of centenarians even after generalization. Collapsing all ages ≥ 90 into a single category prevents this.</p>

<h3>Safe Harbor vs. Expert Determination</h3>
<div class="ba-block">
<div class="ba-panel ba-before">
<div class="ba-label">Safe Harbor</div>
<div class="ba-content">Remove all 18 categories mechanically. No statistician needed. Binary compliance. Does NOT measure residual risk. Simple, legally clear.<br><br><strong>Use when:</strong> data is straightforward, removing all 18 categories is acceptable, and no statistical proof of risk level is needed.</div>
</div>
<div class="ba-arrow">vs</div>
<div class="ba-panel ba-after">
<div class="ba-label">Expert Determination</div>
<div class="ba-content">A qualified statistician uses the three attacker models (Segments 5-6) to certify that re-ID risk ≤ 0.09. More flexible — can retain fields Safe Harbor would require removing, with compensating controls.<br><br><strong>Use when:</strong> retaining more detail is needed for analytics quality, and a statistical justification can be documented.</div>
</div>
</div>

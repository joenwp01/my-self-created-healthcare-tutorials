<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funnel Analysis // Data Engineering</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0e1a;
    font-family: Georgia, serif;
    color: #e8e4dc;
    display: flex;
    flex-direction: column;
  }
  /* ── NAV ── */
  #nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px; border-bottom: 1px solid #1e2535;
    background: #080c17; flex-shrink: 0;
  }
  #nav .brand { font-family: monospace; font-size: 12px; color: #4a9eff; letter-spacing: 2px; }
  #nav .dots { display: flex; gap: 6px; }
  .dot-btn {
    padding: 4px 10px; font-size: 11px; border: none; cursor: pointer;
    border-radius: 3px; font-family: monospace; letter-spacing: 1px;
    background: #1a2035; color: #6b7a9a; transition: all .2s;
  }
  .dot-btn.active { background: #4a9eff; color: #000; }
  /* ── MAIN ── */
  #main {
    flex: 1; padding: 40px 48px; max-width: 960px;
    margin: 0 auto; width: 100%; overflow-y: auto;
  }
  .slide-label { font-family: monospace; font-size: 11px; color: #4a5568; letter-spacing: 3px; margin-bottom: 8px; }
  .slide-title { font-size: 34px; font-weight: 700; margin-bottom: 8px; line-height: 1.15; color: #f0ece4; }
  .slide-subtitle { font-size: 15px; color: #7a8aaa; margin-bottom: 28px; font-style: italic; }
  .slide-body { font-size: 15px; color: #c0bdb5; line-height: 1.75; max-width: 620px; margin-bottom: 28px; }
  /* ── INTRO CARDS ── */
  .intro-grid { display: flex; gap: 20px; margin-top: 36px; flex-wrap: wrap; }
  .intro-card {
    flex: 1; min-width: 140px; background: #111827;
    border: 1px solid #1e2d45; border-radius: 6px;
    padding: 20px 14px; text-align: center;
  }
  .intro-card .ico { font-size: 28px; margin-bottom: 10px; }
  .intro-card .stage { font-family: monospace; font-size: 11px; color: #4a9eff; letter-spacing: 2px; }
  .intro-card .desc { font-size: 11px; color: #4a5568; margin-top: 6px; line-height: 1.5; }
  /* ── FUNNEL BARS ── */
  .funnel-wrap { margin-top: 8px; }
  .drop-label { font-family: monospace; font-size: 11px; color: #ef4444; padding-left: 8px; margin-bottom: 4px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .bar-name { width: 190px; font-size: 12px; color: #9ca3af; flex-shrink: 0; }
  .bar-track { flex: 1; height: 32px; background: #111827; border-radius: 4px; overflow: hidden; }
  .bar-fill {
    height: 100%; display: flex; align-items: center; padding-left: 10px;
    background: linear-gradient(90deg, #4a9eff, #1d4ed8);
    transition: width .6s ease;
  }
  .bar-fill span { font-family: monospace; font-size: 12px; color: #fff; white-space: nowrap; }
  .bar-pct { font-family: monospace; font-size: 13px; color: #4a9eff; width: 44px; text-align: right; }
  /* ── METRICS ── */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
  .metric-card { background: #0d1526; border: 1px solid #1e2d45; border-radius: 8px; padding: 20px 22px; }
  .metric-name { font-size: 14px; font-weight: 700; color: #e8e4dc; margin-bottom: 10px; }
  .metric-formula {
    font-family: monospace; font-size: 12px; background: #070b14;
    padding: 8px 12px; border-radius: 4px; color: #4a9eff; margin-bottom: 8px;
  }
  .metric-eg { font-family: monospace; font-size: 11px; color: #6b7a9a; }
  /* ── CODE ── */
  .code-wrap {
    background: #070b14; border: 1px solid #1e2d45; border-radius: 8px;
    padding: 24px 28px; margin-top: 8px; overflow: auto;
  }
  pre { font-family: monospace; font-size: 12.5px; line-height: 1.7; color: #c0bdb5; }
  .ln { color: #2a3550; display: inline-block; width: 26px; user-select: none; }
  .kw { color: #4a9eff; font-weight: 600; }
  .str { color: #34d399; }
  .cmt { color: #374151; }
  /* ── USE CASES ── */
  .cases-wrap { margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
  .case-card {
    display: flex; align-items: flex-start; gap: 16px;
    background: #0d1526; border: 1px solid #1e2d45;
    border-radius: 6px; padding: 14px 18px;
  }
  .case-ico { font-size: 22px; flex-shrink: 0; }
  .case-domain { font-family: monospace; font-size: 12px; color: #4a9eff; margin-bottom: 4px; letter-spacing: 1px; }
  .case-steps { font-family: monospace; font-size: 13px; color: #9ca3af; }
  /* ── QUIZ ── */
  .ref-grid { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .ref-card {
    background: #0d1526; border: 1px solid #1e2d45;
    border-radius: 5px; padding: 8px 14px; text-align: center; flex: 1; min-width: 80px;
  }
  .ref-card .rc-label { font-family: monospace; font-size: 11px; color: #4a9eff; }
  .ref-card .rc-n { font-size: 16px; font-weight: 700; color: #f0ece4; margin: 4px 0; }
  .ref-card .rc-pct { font-family: monospace; font-size: 11px; color: #4a5568; }
  .q-meta { font-family: monospace; font-size: 11px; color: #4a5568; letter-spacing: 2px; margin-bottom: 12px; }
  .q-text { font-size: 15px; color: #e8e4dc; margin-bottom: 20px; line-height: 1.6; font-style: italic; }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    background: #0d1526; border: 1px solid #1e2d45; border-radius: 5px;
    padding: 12px 16px; text-align: left; cursor: pointer;
    color: #c0bdb5; font-family: monospace; font-size: 13px; transition: all .2s;
  }
  .choice-btn:hover { border-color: #4a9eff; color: #e8e4dc; }
  .choice-btn.correct { background: #052e16; border-color: #16a34a; color: #4ade80; }
  .choice-btn.wrong { background: #2d0a0a; border-color: #dc2626; color: #f87171; }
  .choice-btn:disabled { cursor: default; }
  .explanation {
    margin-top: 16px; background: #0a1628; border: 1px solid #1e3a5f;
    border-radius: 5px; padding: 12px 16px;
  }
  .exp-label { font-family: monospace; font-size: 11px; color: #4a9eff; margin-bottom: 6px; }
  .exp-text { font-size: 13px; color: #9ca3af; line-height: 1.6; }
  .next-btn {
    margin-top: 12px; background: #4a9eff; border: none; border-radius: 4px;
    padding: 8px 18px; color: #000; font-family: monospace; font-size: 12px;
    cursor: pointer; font-weight: 700; letter-spacing: 1px;
  }
  .score-wrap { text-align: center; padding: 40px 0; }
  .score-ico { font-size: 48px; margin-bottom: 16px; }
  .score-num { font-family: monospace; font-size: 28px; color: #4a9eff; margin-bottom: 8px; }
  .score-msg { color: #6b7a9a; font-size: 14px; margin-bottom: 24px; }
  .retry-btn {
    background: #1e2d45; border: 1px solid #4a9eff; border-radius: 4px;
    padding: 8px 20px; color: #4a9eff; font-family: monospace;
    font-size: 12px; cursor: pointer; letter-spacing: 1px;
  }
  /* ── FOOTER NAV ── */
  #footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 48px; border-top: 1px solid #1e2535;
    background: #080c17; flex-shrink: 0;
  }
  .nav-btn {
    border: 1px solid #1e2535; border-radius: 4px;
    padding: 8px 20px; font-family: monospace; font-size: 12px;
    cursor: pointer; letter-spacing: 1px; transition: all .2s;
  }
  .nav-btn.prev { background: none; color: #6b7a9a; }
  .nav-btn.prev:disabled { color: #2a3550; cursor: default; }
  .nav-btn.next { background: #4a9eff; border-color: #4a9eff; color: #000; font-weight: 700; }
  .nav-btn.next:disabled { background: none; color: #2a3550; cursor: default; }
  .page-indicator { font-family: monospace; font-size: 11px; color: #2a3550; }
  @media (max-width: 600px) {
    #main { padding: 24px 20px; }
    .metrics-grid { grid-template-columns: 1fr; }
    .intro-grid { flex-direction: column; }
    .slide-title { font-size: 26px; }
    #footer { padding: 12px 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <div class="brand">FUNNEL ANALYSIS // DATA ENGINEERING</div>
  <div class="dots" id="dotRow"></div>
</div>

<!-- MAIN -->
<div id="main"></div>

<!-- FOOTER -->
<div id="footer">
  <button class="nav-btn prev" id="btnPrev" onclick="changeSlide(-1)">← PREV</button>
  <div class="page-indicator" id="pageIndicator"></div>
  <button class="nav-btn next" id="btnNext" onclick="changeSlide(1)">NEXT →</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const funnelSteps = [
  { label:"Visit Landing Page", pct:100, n:10000 },
  { label:"View Product",        pct:62,  n:6200  },
  { label:"Add to Cart",         pct:31,  n:3100  },
  { label:"Begin Checkout",      pct:14,  n:1400  },
  { label:"Purchase Complete",   pct:6,   n:600   },
];

const metrics = [
  { name:"Step Conversion Rate",   formula:"Users at Step N+1 / Users at Step N",  eg:"3100 / 6200 = 50%" },
  { name:"Overall Conversion Rate",formula:"Users at Final Step / Users at Step 1",eg:"600 / 10,000 = 6%" },
  { name:"Drop-off Rate",          formula:"1 − Step Conversion Rate",              eg:"1 − 0.50 = 50% lost" },
  { name:"Time-to-Convert",        formula:"Avg time from Step 1 → Final Step",     eg:"Median 4.2 days" },
];

const useCases = [
  { icon:"🛒", domain:"E-COMMERCE",       steps:"Browse → PDP → Cart → Checkout → Purchase" },
  { icon:"🏥", domain:"HEALTHCARE",       steps:"Referral → Intake → Appointment → Treatment → Follow-up" },
  { icon:"📱", domain:"SAAS / ONBOARDING",steps:"Sign-up → Activation → Feature Use → Subscription" },
  { icon:"🔬", domain:"CLINICAL TRIALS",  steps:"Screening → Enrollment → Dosing → Completion" },
  { icon:"📋", domain:"CLAIMS PROCESSING",steps:"Submission → Adjudication → Payment → Reconciliation" },
];

const sqlCode = [
  "WITH events AS (",
  "  SELECT user_id, event_name, event_ts",
  "  FROM analytics.events",
  "  WHERE event_date BETWEEN '2024-01-01' AND '2024-03-31'",
  "),",
  "funnel AS (",
  "  SELECT",
  "    COUNT(DISTINCT user_id)                              AS step1_visit,",
  "    COUNT(DISTINCT CASE",
  "      WHEN event_name = 'view_product'   THEN user_id END) AS step2_view,",
  "    COUNT(DISTINCT CASE",
  "      WHEN event_name = 'add_to_cart'    THEN user_id END) AS step3_cart,",
  "    COUNT(DISTINCT CASE",
  "      WHEN event_name = 'begin_checkout' THEN user_id END) AS step4_checkout,",
  "    COUNT(DISTINCT CASE",
  "      WHEN event_name = 'purchase'       THEN user_id END) AS step5_purchase",
  "  FROM events",
  ")",
  "SELECT",
  "  step1_visit,",
  "  ROUND(step2_view     / step1_visit::NUMERIC * 100, 1) AS pct_view,",
  "  ROUND(step3_cart     / step1_visit::NUMERIC * 100, 1) AS pct_cart,",
  "  ROUND(step4_checkout / step1_visit::NUMERIC * 100, 1) AS pct_checkout,",
  "  ROUND(step5_purchase / step1_visit::NUMERIC * 100, 1) AS pct_purchase",
  "FROM funnel;",
];

const quizQuestions = [
  {
    q: "The drop from 'Add to Cart' (3,100) to 'Begin Checkout' (1,400) — what is the step drop-off rate?",
    choices: ["45%","55%","31%","14%"],
    answer: 1,
    explain: "1,700 users dropped. 1,700 / 3,100 = 54.8% ≈ 55% drop-off rate at this step."
  },
  {
    q: "Which step has the WORST step-to-step conversion rate?",
    choices: [
      "Landing Page → View Product (62%)",
      "View Product → Add to Cart (50%)",
      "Add to Cart → Begin Checkout (45%)",
      "Begin Checkout → Purchase (43%)"
    ],
    answer: 0,
    explain: "Landing Page → View Product loses 38% of users — the largest absolute drop and lowest step-conversion (62%). This is often where relevance or UX fails first."
  },
  {
    q: "Overall conversion rate from visit to purchase is 6%. If you improve 'Begin Checkout → Purchase' from 43% to 60%, what's the new overall rate?",
    choices: ["6.0%","7.3%","8.4%","9.1%"],
    answer: 2,
    explain: "1,400 × 0.60 = 840 purchases. 840 / 10,000 = 8.4% overall conversion."
  }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentSlide = 0;
const TOTAL = 6;
let quiz = { current:0, selected:null, score:0, done:false, answered:false };

// ── HELPERS ──────────────────────────────────────────────────────────────────
function colorSQL(line) {
  const kws = ["WITH","SELECT","FROM","WHERE","BETWEEN","CASE","WHEN","THEN","END","AS","AND","ROUND","COUNT","DISTINCT","NUMERIC"];
  let out = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  kws.forEach(k => { out = out.replace(new RegExp(`\\b${k}\\b`,"g"), `<span class="kw">${k}</span>`); });
  out = out.replace(/('.*?')/g, '<span class="str">$1</span>');
  out = out.replace(/(--[^\n]*)/g, '<span class="cmt">$1</span>');
  return out;
}

// ── RENDERERS ────────────────────────────────────────────────────────────────
function renderIntro() {
  const stages = [
    {ico:"📊", s:"ACQUISITION", d:"Who arrives?"},
    {ico:"📈", s:"ACTIVATION",  d:"Who engages?"},
    {ico:"🔄", s:"RETENTION",   d:"Who returns?"},
    {ico:"💰", s:"REVENUE",     d:"Who converts?"},
  ];
  const cols = ["#4a9eff","#38bdf8","#06b6d4","#0ea5e9"];
  return `
    <div class="intro-grid">
      ${stages.map((s,i)=>`
        <div class="intro-card" style="border-top:3px solid ${cols[i]}">
          <div class="ico">${s.ico}</div>
          <div class="stage">${s.s}</div>
          <div class="desc">${s.d}</div>
        </div>`).join("")}
    </div>`;
}

function renderFunnel() {
  return `<div class="funnel-wrap">` +
    funnelSteps.map((step,i) => {
      const prev = i>0 ? funnelSteps[i-1] : null;
      const drop = prev ? Math.round((1-step.n/prev.n)*100) : null;
      const lost = prev ? (prev.n-step.n).toLocaleString() : null;
      return (drop!==null ? `<div class="drop-label">↓ ${drop}% drop-off (${lost} users lost)</div>` : "") +
        `<div class="bar-row">
          <div class="bar-name">${step.label}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${step.pct}%">
              <span>${step.n.toLocaleString()}</span>
            </div>
          </div>
          <div class="bar-pct">${step.pct}%</div>
        </div>`;
    }).join("") + `</div>`;
}

function renderMetrics() {
  return `<div class="metrics-grid">` +
    metrics.map(m=>`
      <div class="metric-card">
        <div class="metric-name">${m.name}</div>
        <div class="metric-formula">${m.formula}</div>
        <div class="metric-eg">e.g. ${m.eg}</div>
      </div>`).join("") +
    `</div>`;
}

function renderCode() {
  const lines = sqlCode.map((l,i)=>
    `<div><span class="ln">${i+1}</span>${colorSQL(l)}</div>`).join("");
  return `<div class="code-wrap"><pre>${lines}</pre></div>`;
}

function renderUseCases() {
  return `<div class="cases-wrap">` +
    useCases.map(c=>`
      <div class="case-card">
        <span class="case-ico">${c.icon}</span>
        <div>
          <div class="case-domain">${c.domain}</div>
          <div class="case-steps">${c.steps}</div>
        </div>
      </div>`).join("") +
    `</div>`;
}

function renderRefGrid() {
  const refs = [
    {label:"Visit",    n:10000, pct:100},
    {label:"View",     n:6200,  pct:62},
    {label:"Cart",     n:3100,  pct:31},
    {label:"Checkout", n:1400,  pct:14},
    {label:"Purchase", n:600,   pct:6},
  ];
  return `<div class="ref-grid">` +
    refs.map(r=>`
      <div class="ref-card">
        <div class="rc-label">${r.label}</div>
        <div class="rc-n">${r.n.toLocaleString()}</div>
        <div class="rc-pct">${r.pct}%</div>
      </div>`).join("") +
    `</div>`;
}

function renderQuiz() {
  if (quiz.done) {
    const ico = quiz.score===3 ? "🏆" : quiz.score>=2 ? "✅" : "📚";
    const msg = quiz.score===3 ? "Perfect score — you've got this." :
                quiz.score>=2  ? "Solid understanding." : "Review the funnel metrics slide.";
    return `
      <div class="score-wrap">
        <div class="score-ico">${ico}</div>
        <div class="score-num">${quiz.score} / 3</div>
        <div class="score-msg">${msg}</div>
        <button class="retry-btn" onclick="resetQuiz()">RETRY</button>
      </div>`;
  }
  const q = quizQuestions[quiz.current];
  const choiceHTML = q.choices.map((c,i) => {
    let cls = "choice-btn";
    if (quiz.answered) {
      if (i===q.answer) cls += " correct";
      else if (i===quiz.selected) cls += " wrong";
    }
    return `<button class="${cls}" onclick="handleAnswer(${i})" ${quiz.answered?"disabled":""}>${String.fromCharCode(65+i)}. ${c}</button>`;
  }).join("");
  const expHTML = quiz.answered ? `
    <div class="explanation">
      <div class="exp-label">EXPLANATION</div>
      <div class="exp-text">${q.explain}</div>
      <button class="next-btn" onclick="nextQuestion()">
        ${quiz.current+1<quizQuestions.length ? "NEXT →" : "FINISH"}
      </button>
    </div>` : "";
  return renderRefGrid() + `
    <div class="q-meta">QUESTION ${quiz.current+1} / ${quizQuestions.length}</div>
    <p class="q-text">${q.q}</p>
    <div class="choices">${choiceHTML}</div>
    ${expHTML}`;
}

// ── SLIDES CONFIG ─────────────────────────────────────────────────────────────
const slides = [
  {
    label:"01 / What Is It?",
    title:"Funnel Analysis",
    subtitle:"Tracking how users flow — and fall out — of a sequential process",
    body:"",
    render: renderIntro,
  },
  {
    label:"02 / The Concept",
    title:"A Funnel Is a Sequence of Steps",
    subtitle:"",
    body:"Each step represents a required action. Users who don't complete a step are lost — they don't proceed further. The funnel shrinks at every stage.",
    render: renderFunnel,
  },
  {
    label:"03 / Key Metrics",
    title:"What We Measure",
    subtitle:"",
    body:"",
    render: renderMetrics,
  },
  {
    label:"04 / SQL Pattern",
    title:"Building a Funnel in SQL",
    subtitle:"Count distinct users who reached each step — in order",
    body:"",
    render: renderCode,
  },
  {
    label:"05 / Use Cases",
    title:"Where Funnel Analysis Lives",
    subtitle:"",
    body:"",
    render: renderUseCases,
  },
  {
    label:"06 / Tutorial",
    title:"Hands-On: Interpret This Funnel",
    subtitle:"",
    body:"",
    render: renderQuiz,
  },
];

// ── QUIZ ACTIONS ─────────────────────────────────────────────────────────────
function handleAnswer(idx) {
  if (quiz.answered) return;
  const correct = idx === quizQuestions[quiz.current].answer;
  quiz.selected = idx;
  quiz.answered = true;
  if (correct) quiz.score++;
  renderSlide();
}
function nextQuestion() {
  if (quiz.current+1 >= quizQuestions.length) { quiz.done = true; }
  else { quiz.current++; quiz.selected=null; quiz.answered=false; }
  renderSlide();
}
function resetQuiz() {
  quiz = { current:0, selected:null, score:0, done:false, answered:false };
  renderSlide();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderSlide() {
  const s = slides[currentSlide];
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="slide-label">${s.label}</div>
    <h1 class="slide-title">${s.title}</h1>
    ${s.subtitle ? `<p class="slide-subtitle">${s.subtitle}</p>` : ""}
    ${s.body ? `<p class="slide-body">${s.body}</p>` : ""}
    ${s.render()}
  `;
  // dots
  document.getElementById("dotRow").innerHTML = slides.map((_,i)=>
    `<button class="dot-btn${i===currentSlide?" active":""}" onclick="goTo(${i})">${String(i+1).padStart(2,"0")}</button>`
  ).join("");
  // footer
  document.getElementById("pageIndicator").textContent = `${currentSlide+1} / ${TOTAL}`;
  document.getElementById("btnPrev").disabled = currentSlide===0;
  document.getElementById("btnNext").disabled = currentSlide===TOTAL-1;
  main.scrollTop = 0;
}

function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next<0||next>=TOTAL) return;
  currentSlide = next;
  if (currentSlide!==5) quiz = { current:0, selected:null, score:0, done:false, answered:false };
  renderSlide();
}

function goTo(idx) {
  currentSlide = idx;
  if (currentSlide!==5) quiz = { current:0, selected:null, score:0, done:false, answered:false };
  renderSlide();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSlide();
</script>
</body>
</html>
